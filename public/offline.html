<!DOCTYPE html>
<html lang="en-KE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Za Ndani</title>
  <style>
    body {
      background: #09090b;
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      color: #a1a1aa;
      margin-bottom: 2rem;
    }
    button {
      background: #e11d48;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #be123c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 You're Offline</h1>
    <p>You've lost connection to the internet. Stories you've already read are still available.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
