2. The 4-Stage AI Pipeline
Never use a single-shot generation prompt. Always structure the Python script to use this sequence:
Stage 1 (Brief): AI extracts a factual JSON brief from the raw scraped text (Summary, main events, keywords, angle). Instruct it to NEVER echo source sentences.

Stage 2 (SEO): AI takes the brief and generates JSON SEO metadata (Title under 65 chars, Meta description 120-155 chars, slug, tags).

Stage 3 (Write): AI writes the article in Markdown using the brief, the SEO title, and a randomly selected Style Preset. No HTML. No frontmatter inside the body. No author/date bylines in the body.

Stage 4 (Review/Rewrite): AI scores the generated text (1-10) for source_similarity, house_style_repetition, and voice_variety. If similarity is >= 7, repetition >= 7, or voice <= 4, it automatically triggers a rewrite prompt to fix the text.
3. Style Rotation & Memory Architecture
