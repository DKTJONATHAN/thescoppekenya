name: Celestine Nzioka - News Scraper

on:
  schedule:
    # Run four times daily to prioritize stronger, fresher stories over volume.
    - cron: '5 5,11,17,23 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine_news.json
  TZ: Africa/Nairobi

jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium --with-deps

      - name: Run Celestine News pipeline
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          cat > _pipeline.py << 'PYEOF'
          import os, sys, json, re, time, random, hashlib, base64, itertools, datetime, urllib.parse
          import requests
          from dateutil import parser as date_parser
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          from google import genai
          from google.genai import types

          # ---------- CONFIG ----------
          AUTHOR_NAME      = "Celestine Nzioka"
          AUTHOR_SLUG      = "celestine-nzioka"
          CATEGORY         = "News"
          SITE_BASE_URL    = "https://zandani.co.ke"
          SOURCE_URL       = "https://www.kenyans.co.ke/news"
          SOURCE_DOMAIN    = "kenyans.co.ke"
          POSTS_DIR        = os.environ.get("POSTS_DIR", "content/posts")
          MEMORY_FILE      = os.environ.get("MEMORY_FILE", ".github/memory_celestine_news.json")

          MODELS_TO_TRY = [
              "gemini-3.1-pro-preview",
              "gemini-3.1-flash-lite-preview",
              "gemini-3-flash-preview",
              "gemini-2.5-pro",
              "gemini-2.5-flash",
          ]

          BANNED_PHRASES = [
              "sasa basi","melting the pot","spill the tea","tea is hot","grab your popcorn",
              "buckle up","breaking news","dive in","delve into","moreover","furthermore",
              "in conclusion","it's worth noting","a testament to","navigating the landscape",
              "in today's digital age","tapestry","game-changer","stay tuned","unpack",
          ]

          BRANDS_TO_SCRUB = [
              "Kenyans.co.ke", "kenyans.co.ke", "Kenyans Co Ke",
              "BBC", "CNN", "Reuters", "Al Jazeera", "Daily Nation", "Nation.Africa",
              "Standard Media", "The Standard", "Citizen Digital", "Tuko", "Pulse Live",
              "Capital FM", "K24", "NTV Kenya", "KTN News",
          ]

          STYLE_PRESETS = [
              {
                  "name": "Hard News Lead",
                  "format": "Inverted pyramid news report",
                  "lead_style": "Single-sentence hard lead naming the actor, action, place and impact.",
                  "tone": "Authoritative, neutral, declarative",
                  "angle": "What happened and who is affected first",
                  "structure": "Lead, then 3 short context paragraphs, then 2 reaction paragraphs, then a forward-look closer",
                  "sentence_mix": "Mostly short and medium. Avoid back-to-back long sentences",
                  "closing": "Forward-looking sentence on what to watch next",
              },
              {
                  "name": "Explainer",
                  "format": "Question-driven explainer",
                  "lead_style": "Frame the news with the central question readers are actually asking",
                  "tone": "Calm, instructive, plain-spoken",
                  "angle": "Why this matters to ordinary Kenyans",
                  "structure": "Hook, then H3 sub-questions answered briefly, then implications",
                  "sentence_mix": "Conversational rhythm, vary sentence length",
                  "closing": "One-line takeaway readers can repeat",
              },
              {
                  "name": "Power Accountability",
                  "format": "Cynical accountability piece",
                  "lead_style": "Lead with the contradiction or the missing detail in the official story",
                  "tone": "Sharp, sceptical, unflinching but factual",
                  "angle": "What the people in power are not saying",
                  "structure": "Cold open, claim vs reality, paper trail, closing question",
                  "sentence_mix": "Mix of punchy short lines and one heavier paragraph mid-piece",
                  "closing": "A pointed question that hangs in the air",
              },
              {
                  "name": "Reaction & Voices",
                  "format": "Reaction round-up",
                  "lead_style": "Lead with the loudest reaction, not the event itself",
                  "tone": "Street-level, human, grounded",
                  "angle": "How Kenyans are responding right now",
                  "structure": "Reaction lead, event recap in one paragraph, three voices summarised, what next",
                  "sentence_mix": "Short quotes paraphrased, not block quotes",
                  "closing": "A line that captures the public mood",
              },
              {
                  "name": "Context Backgrounder",
                  "format": "Backgrounder with timeline beats",
                  "lead_style": "Place the event inside a longer running story",
                  "tone": "Measured, knowledgeable, slightly weary",
                  "angle": "How we got here and where it usually ends",
                  "structure": "Today's beat, three brief timeline beats, pattern analysis, outlook",
                  "sentence_mix": "Medium sentences, one short closer",
                  "closing": "Pattern-recognition line tying past to future",
              },
          ]

          # ---------- TIME ----------
          now_utc       = datetime.datetime.utcnow()
          now_eat       = now_utc + datetime.timedelta(hours=3)
          publish_ts    = now_utc.strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str     = now_eat.strftime("%Y-%m-%d")
          full_date_str = now_eat.strftime("%A, %B %d, %Y")

          # ---------- MEMORY ----------
          def load_memory():
              if not os.path.exists(MEMORY_FILE):
                  return {"published_hashes": [], "style_history": []}
              try:
                  with open(MEMORY_FILE, "r", encoding="utf-8") as f:
                      raw = json.load(f)
                  if isinstance(raw, list):
                      return {"published_hashes": raw[-500:], "style_history": []}
                  if isinstance(raw, dict):
                      raw.setdefault("published_hashes", [])
                      raw.setdefault("style_history", [])
                      raw["style_history"] = [
                          (h.get("stylePreset") or h.get("name") or "") if isinstance(h, dict) else str(h)
                          for h in raw["style_history"]
                      ]
                      raw["style_history"] = [h for h in raw["style_history"] if h]
                      raw.setdefault("angle_history", [])
                      return raw
              except Exception as e:
                  print(f"Memory load error: {e}")
              return {"published_hashes": [], "style_history": []}

          def save_memory(mem):
              os.makedirs(os.path.dirname(MEMORY_FILE), exist_ok=True)
              mem["published_hashes"] = mem.get("published_hashes", [])[-500:]
              mem["style_history"]    = mem.get("style_history", [])[-30:]
              mem["angle_history"]    = mem.get("angle_history", [])[-80:]
              with open(MEMORY_FILE, "w", encoding="utf-8") as f:
                  json.dump(mem, f, indent=2)

          memory = load_memory()

          # ---------- STYLE ROTATION ----------
          def pick_style(history):
              recent = set(history[-3:])
              candidates = [s for s in STYLE_PRESETS if s["name"] not in recent] or STYLE_PRESETS
              # Forbid the same style 3 in a row
              if len(history) >= 2 and history[-1] == history[-2]:
                  candidates = [s for s in STYLE_PRESETS if s["name"] != history[-1]] or candidates
              return random.choice(candidates)

          # ---------- IMAGES ----------
          def upload_to_imgbb(image_url):
              key = os.environ.get("IMGBB_API_KEY")
              if not key or not image_url:
                  return image_url
              try:
                  data = requests.get(image_url, timeout=15).content
                  b64  = base64.b64encode(data).decode("utf-8")
                  r = requests.post("https://api.imgbb.com/1/upload",
                                    data={"key": key, "image": b64}, timeout=20)
                  if r.status_code == 200:
                      return r.json()["data"]["url"]
              except Exception as e:
                  print(f"imgbb error: {e}")
              return image_url

          def get_unsplash_image(query):
              key = os.environ.get("UNSPLASH_ACCESS_KEY")
              fallback = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200"
              if not key:
                  return fallback
              try:
                  r = requests.get(
                      f"https://api.unsplash.com/photos/random?query={urllib.parse.quote(query)}"
                      f"&orientation=landscape&client_id={key}", timeout=10)
                  if r.status_code == 200:
                      return r.json()["urls"]["regular"]
              except Exception as e:
                  print(f"unsplash error: {e}")
              return fallback

          # ---------- SCRAPER ----------
          def get_target_urls():
              urls = []
              print(f"Scanning {SOURCE_URL}")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled"])
                      ctx = browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                          viewport={"width":1920,"height":1080})
                      page = ctx.new_page()
                      page.goto(SOURCE_URL, timeout=90000, wait_until="domcontentloaded")
                      page.wait_for_timeout(3500)
                      for _ in range(3):
                          page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
                          page.wait_for_timeout(2500)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      for a in soup.select("a[href]"):
                          href = a.get("href","")
                          if not href: continue
                          if "/news/" not in href: continue
                          if any(x in href for x in ["#","?page=","/category/","/tag/"]): continue
                          full = href if href.startswith("http") else "https://www.kenyans.co.ke" + href
                          if full not in urls:
                              urls.append(full)
                      browser.close()
              except Exception as e:
                  print(f"List scrape error: {e}")
              print(f"Found {len(urls)} candidate links")
              return urls[:25]

          def scrape_article(url):
              print(f"Scraping {url}")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled"])
                      ctx = browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                      page = ctx.new_page()
                      page.goto(url, timeout=60000, wait_until="domcontentloaded")
                      page.wait_for_timeout(3500)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()
              except Exception as e:
                  print(f"Scrape failed: {e}")
                  return None, None, None

              # freshness gate (6h)
              meta_pub = soup.find("meta", property="article:published_time")
              if meta_pub and meta_pub.get("content"):
                  try:
                      pt = date_parser.parse(meta_pub["content"])
                      if pt.tzinfo is None:
                          pt = pt.replace(tzinfo=datetime.timezone.utc)
                      age_h = (datetime.datetime.now(datetime.timezone.utc) - pt).total_seconds()/3600
                      if age_h > 6:
                          print(f"Skipping, age {age_h:.1f}h")
                          return None, None, None
                  except Exception:
                      pass

              t = soup.find("title")
              title = t.get_text(strip=True) if t else ""
              for sep in [" | "," - "]:
                  if sep in title:
                      title = title.split(sep)[0].strip()

              text = ""
              for sel in ["article", ".node__content", ".field--name-body",
                          ".article__body", "main article", ".content"]:
                  c = soup.select_one(sel)
                  if c:
                      text = "\n\n".join(p.get_text(" ", strip=True)
                                         for p in c.find_all("p")
                                         if len(p.get_text(strip=True)) > 30)
                      if len(text) > 500:
                          break
              if len(text) < 500:
                  text = "\n\n".join(p.get_text(" ", strip=True)
                                     for p in soup.find_all("p")
                                     if len(p.get_text(strip=True)) > 30)

              img = ""
              for m in soup.find_all("meta"):
                  prop = m.get("property") or m.get("name") or ""
                  if prop in ("og:image","twitter:image"):
                      img = m.get("content","")
                      if img: break

              return text, img, title

          # ---------- INTERNAL CONTEXT ----------
          def get_internal_links():
              if not os.path.isdir(POSTS_DIR):
                  return ""
              files = [f for f in os.listdir(POSTS_DIR) if f.endswith(".md")]
              if not files:
                  return ""
              picks = random.sample(files, min(4, len(files)))
              out = "RECENT INTERNAL LINKS (weave 1-2 naturally):\n"
              for f in picks:
                  try:
                      with open(os.path.join(POSTS_DIR, f), "r", encoding="utf-8") as h:
                          c = h.read()
                      m = re.search(r'title:\s*"(.*?)"', c)
                      ttl = m.group(1) if m else f.replace(".md","")
                      slg = re.search(r'slug:\s*"(.*?)"', c)
                      sl = slg.group(1) if slg else f.replace(".md","")
                      out += f"- [{ttl}]({SITE_BASE_URL}/article/{sl})\n"
                  except Exception:
                      continue
              return out

          # ---------- SOURCE LEAK GUARD ----------
          def scrub_source_leaks(text):
              if not text: return text
              # Strip bare URLs from source domain
              text = re.sub(r"https?://[^\s)\"']*" + re.escape(SOURCE_DOMAIN) + r"[^\s)\"']*", SITE_BASE_URL, text)
              for brand in BRANDS_TO_SCRUB:
                  text = re.sub(re.escape(brand), "Za Ndani", text, flags=re.IGNORECASE)
              # collapse double "Za Ndani Za Ndani"
              text = re.sub(r"(Za Ndani)(?:\s+Za Ndani)+", r"\1", text)
              return text

          LEGACY_BOILERPLATE = [
              "is central to this update for kenyan readers",
              "what this means for kenyans",
              "key facts",
              "what is the most important takeaway",
              "the key takeaway is",
              "this development could directly affect",
              "official announcement details are in this report",
              "practical impact depends on timelines and enforcement",
              "readers should verify changes through official channels",
              "search-ready summary",
              "search ready summary",
              "faq",
              "faqs",
              "frequently asked questions",
          ]

          def strip_article_boilerplate(text):
              if not text:
                  return text
              blocks = re.split(r"\n\s*\n+", text.strip())
              cleaned = []
              seen = set()
              for block in blocks:
                  normalized = re.sub(r"[*_`~:#()\[\]{}<>-]", " ", block.lower())
                  normalized = re.sub(r"\s+", " ", normalized).strip()
                  if not normalized:
                      continue
                  if any(phrase in normalized for phrase in LEGACY_BOILERPLATE):
                      continue
                  if normalized in seen:
                      continue
                  seen.add(normalized)
                  cleaned.append(block.strip())
              return "\n\n".join(cleaned).replace("\n{3,}", "\n\n").strip()

          # ---------- GEMINI ----------
          raw_keys = [os.environ.get(k) for k in ("GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1") if os.environ.get(k)]
          if not raw_keys:
              print("No Gemini keys configured")
              sys.exit(1)
          key_cycle = itertools.cycle(raw_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_call(prompt, label="", json_mode=False):
              global current_key, client
              cfg = None
              if json_mode:
                  # CRITICAL: never include frequency_penalty / presence_penalty
                  cfg = types.GenerateContentConfig(response_mime_type="application/json")
              for model in MODELS_TO_TRY:
                  for attempt in range(5):
                      try:
                          resp = client.models.generate_content(model=model, contents=prompt, config=cfg)
                          out = (resp.text or "").strip()
                          if out:
                              print(f"Gemini OK [{model}] {label}")
                              return out
                      except Exception as e:
                          msg = str(e).lower()
                          transient = any(x in msg for x in ["429","quota","rate","503","unavailable","500","overloaded","resource_exhausted"])
                          if transient:
                              time.sleep(random.uniform(15, 30))
                              current_key = next(key_cycle)
                              client = genai.Client(api_key=current_key)
                              continue
                          print(f"Gemini error [{model}] {label}: {e}")
                          break
              return None

          def parse_json_safely(txt):
              if not txt: return None
              clean = re.sub(r"^```(?:json)?\s*|\s*```$", "", txt.strip(), flags=re.I|re.DOTALL).strip()
              try:
                  return json.loads(clean)
              except Exception:
                  m = re.search(r"\{[\s\S]*\}", clean)
                  if m:
                      try: return json.loads(m.group(0))
                      except Exception: return None
              return None

          # ---------- PIPELINE STAGES ----------
          def stage_brief(raw_title, raw_text):
              prompt = (
                  "You receive a raw scraped Kenyan news article. Produce a STRICTLY FACTUAL JSON BRIEF.\n"
                  "Rules:\n"
                  "- NEVER copy or paraphrase whole sentences from the source.\n"
                  "- Extract entities and facts only. No opinions.\n"
                  "- All names, dates, numbers must be exactly as in source.\n"
                  "- If a field is unknown, use null or [].\n\n"
                  f"SOURCE TITLE: {raw_title}\n"
                  f"SOURCE TEXT:\n{raw_text[:9000]}\n\n"
                  "Return ONLY this JSON shape:\n"
                  "{\n"
                  '  "summary": "2-3 sentence neutral summary in your own words",\n'
                  '  "main_events": ["bullet 1","bullet 2","bullet 3"],\n'
                  '  "key_people": ["..."],\n'
                  '  "key_places": ["..."],\n'
                  '  "key_numbers": ["..."],\n'
                  '  "keywords": ["kenya-relevant","keywords"],\n'
                  '  "angle": "the most newsworthy angle in one sentence"\n'
                  "}"
              )
              return parse_json_safely(gemini_call(prompt, "brief", json_mode=True))

          def stage_seo(brief):
              prompt = (
                  "You write SEO metadata for a Kenyan news website (Za Ndani). "
                  "Use the JSON brief below. Return STRICT JSON only.\n\n"
                  f"BRIEF:\n{json.dumps(brief, ensure_ascii=False)}\n\n"
                  "Rules:\n"
                  "- title: under 65 chars, factual, no clickbait, no year, no brackets, no emoji.\n"
                  "- description: between 120 and 155 chars, plain prose, no quotes.\n"
                  "- slug: lowercase, hyphenated, max 70 chars, no stopwords-only, ASCII.\n"
                  "- tags: 4 to 7 lowercase tags relevant to Kenyan readers.\n\n"
                  'Return JSON: {"title":"...","description":"...","slug":"...","tags":["..."]}'
              )
              return parse_json_safely(gemini_call(prompt, "seo", json_mode=True))

          def stage_angle(brief, style, recent_angles):
              prompt = (
                  "Create a UNIQUE editorial angle plan for a Kenyan news article. Return STRICT JSON only.\n\n"
                  f"BRIEF:\n{json.dumps(brief, ensure_ascii=False)}\n\n"
                  f"STYLE PRESET: {style['name']} - {style['angle']}\n"
                  f"RECENT ANGLE SIGNATURES (avoid repeating): {json.dumps(recent_angles[-20:], ensure_ascii=False)}\n\n"
                  "Rules:\n"
                  "- Pick ONE dominant frame: story_progression, accountability, money_follow, timeline_shift, policy_gap, myth_vs_fact, winners_losers, next_48_hours.\n"
                  "- Must differ from recent signatures by frame OR consequence focus.\n"
                  "- Keep factual, no fabricated claims.\n"
                  "- Explain the editorial value of this framing.\n\n"
                  'Return JSON: {"angle_title":"...","frame":"...","why_unique":"...","editorial_value":"...","must_include":["...","..."],"avoid":["..."]}'
              )
              return parse_json_safely(gemini_call(prompt, "angle", json_mode=True))
          def stage_write(brief, seo, style, angle_plan, internal_links):
              prompt = (
                  f"You are {AUTHOR_NAME}, a Kenyan news journalist for Za Ndani.\n"
                  f"Today is {full_date_str} (East Africa Time).\n\n"
                  f"STYLE PRESET: {style['name']}\n"
                  f"- Format: {style['format']}\n"
                  f"- Lead style: {style['lead_style']}\n"
                  f"- Tone: {style['tone']}\n"
                  f"- Angle: {style['angle']}\n"
                  f"- Structure: {style['structure']}\n"
                  f"- Sentence mix: {style['sentence_mix']}\n"
                  f"- Closing: {style['closing']}\n\n"
                  f"WORKING TITLE: {seo.get('title','')}\n"
                  f"ANGLE PLAN: {json.dumps(angle_plan, ensure_ascii=False)}\n"
                  f"BRIEF:\n{json.dumps(brief, ensure_ascii=False)}\n\n"
                  f"{internal_links}\n"
                  "WRITE THE ARTICLE IN PURE MARKDOWN.\n"
                  "Hard rules:\n"
                  "- 550 to 750 words.\n"
                  "- Start with an H2 heading using a primary keyword.\n"
                  "- Then a 35 to 45 word standfirst paragraph.\n"
                  "- Use 2 or 3 H3 subheadings.\n"
                  "- No HTML. No frontmatter. No author byline. No date line. No 'By Celestine'.\n"
                  "- No first-person ('I', 'we', 'our') self-references.\n"
                  "- No em-dashes or en-dashes. Use single hyphens only.\n"
                  "- Do NOT mention or link to the original source publication or its brand.\n"
                  "- Do NOT echo whole sentences from the source. Reframe everything.\n"
                  f"- Banned phrases: {', '.join(BANNED_PHRASES)}.\n"
                  "- Deliver a distinct angle, not a source paraphrase.\n"
                  "- Start with a short H2 that is a fresh hook, not an echo of the SEO title.\n"
                  "- The opening paragraph must add a new fact or angle, not repeat the title, excerpt, or first eight words of the title.\n"
                  "- Do not repeat the headline in the first paragraph or use a templated summary block.\n"
                  "- Each paragraph must add new information; never restate the previous paragraph.\n"
                  "- Do not open with a generic relevance line like 'is central to this update for Kenyan readers.'\n"
                  "- Do not add sections titled 'What this means for Kenyans', 'Key facts', 'Search-ready summary', 'FAQ', or 'What is the most important takeaway?'.\n"
                  "- Stay with the story itself. Do not force a civic explainer into entertainment, culture, sports, tech, or celebrity coverage.\n"
                  "- The first line must report the actual development, not its broad relevance.\n"
                  "- Keep the article body focused on the story itself. Do not add FAQ blocks, Search-ready summary blocks, reader-impact sections, or generic wrap-up labels.\n"
                  "- Use angle_plan.must_include naturally and respect angle_plan.avoid.\n"
              )
              return gemini_call(prompt, "write")

          def stage_review(article_md, source_text):
              prompt = (
                  "Score the ARTICLE against the SOURCE TEXT and Za Ndani house style. "
                  "Return STRICT JSON only.\n\n"
                  f"ARTICLE:\n{article_md[:6000]}\n\n"
                  f"SOURCE:\n{source_text[:6000]}\n\n"
                  "Scoring rubric (1=excellent, 10=worst):\n"
                  "- source_similarity: how much it mirrors source phrasing.\n"
                  "- house_style_repetition: repeated stock phrases, summary blocks, or cliches.\n"
                  "- title_lede_repetition: how much the H2 and opening paragraph repeat the title, excerpt, or snippet.\n"
                  "- opening_redundancy: whether the first two paragraphs restate each other or the intro is padded.\n"
                  "- voice_variety: 1=flat monotone, 10=rich varied voice. NOTE: HIGHER IS BETTER for this one.\n\n"
                  'Return JSON: {"source_similarity":N,"house_style_repetition":N,"title_lede_repetition":N,"opening_redundancy":N,"voice_variety":N,"notes":"short"}'
              )
              return parse_json_safely(gemini_call(prompt, "review", json_mode=True))

          def stage_rewrite(article_md, review, style):
              prompt = (
                  "Rewrite the article to fix the issues flagged in the review. Keep all facts intact.\n\n"
                  f"REVIEW: {json.dumps(review, ensure_ascii=False)}\n\n"
                  f"STYLE PRESET: {style['name']} - {style['tone']}\n\n"
                  f"ARTICLE:\n{article_md}\n\n"
                  "Hard rules:\n"
                  "- Reduce source mirroring. Reframe sentence structure.\n"
                  "- Remove repeated stock phrases and cliches.\n"
                  "- Remove repeated title, snippet, and first-paragraph echoes.\n"
                  "- Vary sentence length and rhythm.\n"
                  "- Keep H2 + standfirst + H3 structure.\n"
                  "- No HTML, no frontmatter, no byline, no em-dashes.\n"
                  "- Remove Search-ready summary blocks and FAQ-style sections.\n"
                  "- 550 to 750 words.\n"
                  "Return only the rewritten Markdown."
              )
              return gemini_call(prompt, "rewrite")

          # ---------- RUN ----------
          links = get_target_urls()
          if not links:
              print("No links found")
              sys.exit(0)

          published_hashes = set(memory.get("published_hashes", []))

          chosen_text = None
          chosen_img  = None
          chosen_ttl  = None
          chosen_hash = None
          chosen_url  = None

          for link in links:
              h = hashlib.md5(link.encode()).hexdigest()
              if h in published_hashes:
                  continue
              text, img, ttl = scrape_article(link)
              if text and len(text) > 500:
                  chosen_text, chosen_img, chosen_ttl, chosen_hash, chosen_url = text, img, ttl or "Latest News", h, link
                  break
              time.sleep(1)

          if not chosen_text:
              print("Nothing usable to write")
              sys.exit(0)

          # Stage 1
          brief = stage_brief(chosen_ttl, chosen_text)
          if not brief or not brief.get("summary"):
              print("Brief failed")
              sys.exit(1)

          # Stage 2
          seo = stage_seo(brief)
          if not seo or not seo.get("title"):
              print("SEO failed")
              sys.exit(1)

          # Style rotation (Pillar 3)
          style = pick_style(memory.get("style_history", []))
          print(f"Style chosen: {style['name']}")
          angle_plan = stage_angle(brief, style, memory.get("angle_history", [])) or {}
          if not angle_plan:
              angle_plan = {"angle_title":"Straight story angle","frame":"story_progression","why_unique":"Fallback keeps the article on the actual development instead of forcing a generic explainer","editorial_value":"Keeps the writing anchored in fresh reporting","must_include":["one clear new fact","one specific reaction or consequence tied to the story"],"avoid":["copying source structure","FAQ blocks","generic wrap-up labels","What this means for Kenyans","Key facts"]}
          print(f"Angle chosen: {angle_plan.get('frame','n/a')} | {angle_plan.get('angle_title','n/a')}")

          # Stage 3
          article_md = stage_write(brief, seo, style, angle_plan, get_internal_links())
          if not article_md:
              print("Write failed")
              sys.exit(1)

          # Stage 4
          review = stage_review(article_md, chosen_text) or {}
          sim  = int(review.get("source_similarity", 0) or 0)
          rep  = int(review.get("house_style_repetition", 0) or 0)
          tlede = int(review.get("title_lede_repetition", 0) or 0)
          openr = int(review.get("opening_redundancy", 0) or 0)
          voc  = int(review.get("voice_variety", 10) or 10)
          print(f"Review: sim={sim} rep={rep} tlede={tlede} open={openr} voice={voc} notes={review.get('notes','')}")
          if sim >= 7 or rep >= 7 or tlede >= 7 or openr >= 7 or voc <= 4:
              print("Triggering rewrite")
              rewritten = stage_rewrite(article_md, review, style)
              if rewritten and len(rewritten) > 400:
                  article_md = rewritten

          # Soft uniqueness retry: never block publishing
          if sim >= 8 or tlede >= 8 or openr >= 8:
              alt_recent = memory.get("angle_history", []) + [angle_plan.get("frame", "")]
              alt_angle = stage_angle(brief, style, alt_recent) or angle_plan
              alt_md = stage_write(brief, seo, style, alt_angle, get_internal_links())
              if alt_md and len(alt_md) > 400:
                  article_md = alt_md
                  angle_plan = alt_angle
                  print("Applied alternate uniqueness angle (soft retry)")

          # Cleanup
          article_md = re.sub(r"^```(?:markdown)?\n?", "", article_md).rstrip("`").rstrip().strip()
          article_md = re.sub(r"^(Title|By|Author|Date)\s*:\s*.*?$", "", article_md, flags=re.I|re.M)
          article_md = article_md.replace("\u2014","-").replace("\u2013","-")
          article_md = scrub_source_leaks(article_md)
          article_md = strip_article_boilerplate(article_md)

          # Image
          if chosen_img:
              final_image = upload_to_imgbb(chosen_img)
          else:
              q = "kenya nairobi " + (brief.get("keywords") or ["news"])[0]
              final_image = get_unsplash_image(q)

          # Frontmatter
          slug = (seo.get("slug") or re.sub(r"[^a-z0-9]+","-", seo["title"].lower()).strip("-"))[:70]
          tags = seo.get("tags") or brief.get("keywords") or []
          tags_yaml = "[" + ", ".join(f'"{t}"' for t in tags[:8]) + "]"
          desc = (seo.get("description") or brief.get("summary","")).strip().replace('"',"'")

          os.makedirs(POSTS_DIR, exist_ok=True)
          frontmatter = (
              "---\n"
              f'title: "{seo["title"].replace(chr(34), chr(39))}"\n'
              f'slug: "{slug}"\n'
              f'description: "{desc}"\n'
              f'author: "{AUTHOR_NAME}"\n'
              f'authorUrl: "{SITE_BASE_URL}/author/{AUTHOR_SLUG}"\n'
              f'image: "{final_image}"\n'
              f'category: "{CATEGORY}"\n'
              f'tags: {tags_yaml}\n'
              f'date: "{publish_ts}"\n'
              f'dateModified: "{publish_ts}"\n'
              f'schema: "NewsArticle"\n'
              "---\n\n"
          )
          final_doc = frontmatter + article_md.strip() + "\n"

          filepath = os.path.join(POSTS_DIR, f"{today_str}-{slug}.md")
          with open(filepath, "w", encoding="utf-8") as f:
              f.write(final_doc)
          print(f"Saved {filepath}")

          # Persist memory
          memory.setdefault("published_hashes", []).append(chosen_hash)
          memory.setdefault("style_history", []).append(style["name"])
          angle_signature = f"{angle_plan.get('frame','unknown')}|{(brief.get('keywords') or ['na'])[0]}|{style['name']}"
          memory.setdefault("angle_history", []).append(angle_signature)
          save_memory(memory)
          print("Memory updated")
          PYEOF
          python _pipeline.py

      - name: Git safety pull
        run: |
          git config --global user.name  "Za Ndani"
          git config --global user.email "bot@zandani.co.ke"
          git add -A
          git stash -u || true
          git fetch origin "${DEFAULT_BRANCH}"
          git pull origin "${DEFAULT_BRANCH}" --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani <bot@zandani.co.ke>"
          commit_message: "content: Celestine Nzioka news report"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_celestine_news.json'





