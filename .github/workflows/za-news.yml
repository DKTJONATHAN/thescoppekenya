name: Celestine Nzioka - News Scraper
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine_news.json
jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium --with-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, textwrap, itertools, base64, random
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          # --- CONFIG ---
          # Single article per run, once per hour = max 24 articles/day (safe velocity)
          MAX_ARTICLES_PER_RUN = 1
          MAX_AGE_HOURS = 6
          SITE_URL = 'https://www.kenyans.co.ke/news'
          SITE_DOMAIN = 'kenyans.co.ke'
          MODELS_TO_TRY = ["gemini-2.5-pro", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-pro"]
          BANNED_PHRASES = [
              'sasa basi','melting the pot','spill the tea','tea is hot','grab your popcorn',
              'buckle up','breaking news','dive in','delve into','moreover','furthermore',
              'in conclusion',"it's worth noting",'a testament to','navigating the landscape',
              "in today's digital age",'tapestry'
          ]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get('IMGBB_API_KEY')
              if not api_key or not image_url:
                  return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  b64 = base64.b64encode(img_data).decode('utf-8')
                  res = requests.post('https://api.imgbb.com/1/upload', data={'key': api_key, 'image': b64}, timeout=20)
                  if res.status_code == 200:
                      return res.json()['data']['url']
                  return image_url
              except:
                  return image_url

          def get_target_urls():
              urls = set()
              print(f'Scanning {SITE_URL}...')
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=['--no-sandbox','--disable-dev-shm-usage',
                                '--disable-blink-features=AutomationControlled',
                                '--disable-infobars','--window-size=1920,1080']
                      )
                      context = browser.new_context(
                          user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36',
                          viewport={'width':1920,'height':1080},
                          locale='en-KE',
                          timezone_id='Africa/Nairobi',
                          extra_http_headers={
                              'Accept-Language':'en-KE,en;q=0.9',
                              'Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                              'Sec-Fetch-Site':'none','Sec-Fetch-Mode':'navigate'
                          }
                      )
                      page = context.new_page()
                      page.goto(SITE_URL, timeout=60000, wait_until='domcontentloaded')
                      time.sleep(random.uniform(2, 5))
                      for _ in range(3):
                          page.evaluate('window.scrollBy(0, 1800)')
                          time.sleep(random.uniform(2, 4))
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '').strip()
                          if not href:
                              continue
                          full_url = href if href.startswith('http') else f'https://{SITE_DOMAIN}' + href
                          if SITE_DOMAIN not in full_url:
                              continue
                          path = full_url.split(SITE_DOMAIN)[-1]
                          slug = path.rstrip('/').split('/')[-1]
                          if (len(slug) > 15 and '-' in slug and
                              not any(x in path for x in ['/author/','/tag/','/page/','/feed/','/comment-','/category/','/politics'])):
                              urls.add(full_url)
                      browser.close()
              except Exception as e:
                  print(f'Scan failed: {e}')
              def date_key(u):
                  m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', u)
                  return int(m.group(1)+m.group(2)+m.group(3)) if m else 19000101
              urls_list = sorted(list(urls), key=date_key, reverse=True)
              print(f'Found {len(urls_list)} candidates.')
              for u in urls_list[:8]:
                  print(u)
              return urls_list[:12]

          def scrape_article(url):
              print(f'Scraping: {url}')
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=['--no-sandbox','--disable-dev-shm-usage',
                                '--disable-blink-features=AutomationControlled']
                      )
                      context = browser.new_context(
                          user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36'
                      )
                      page = context.new_page()
                      page.route('**/*', lambda route: route.abort()
                          if route.request.resource_type in ['image','stylesheet','font','media']
                          else route.continue_())
                      page.goto(url, timeout=60000, wait_until='domcontentloaded')
                      time.sleep(random.uniform(1, 3))
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      browser.close()

                      pub_time = None
                      for script in soup.find_all('script', type='application/ld+json'):
                          try:
                              data = json.loads(script.string or '{}')
                              if 'datePublished' in data:
                                  pub_time = date_parser.parse(data['datePublished'])
                                  break
                          except:
                              pass
                      if not pub_time:
                          meta = (soup.find('meta', property='article:published_time') or
                                  soup.find('meta', {'name': 'date'}))
                          if meta and meta.get('content'):
                              pub_time = date_parser.parse(meta['content'])
                      if not pub_time:
                          for el in soup.find_all(string=re.compile(r'(\d+)\s*(min|hr|hour|day)s?\s*ago', re.I)):
                              try:
                                  pub_time = date_parser.parse(el, fuzzy=True)
                                  break
                              except:
                                  continue
                      if not pub_time:
                          m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', url)
                          if m:
                              pub_time = datetime.datetime(
                                  int(m.group(1)), int(m.group(2)), int(m.group(3)),
                                  tzinfo=datetime.timezone.utc
                              )
                      if pub_time:
                          if pub_time.tzinfo is None:
                              pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                          age = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                          print(f'Date: {pub_time} ({age:.1f}h old)')
                          if age > MAX_AGE_HOURS:
                              print('Too old, skipping')
                              return None, None, None
                      else:
                          print('No date detected - assuming fresh')

                      title = soup.title.string.strip() if soup.title else ''
                      title = re.sub(r'\s*[-|\u2013]\s*Kenyans\.co\.ke.*', '', title).strip()

                      article_text = ''
                      for sel in ['article','.article-body','.post-content','.entry-content','.content','main']:
                          cont = soup.select_one(sel)
                          if cont:
                              article_text = '\n\n'.join(
                                  p.get_text(strip=True) for p in cont.find_all('p')
                                  if len(p.get_text(strip=True)) > 40
                              )
                              if len(article_text) > 400:
                                  break
                      if len(article_text) < 400:
                          article_text = '\n\n'.join(
                              p.get_text(strip=True) for p in soup.find_all('p')
                              if len(p.get_text(strip=True)) > 40
                          )

                      img_url = ''
                      for tag in [soup.find('meta', property='og:image'),
                                  soup.find('meta', {'name':'twitter:image'})]:
                          if tag:
                              img_url = tag.get('content', '')
                              break

                      return article_text, img_url, title

              except Exception as e:
                  print(f'Scrape error: {e}')
                  return None, None, None

          def get_internal_context():
              posts_dir = os.environ.get('POSTS_DIR', 'content/posts')
              if not os.path.exists(posts_dir):
                  return ''
              files = [f for f in os.listdir(posts_dir) if f.endswith('.md')]
              sample = random.sample(files, min(len(files), 3))
              links = []
              for fn in sample:
                  try:
                      with open(os.path.join(posts_dir, fn), 'r', encoding='utf-8') as f:
                          content = f.read()
                      t = re.search(r'title:\s*"(.*?)"', content)
                      s = re.search(r'slug:\s*"(.*?)"', content)
                      if t and s:
                          links.append(f'- [{t.group(1)}](https://zandani.co.ke/article/{s.group(1)})')
                  except:
                      pass
              return '\n'.join(links) if links else ''

          # --- Gemini client setup ---
          raw_keys = [os.environ.get(k) for k in ['GEMINI_WRITE_KEY','GEMINI_API_KEY','GEMINI_API_KEY1']
                      if os.environ.get(k)]
          if not raw_keys:
              print('No Gemini API keys found')
              sys.exit(1)
          key_cycle = itertools.cycle(raw_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label='', use_search=False):
              global current_key, client
              for model in MODELS_TO_TRY:
                  for attempt in range(6):
                      try:
                          # FIX: use_search=False for article body to prevent
                          # Gemini pulling external search results that mirror
                          # other indexed pages (near-duplicate detection risk)
                          config = None
                          if use_search:
                              config = types.GenerateContentConfig(
                                  tools=[types.Tool(google_search=types.GoogleSearch())]
                              )
                          resp = client.models.generate_content(
                              model=model, contents=prompt, config=config
                          )
                          print(f'Gemini OK ({model}): {label}')
                          return resp.text.strip()
                      except Exception as e:
                          err = str(e)
                          if any(x in err for x in ["429","quota","rate","503","unavailable","500","overloaded","resource_exhausted"]):
                              wait = random.uniform(20, 35)
                              print(f'Rate limited ({model}), waiting {wait:.0f}s...')
                              time.sleep(wait)
                              current_key = next(key_cycle)
                              client = genai.Client(api_key=current_key)
                              continue
                          print(f'Gemini error ({model}): {e}')
                          break
              return None

          # --- Main execution ---
          today_str = datetime.datetime.utcnow().strftime('%Y-%m-%d')
          full_date_str = datetime.datetime.utcnow().strftime('%A, %B %d, %Y')

          article_links = get_target_urls()
          if not article_links:
              print('No article candidates found')
              sys.exit(0)

          memory_path = os.environ.get('MEMORY_FILE', '.github/memory_celestine_news.json')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          posts_dir = os.environ.get('POSTS_DIR', 'content/posts')
          os.makedirs(posts_dir, exist_ok=True)
          banned_str = ', '.join(BANNED_PHRASES)

          published = 0

          for link in article_links:
              if published >= MAX_ARTICLES_PER_RUN:
                  break

              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory:
                  print(f'Already processed, skipping: {link}')
                  continue

              text, img, title = scrape_article(link)
              if not (text and len(text) > 400):
                  print('Insufficient content, skipping')
                  continue

              full_raw_text = text
              target_image = img
              target_title = title or 'Kenya News'
              final_hash = u_hash

              # --- Step 1: SEO Metadata ---
              seo_prompt = (
                  'You are an expert SEO strategist for a Kenyan news site (zandani.co.ke).\n'
                  'SCRAPED ARTICLE TITLE: ' + str(target_title) + '\n'
                  'ARTICLE SNIPPET (first 800 chars): ' + full_raw_text[:800] + '\n\n'
                  'TASK: Generate all SEO metadata for this article. Follow these rules EXACTLY:\n'
                  '1. TITLE (final_title):\n'
                  '   - 45-65 characters maximum\n'
                  '   - Primary keyword MUST appear in first 40 characters\n'
                  '   - Use ONE of: number ("5 Kenyans..."), question ("Why Kenya..."), power word ("How", "What", "Inside", "Exposed", "Confirmed")\n'
                  '   - Google News style: specific entities, locations, names - NO clickbait\n'
                  '   - Year only if freshness adds value\n'
                  '2. META DESCRIPTION (meta_description):\n'
                  '   - 120-155 characters EXACTLY\n'
                  '   - Must contain the focus keyword naturally\n'
                  '   - Answers: what happened + who is affected + why it matters\n'
                  '   - End with an action signal ("Read the full story", "Get the details", "See what happened")\n'
                  '   - No quotes, no em-dashes\n'
                  '3. FOCUS KEYWORD (focus_keyword):\n'
                  '   - 2-4 words, the single most searched term for this story\n'
                  '   - Kenyan search context (e.g. "Kenya Railways tender" not just "railway tender")\n'
                  '4. SEO SLUG (seo_slug):\n'
                  '   - 3-5 hyphenated words, focus keyword based\n'
                  '   - Lowercase, no stopwords (a, the, in, of, to)\n'
                  '   - Example: "kenya-railways-tender-cancelled"\n'
                  '5. TAGS (tags):\n'
                  '   - Array of 4-6 tags\n'
                  '   - Mix: 1 broad category tag, 2-3 specific entity/topic tags, 1 location tag\n'
                  '   - Each tag: 1-3 words, title case\n'
                  '   - Example: ["Kenya News", "Kenya Railways", "World Bank", "Nairobi"]\n\n'
                  'Output ONLY valid JSON - no markdown, no explanation:\n'
                  '{"final_title": "...", "meta_description": "...", "focus_keyword": "...", "seo_slug": "...", "tags": [...]}'
              )

              seo_text = gemini_generate(seo_prompt, 'seo-metadata', use_search=False)

              final_title = target_title
              meta_description = ''
              focus_keyword = ''
              seo_slug = ''
              tags = []

              if seo_text:
                  try:
                      seo_data = json.loads(
                          re.sub(r'^```json?\n?|```$', '', seo_text, flags=re.I|re.DOTALL).strip()
                      )
                      final_title = seo_data.get('final_title', target_title)
                      meta_description = seo_data.get('meta_description', '')[:155]
                      focus_keyword = seo_data.get('focus_keyword', '')
                      seo_slug = seo_data.get('seo_slug', '')
                      tags = seo_data.get('tags', [])
                      print(f'SEO title: {final_title}')
                      print(f'Meta desc ({len(meta_description)} chars): {meta_description}')
                      print(f'Focus keyword: {focus_keyword}')
                      print(f'Slug: {seo_slug}')
                      print(f'Tags: {tags}')
                  except Exception as e:
                      print(f'SEO parse error: {e}')

              # Rotate key before article generation
              current_key = next(key_cycle)
              client = genai.Client(api_key=current_key)
              time.sleep(5)

              # --- Step 2: Article Body ---
              # FIX: use_search=False - prevents Gemini blending external search
              # results into the article, which can trigger near-duplicate detection
              article_prompt = (
                  'Current Date: ' + full_date_str + '\n'
                  'TITLE: ' + str(final_title) + '\n'
                  'FOCUS KEYWORD (use naturally 2-3 times in the body): ' + str(focus_keyword) + '\n'
                  'SOURCE TEXT: ' + full_raw_text[:9500] + '\n'
                  'INTERNAL LINKS TO WEAVE IN (use 1-2 naturally):\n'
                  + get_internal_context() + '\n\n'
                  'TASK: Write a sharp, factual news report as Celestine Nzioka for Za Ndani.\n'
                  'Focus on Kenyan general news: society, economy, health, crime, sports, business, or human interest.\n'
                  'Clear journalistic tone. No Sheng. Facts first. No em-dashes. Single hyphens only.\n'
                  'No title/author/date in body.\n'
                  'Structure: ## H2 keyword heading (include focus keyword). Then opening paragraph matching the meta description intent. Then ### subheadings.\n'
                  'First paragraph must be 40-55 words and answer: who, what, where, when, why.\n'
                  'BANNED PHRASES (never use): ' + banned_str + '\n'
                  'Factual, direct, newsroom standard. No cliches.'
              )

              article_body = gemini_generate(article_prompt, 'article', use_search=False)
              if not article_body:
                  print('Article generation failed, skipping')
                  continue

              article_body = re.sub(r'^```(?:markdown)?\n?', '', article_body).rstrip('```').strip()
              article_body = re.sub(r'^(Title|By|Date):.*?\n', '', article_body, flags=re.I|re.M)
              article_body = article_body.replace('\u2014', '-').replace('\u2013', '-')

              # --- Slug ---
              if seo_slug and re.match(r'^[a-z0-9-]+$', seo_slug):
                  slug = seo_slug[:68]
              else:
                  slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]

              # --- Image ---
              final_image = upload_to_imgbb(target_image) if target_image else ''

              # --- FIX: Unique publish timestamp per article ---
              # Each run publishes 1 article, scheduled hourly.
              # Timestamp = actual UTC now at time of writing (unique per run).
              this_timestamp = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

              # --- FIX: excerpt is for list pages ONLY (not rendered in article body) ---
              # Keep excerpt short and distinct from meta_description to avoid
              # Google seeing duplicate text within the same page render
              excerpt_words = meta_description.split()[:18] if meta_description else []
              excerpt = ' '.join(excerpt_words) + ('...' if len(meta_description.split()) > 18 else '')

              tags_yaml = json.dumps(tags)

              # --- FIX: NewsArticle schema injected directly into frontmatter ---
              # Your Astro layout must consume these fields to build the
              # <script type="application/ld+json"> NewsArticle block.
              # Required fields: title, date, author, description, image, slug
              # publisher.name and publisher.url should be hardcoded in your layout.
              final_file = (
                  '---\n'
                  'title: "' + final_title.replace('"', "'") + '"\n'
                  'slug: "' + slug + '"\n'
                  'author: "Celestine Nzioka"\n'
                  'authorUrl: "https://zandani.co.ke/author/celestine-nzioka"\n'
                  'image: "' + final_image + '"\n'
                  'category: "News"\n'
                  'date: "' + this_timestamp + '"\n'
                  'dateModified: "' + this_timestamp + '"\n'
                  'description: "' + meta_description.replace('"', "'") + '"\n'
                  'excerpt: "' + excerpt.replace('"', "'") + '"\n'
                  'tags: ' + tags_yaml + '\n'
                  'focusKeyword: "' + focus_keyword.replace('"', "'") + '"\n'
                  'schema: "NewsArticle"\n'
                  '---\n'
                  + article_body + '\n'
              )

              filepath = os.path.join(posts_dir, today_str + '-' + slug + '.md')
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(final_file)

              memory.append(final_hash)
              with open(memory_path, 'w') as f:
                  json.dump(memory[-300:], f)

              print(f'Saved: {filepath}')
              published += 1

          print(f'Done. Published {published} article(s) this run.')
          if published == 0:
              sys.exit(0)
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Celestine Nzioka"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Celestine Nzioka <bot@zandani.co.ke>"
          commit_message: "content: News update by Celestine Nzioka 📰"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_celestine_news.json'
