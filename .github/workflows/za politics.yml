name: Celestine Nzioka - Politics Scraper

on:
  schedule:
    # Runs at 06:10 and 14:10 UTC
    # Spaced between Wanjiku (:00) and Elizabeth (:22)
    - cron: '10 6,14 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate Political Analysis with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python - <<'PYEOF'
          import os, json, datetime, requests, re, time, sys, hashlib, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  payload = {"key": api_key, "image": base64.b64encode(img_data).decode('utf-8')}
                  res = requests.post("https://api.imgbb.com/1/upload", data=payload, timeout=20)
                  return res.json()['data']['url'] if res.status_code == 200 else image_url
              except: return image_url

          def get_politics_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto('https://www.kenyans.co.ke/news/politics', timeout=60000, wait_until="domcontentloaded")
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if '/news/' in href and len(href) > 25:
                              full = href if href.startswith('http') else 'https://www.kenyans.co.ke' + href
                              urls.append(full)
                      browser.close()
              except: pass
              return list(set(urls))

          def scrape_article(url):
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto(url, timeout=45000, wait_until="domcontentloaded")
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()
                      
                      # Freshness check (10 hours)
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 10: return None, None, None
                      
                      title = soup.find('title').get_text().replace(' - Kenyans.co.ke', '').strip()
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      # Get text from primary content area
                      text = "\n\n".join([p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 50])
                      return text, img, title
              except: return None, None, None

          # API Setup
          api_keys = [k for k in [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")] if k]
          key_cycle = itertools.cycle(api_keys)
          client = genai.Client(api_key=next(key_cycle))

          links = get_politics_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          for link in links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              
              raw_text, target_img, target_title = scrape_article(link)
              if raw_text and len(raw_text) > 500:
                  # Celestine's Persona Logic
                  prompt = f"Persona: Celestine Nzioka (Cynical, Authoritative Kenyan Political Journalist). Source: {raw_text[:8000]}. Task: Write a sharp political analysis. No dashes. Start with H2. FORMAT: SLUG: [slug], EXCERPT: [max 160 chars], BODY: [Full content]."
                  
                  try:
                      resp = client.models.generate_content(model=MODELS_TO_TRY[0], contents=prompt, config=types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]))
                      full_resp = resp.text.strip()
                      
                      slug = re.search(r"SLUG:\s*(.*)", full_resp).group(1).strip()
                      excerpt = re.search(r"EXCERPT:\s*(.*)", full_resp).group(1).strip()
                      body = full_resp.split("BODY:")[-1].strip()
                      
                      final_img = upload_to_imgbb(target_img)
                      
                      with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f:
                          f.write(f"---\ntitle: \"{target_title}\"\nslug: \"{slug}\"\nexcerpt: \"{excerpt}\"\nauthor: \"Celestine Nzioka\"\nimage: \"{final_img}\"\ncategory: \"Politics\"\ndate: \"{today_str}\"\n---\n\n{body}")
                      
                      memory.append(u_hash)
                      with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
                      print(f"Success: {slug}")
                      break
                  except Exception as e: print(f"Generation failed: {e}")
          PYEOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Celestine Nzioka"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Celestine Nzioka <bot@zandani.co.ke>"
          commit_message: "content: Political update by Celestine Nzioka 🏛️"
          file_pattern: 'content/posts/*.md .github/memory_celestine.json'
