name: Celestine Nzioka - Politics Scraper
on:
  schedule:
    - cron: '10 6,14 * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine.json
jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium --with-deps
      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, textwrap, itertools, base64, random
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]
          MAX_AGE_HOURS = 24
          SITE_URL = "https://www.kenyans.co.ke/news/politics"
          SITE_DOMAIN = "kenyans.co.ke"
          BANNED_PHRASES = ["online debate in Kenya", "ignited a fiery online debate", "sparked a debate across", "caused a lot of online debate", "this April 2026", "this March 2026", "sasa basi","melting the pot","spill the tea","tea is hot","grab your popcorn","buckle up","breaking news","dive in","delve into","moreover","furthermore","in conclusion","it's worth noting","a testament to","navigating the landscape","in today's digital age","tapestry"]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  b64 = base64.b64encode(img_data).decode('utf-8')
                  res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": b64}, timeout=20)
                  if res.status_code == 200: return res.json()['data']['url']
                  return image_url
              except: return image_url

          def get_target_urls():
              urls_list = []
              seen = set()
              print(f"Scanning {SITE_URL}...")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled","--disable-infobars","--window-size=1920,1080"])
                      context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36", viewport={"width":1920,"height":1080}, locale="en-KE", timezone_id="Africa/Nairobi", extra_http_headers={"Accept-Language":"en-KE,en;q=0.9","Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8","Sec-Fetch-Site":"none","Sec-Fetch-Mode":"navigate"})
                      page = context.new_page()
                      page.goto(SITE_URL, timeout=60000, wait_until="networkidle")
                      time.sleep(random.uniform(2, 5))
                      for _ in range(3):
                          page.evaluate("window.scrollBy(0, 1800)")
                          time.sleep(random.uniform(2, 4))
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '').strip()
                          if not href: continue
                          full_url = href if href.startswith('http') else f'https://{SITE_DOMAIN}' + href
                          if SITE_DOMAIN not in full_url: continue
                          path = full_url.split(SITE_DOMAIN)[-1]
                          slug = path.rstrip('/').split('/')[-1]
                          if (len(slug) > 15 and '-' in slug and not any(x in path for x in ['/author/','/tag/','/page/','/feed/','/comment-','/category/'])):
                              if full_url not in seen:
                                  seen.add(full_url)
                                  urls_list.append(full_url)
                      browser.close()
              except Exception as e: print(f"Scan failed: {e}")
              print(f"Found {len(urls_list)} candidates.")
              for u in urls_list[:8]: print(u)
              return urls_list[:12]

          def scrape_article(url):
              print(f"Scraping: {url}")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled"])
                      context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36")
                      page = context.new_page()
                      page.route("**/*", lambda route: route.abort() if route.request.resource_type in ["image","stylesheet","font","media"] else route.continue_())
                      page.goto(url, timeout=60000, wait_until="domcontentloaded")
                      time.sleep(random.uniform(1, 3))
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()
                      pub_time = None
                      for script in soup.find_all('script', type='application/ld+json'):
                          try:
                              data = json.loads(script.string or '{}')
                              if 'datePublished' in data: pub_time = date_parser.parse(data['datePublished']); break
                          except: pass
                      if not pub_time:
                          meta = soup.find('meta', property='article:published_time') or soup.find('meta', {'name': 'date'})
                          if meta and meta.get('content'): pub_time = date_parser.parse(meta['content'])
                      if not pub_time:
                          for el in soup.find_all(string=re.compile(r'(\d+)\s*(min|hr|hour|day)s?\s*ago', re.I)):
                              try: pub_time = date_parser.parse(el, fuzzy=True); break
                              except: continue
                      if not pub_time:
                          m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', url)
                          if m: pub_time = datetime.datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), tzinfo=datetime.timezone.utc)
                      if pub_time:
                          if pub_time.tzinfo is None: pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                          age = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                          print(f"Date: {pub_time} ({age:.1f}h old)")
                          if age > MAX_AGE_HOURS: print("Too old"); return None, None, None
                      else: print("No date - assume fresh")
                      title = soup.title.string.strip() if soup.title else ""
                      title = re.sub(r'\s*[-|\u2013]\s*Kenyans\.co\.ke.*', '', title).strip()
                      article_text = ""
                      for sel in ['article','.article-body','.post-content','.entry-content','.content','main']:
                          cont = soup.select_one(sel)
                          if cont:
                              article_text = "\n\n".join(p.get_text(strip=True) for p in cont.find_all('p') if len(p.get_text(strip=True)) > 40)
                              if len(article_text) > 400: break
                      if len(article_text) < 400:
                          article_text = "\n\n".join(p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 40)
                      img_url = ""
                      for tag in [soup.find('meta', property='og:image'), soup.find('meta', {'name':'twitter:image'})]:
                          if tag: img_url = tag.get('content', ''); break
                      return article_text, img_url, title
              except Exception as e: print(f"Scrape error: {e}"); return None, None, None

          def get_internal_context():
              posts_dir = os.environ.get("POSTS_DIR", "content/posts")
              if not os.path.exists(posts_dir): return ""
              files = [f for f in os.listdir(posts_dir) if f.endswith(".md")]
              sample = random.sample(files, min(len(files), 3))
              links = []
              for fn in sample:
                  try:
                      with open(os.path.join(posts_dir, fn), "r", encoding="utf-8") as f: content = f.read()
                      t = re.search(r'title:\s*"(.*?)"', content); s = re.search(r'slug:\s*"(.*?)"', content)
                      if t and s: links.append(f'- [{t.group(1)}](https://zandani.co.ke/article/{s.group(1)})')
                  except: pass
              return "\n".join(links) if links else ""

          raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1"] if os.environ.get(k)]
          if not raw_keys: print("No Gemini keys"); sys.exit(1)
          key_cycle = itertools.cycle(raw_keys); current_key = next(key_cycle); client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              prompt_variants = [prompt]
              if len(prompt) > 12000:
                  prompt_variants.append(prompt[:12000])
              if len(prompt) > 8000:
                  prompt_variants.append(prompt[:8000])

              phases = []
              if use_search:
                  phases.append((True, "search"))
              phases.append((False, "no-search"))

              for use_search_now, phase_name in phases:
                  for variant_index, prompt_variant in enumerate(prompt_variants, start=1):
                      for model in MODELS_TO_TRY:
                          for _ in range(len(raw_keys)):
                              try:
                                  config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search_now else None
                                  resp = client.models.generate_content(model=model, contents=prompt_variant, config=config)
                                  print(f"Gemini OK ({model}, {phase_name}, prompt {variant_index}): {label}")
                                  return resp.text.strip()
                              except Exception as e:
                                  err = str(e).lower()
                                  if any(x in err for x in ["429", "quota", "rate", "resource exhausted", "unavailable", "overloaded", "busy", "timeout"]):
                                      time.sleep(random.uniform(8, 16))
                                      current_key = next(key_cycle)
                                      client = genai.Client(api_key=current_key)
                                      continue
                                  print(f"Gemini error ({model}, {phase_name}, prompt {variant_index}): {e}")
                                  current_key = next(key_cycle)
                                  client = genai.Client(api_key=current_key)
                                  break
              return None

          def clean_generated_title(raw_title):
              if not raw_title:
                  return ""
              clean = re.sub(r'^```json?\s*|\s*```$', '', raw_title, flags=re.I | re.DOTALL).strip()
              try:
                  parsed = json.loads(clean)
                  if isinstance(parsed, dict):
                      clean = str(parsed.get("final_title", "")).strip()
                  else:
                      clean = str(parsed).strip()
              except Exception:
                  clean = clean.splitlines()[0].strip()
              clean = re.sub(r'^["\'`]+|["\'`]+$', '', clean).strip()
              clean = re.sub(r'\s+', ' ', clean)
              clean = re.sub(r'\s*[|:;-]+\s*$', '', clean).strip()
              return clean

          def tighten_title(title, max_len=65):
              title = re.sub(r'\s+', ' ', (title or "")).strip(" .,:;!-")
              if len(title) <= max_len:
                  return title
              window = title[:max_len + 1]
              split_match = list(re.finditer(r'\b(?:after|amid|over|as|for|from|with|on|in|at)\b', window, flags=re.I))
              if split_match:
                  cut = split_match[-1].start()
                  if cut >= 28:
                      return window[:cut].strip(" .,:;!-")
              return window[:max_len].rsplit(' ', 1)[0].strip(" .,:;!-")

          article_links = get_target_urls()
          if not article_links: print("No candidates"); sys.exit(0)
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          full_raw_text, target_image, target_title, final_hash = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article(link)
              if text and len(text) > 400:
                  full_raw_text, target_image, target_title, final_hash = text, img, title or "Kenya Politics", u_hash; break
          if not full_raw_text: print("No fresh valid article"); sys.exit(0)

          title_prompt = (
              "SCRAPED ARTICLE TITLE: " + target_title + "\n"
              "ARTICLE SNIPPET:\n" + full_raw_text[:1200] + "\n"
              "TASK: Write a new high-CTR, SEO-optimized title for this article.\n"
              "RULES: Focus on major keywords from the content. Do NOT just copy the scraped title. Keep it under 65 characters. Plain reporting tone. No clickbait or hype words. Title must be a complete headline, not a fragment. Output ONLY JSON: {\"final_title\": \"...\"}\n"
          )
          title_text = gemini_generate(title_prompt, "title")
          final_title = tighten_title(target_title)
          parsed_title = clean_generated_title(title_text)
          if parsed_title:
              final_title = tighten_title(parsed_title)

          current_key = next(key_cycle); client = genai.Client(api_key=current_key); time.sleep(2)
          excerpt_prompt = (
              "Write a single SEO meta description (140-155 characters) for this political article.\n"
              "TITLE: " + final_title + "\n"
              "CONTENT: " + full_raw_text[:800] + "\n"
              "Rules: Factual, no clickbait, starts with the subject or a verb, includes the key news fact. Output ONLY JSON: {\"excerpt\": \"...\"}"
          )
          excerpt_text = gemini_generate(excerpt_prompt, "excerpt")
          final_excerpt = ""
          if excerpt_text:
              try: final_excerpt = json.loads(re.sub(r"^```json?\n?|```$", "", excerpt_text, flags=re.I|re.DOTALL).strip()).get('excerpt', "")[:160]
              except: pass

          current_key = next(key_cycle); client = genai.Client(api_key=current_key); time.sleep(5)
          article_prompt = f"""Current Date: {full_date_str}
          TITLE: {final_title}
          SOURCE TEXT: {full_raw_text[:9500]}
          INTERNAL LINKS TO WEAVE IN (use 1-2 naturally):
          {get_internal_context()}

          TASK: Write a sharp, authoritative political analysis as Celestine Nzioka for Za Ndani.
          Focus on Kenyan politics. Professional tone. No Sheng. Facts first. No em-dashes. Single hyphens only.
          No title/author/date in body.
          Start with ## H2 keyword heading. Then 35-45 word summary. Then ### subheadings.
          BANNED PHRASES (never use): {", ".join(BANNED_PHRASES)}
          Factual, direct, political context. No cliches."""
          article_text = gemini_generate(article_prompt, "article", use_search=True)
          if not article_text: sys.exit(1)
          article_text = re.sub(r"^```(?:markdown)?\n?", "", article_text).rstrip("```").strip()
          article_text = re.sub(r"^(Title|By|Date):.*?\n", "", article_text, flags=re.I|re.M)
          article_text = article_text.replace('\u2014', '-').replace('\u2013', '-')
          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]
          final_image = upload_to_imgbb(target_image) if target_image else ""
          posts_dir = os.environ.get("POSTS_DIR", "content/posts"); os.makedirs(posts_dir, exist_ok=True)
          final_file = textwrap.dedent(f"""\
          ---
          title: "{final_title.replace('"', "'")}"
          slug: "{slug}"
          excerpt: "{final_excerpt.replace('"', "'")}"
          author: "Celestine Nzioka"
          image: "{final_image}"
          category: "Politics"
          date: "{publish_timestamp}"
          ---
          {article_text}
          """)
          filepath = os.path.join(posts_dir, f"{today_str}-{slug}.md")
          with open(filepath, "w", encoding="utf-8") as f: f.write(final_file)
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-300:], f)
          print(f"Saved: {filepath}")
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Celestine Nzioka"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u || true
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Celestine Nzioka <bot@zandani.co.ke>"
          commit_message: "content: Politics article by Celestine Nzioka"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_celestine.json'

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://zandani.co.ke/sitemap.xml" || true
          echo "Google sitemap pinged"


