name: X (Twitter) Auto-Post with AI

on:
  push:
    paths:
      - 'content/posts/**.md'
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install google-genai tweepy

      - name: Wait for Zandani deployment
        run: |
          echo "Waiting 30 seconds for site to deploy..."
          sleep 30

      - name: Check credentials and changed files
        id: precheck
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$X_API_KEY" ] || [ -z "$GEMINI_API_KEY" ]; then
            echo "Missing secrets. Exiting gracefully."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/' | grep '\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No new markdown posts detected. Exiting gracefully."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi
          
          # Pass the changed files to the next step
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Python Script
        if: env.skip != 'true'
        run: |
          cat << 'EOF' > script.py
          import os, re, time
          import tweepy
          from google import genai
          from google.genai import types

          changed_files   = os.environ.get("CHANGED_FILES", "").strip().split("\n")
          x_api_key       = os.environ.get("X_API_KEY")
          x_api_secret    = os.environ.get("X_API_SECRET")
          x_access_token  = os.environ.get("X_ACCESS_TOKEN")
          x_access_secret = os.environ.get("X_ACCESS_TOKEN_SECRET")
          gemini_key      = os.environ.get("GEMINI_API_KEY")
          site_url        = "https://zandani.co.ke"

          twitter = tweepy.Client(
              consumer_key=x_api_key,
              consumer_secret=x_api_secret,
              access_token=x_access_token,
              access_token_secret=x_access_secret
          )

          gemini_client = genai.Client(api_key=gemini_key)

          def build_slug(filename):
              base = os.path.basename(filename).replace(".md", "")
              return re.sub(r"^\d{4}-\d{2}-\d{2}-", "", base)

          def trim_to_280(text, url):
              available = 280 - 23 - 1
              if len(text) > available:
                  text = text[:available - 3].rstrip() + "..."
              return text + " " + url

          for file_path in changed_files:
              if not file_path or not os.path.exists(file_path):
                  continue

              print(f"Processing: {file_path}")
              slug = build_slug(file_path)
              article_url = f"{site_url}/article/{slug}"

              try:
                  with open(file_path, "r", encoding="utf-8") as f:
                      raw = f.read()
              except Exception as e:
                  print(f"Error reading {file_path}: {e}")
                  continue

              def get_field(key, fallback):
                  m = re.search(r"^" + key + r":\s*[\"']?(.*?)[\"']?\s*$", raw, re.MULTILINE)
                  return m.group(1).strip() if m else fallback

              title   = get_field("title", "Latest Update")
              author  = get_field("author", "Za Ndani")
              excerpt = get_field("excerpt", "")

              prompt = (
                  "You are the Social Media Manager for Za Ndani, a top Kenyan news platform.\n"
                  "Write a punchy tweet to drive traffic to this article.\n\n"
                  f"Title: {title}\n"
                  f"Author: {author}\n"
                  f"Excerpt: {excerpt}\n\n"
                  "Rules:\n"
                  "- Curiosity-driven.\n"
                  "- Max 2 emojis.\n"
                  "- End with 2 hashtags (e.g. #Kenya).\n"
                  "- No URLs in the text.\n"
                  "- No dashes (— or –). Use hyphens (-).\n"
                  "- Output ONLY the tweet text."
              )

              ai_text = None
              for attempt in range(3):
                  try:
                      resp = gemini_client.models.generate_content(
                          model="gemini-2.0-flash",
                          contents=prompt,
                          config=types.GenerateContentConfig(temperature=0.8)
                      )
                      ai_text = resp.text.strip()
                      break
                  except Exception as e:
                      if "429" in str(e) and attempt < 2:
                          time.sleep(45)
                      else:
                          print(f"Gemini error: {e}")
                          break

              if not ai_text:
                  ai_text = f"Breaking: {title[:190]} #Kenya #Zandani"

              ai_text = ai_text.replace("\u2014", "-").replace("\u2013", "-").replace('"', '')
              final_tweet = trim_to_280(ai_text, article_url)

              try:
                  twitter.create_tweet(text=final_tweet, user_auth=True)
                  print(f"Posted successfully: {final_tweet}")
              except Exception as e:
                  print(f"Twitter post failed: {e}")

              time.sleep(5)
          EOF

      - name: Run Python Script
        if: env.skip != 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 script.py
