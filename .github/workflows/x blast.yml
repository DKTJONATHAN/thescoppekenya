name: X (Twitter) Auto-Post with AI

on:
  push:
    paths:
      - 'content/posts/**.md'
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install google-genai tweepy

      - name: Wait for Zandani deployment
        run: |
          echo "Waiting 30 seconds for site to deploy..."
          sleep 30

      - name: Check credentials and changed files
        id: precheck
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
        run: |
          if [ -z "$X_API_KEY" ] || [ -z "$X_API_SECRET" ] || [ -z "$X_ACCESS_TOKEN" ] || [ -z "$X_ACCESS_TOKEN_SECRET" ]; then
            echo "Missing X secrets. Exiting gracefully."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          if [ -z "$GEMINI_API_KEY" ] && [ -z "$GEMINI_WRITE_KEY" ] && [ -z "$GEMINI_API_KEY1" ]; then
            echo "No Gemini keys set. Exiting gracefully."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/' | grep '\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No new markdown posts detected. Exiting gracefully."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Python Script
        if: env.skip != 'true'
        run: |
          cat << 'EOF' > script.py
          import os
          import re
          import time
          import tweepy
          from google import genai
          from google.genai import types

          changed_files = [p for p in os.environ.get("CHANGED_FILES", "").strip().split("\n") if p]
          x_api_key = os.environ.get("X_API_KEY", "")
          x_api_secret = os.environ.get("X_API_SECRET", "")
          x_access_token = os.environ.get("X_ACCESS_TOKEN", "")
          x_access_secret = os.environ.get("X_ACCESS_TOKEN_SECRET", "")
          site_url = "https://zandani.co.ke"
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]
          raw_keys = [
              os.environ.get("GEMINI_WRITE_KEY"),
              os.environ.get("GEMINI_API_KEY"),
              os.environ.get("GEMINI_API_KEY1"),
          ]
          gemini_keys = [key for key in raw_keys if key]

          if not gemini_keys:
              raise RuntimeError("No Gemini keys configured")

          twitter = tweepy.Client(
              consumer_key=x_api_key,
              consumer_secret=x_api_secret,
              access_token=x_access_token,
              access_token_secret=x_access_secret,
          )

          key_index = 0
          gemini_client = genai.Client(api_key=gemini_keys[key_index])

          def rotate_client():
              global key_index, gemini_client
              key_index = (key_index + 1) % len(gemini_keys)
              gemini_client = genai.Client(api_key=gemini_keys[key_index])

          def gemini_generate(prompt):
              global gemini_client
              for model in MODELS_TO_TRY:
                  for _ in range(len(gemini_keys)):
                      try:
                          response = gemini_client.models.generate_content(
                              model=model,
                              contents=prompt,
                              config=types.GenerateContentConfig(temperature=0.8),
                          )
                          return (response.text or "").strip()
                      except Exception as exc:
                          error_text = str(exc).lower()
                          print(f"Gemini failure on {model}: {exc}")
                          rotate_client()
                          if any(token in error_text for token in ["429", "quota", "rate", "resource exhausted", "unavailable", "overloaded", "busy", "timeout"]):
                              time.sleep(8)
                              continue
                          break
              return None

          def build_slug(filename):
              base = os.path.basename(filename).replace(".md", "")
              return re.sub(r"^\d{4}-\d{2}-\d{2}-", "", base)

          def get_field(content, field, default=""):
              match = re.search(rf'^{field}:\s*["\']?(.*?)["\']?\s*$', content, re.MULTILINE)
              return match.group(1).strip() if match else default

          def trim_to_280(text, url):
              available = 280 - 24
              cleaned = text.replace("\u2014", "-").replace("\u2013", "-").replace('"', "").strip()
              if len(cleaned) > available:
                  cleaned = cleaned[: available - 3].rstrip() + "..."
              return f"{cleaned} {url}".strip()

          for file_path in changed_files:
              if not os.path.exists(file_path):
                  continue

              print(f"Processing: {file_path}")
              with open(file_path, "r", encoding="utf-8") as handle:
                  content = handle.read()

              slug = get_field(content, "slug") or build_slug(file_path)
              title = get_field(content, "title", "Untitled Story")
              author = get_field(content, "author", "Za Ndani")
              excerpt = get_field(content, "excerpt", "Read the full story on Za Ndani.")
              article_url = f"{site_url}/article/{slug}"

              prompt = (
                  "You are the X social media manager for Za Ndani, a Kenyan news platform.\n"
                  "Write a punchy tweet to drive traffic to this article.\n\n"
                  f"Title: {title}\n"
                  f"Author: {author}\n"
                  f"Excerpt: {excerpt}\n\n"
                  "Rules:\n"
                  "- Make it curiosity-driven.\n"
                  "- Use no more than 2 emojis.\n"
                  "- End with 2 short relevant hashtags.\n"
                  "- Do not include the URL in the tweet text.\n"
                  "- Never use em dashes or en dashes. Use only hyphens (-).\n"
                  "- Output only the tweet text."
              )

              ai_text = gemini_generate(prompt)
              if not ai_text:
                  ai_text = f"Breaking: {title[:180]} #Kenya #Zandani"

              final_tweet = trim_to_280(ai_text, article_url)

              try:
                  twitter.create_tweet(text=final_tweet, user_auth=True)
                  print(f"Posted successfully: {final_tweet}")
              except Exception as exc:
                  print(f"X post failed: {exc}")

              time.sleep(5)
          EOF

      - name: Run Python Script
        if: env.skip != 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
        run: python3 script.py
