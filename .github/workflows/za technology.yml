name: Elizabeth Muthoni - Tech Scraper

on:
  schedule:
    - cron: '55 9,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_elizabeth.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests google-genai beautifulsoup4 playwright python-dateutil && playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, hashlib, sys
          from dateutil import parser as date_parser
          from google import genai
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          client = genai.Client(api_key=os.environ.get("GEMINI_API_KEY"))

          def get_urls():
              urls = []
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  page.goto('https://techweez.com/', timeout=60000)
                  soup = BeautifulSoup(page.content(), 'html.parser')
                  for a in soup.find_all('a', href=True):
                      href = a.get('href', '')
                      if len(href) > 35 and 'techweez.com' in href: urls.append(href)
                  browser.close()
              return urls

          def scrape(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 10: return None, None, None
                      else: return None, None, None
                      title = soup.find('title').get_text().replace(' - TechWeez', '').strip()
                      text = "\n\n".join([p.get_text() for p in soup.find_all('p') if len(p.get_text()) > 40])
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      return text, img, title
                  except: return None, None, None
                  finally: browser.close()

          urls = get_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          raw_text, target_img, target_title, final_hash = None, None, None, None
          for url in urls:
              u_hash = hashlib.md5(url.encode()).hexdigest()
              if u_hash in memory: continue
              txt, img, t = scrape(url)
              if txt and len(txt) > 400:
                  raw_text, target_img, target_title, final_hash = txt, img, t, u_hash
                  break
          if not raw_text: sys.exit(0)

          t_resp = client.models.generate_content(model="gemini-3-flash-preview", contents=f"Original: {target_title}\nTask: 3 high-CTR tech titles front-loading keywords. Output JSON: {{\"final_title\": \"...\"}}")
          final_title = json.loads(re.search(r'{.*}', t_resp.text, re.DOTALL).group()).get('final_title', target_title)

          a_resp = client.models.generate_content(model="gemini-3-flash-preview", contents=f"Title: {final_title}\nSource: {raw_text[:10000]}\nTask: Write as Elizabeth Muthoni. Tech Journalist. No dashes. 10h freshness.")
          
          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]
          with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f: f.write(f"---\ntitle: \"{final_title}\"\nslug: \"{slug}\"\nauthor: \"Elizabeth Muthoni\"\nimage: \"{target_img}\"\ncategory: \"Technology\"\ndate: \"{datetime.datetime.utcnow().strftime('%Y-%m-%d')}\"\n---\n\n{a_resp.text}")
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          EOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: Tech news by Elizabeth Muthoni 🚀"
          file_pattern: 'content/posts/*.md .github/memory_elizabeth.json'