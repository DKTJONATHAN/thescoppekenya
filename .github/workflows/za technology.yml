name: Elizabeth Muthoni - Techweez Scraper

on:
  schedule:
    # Shifted to avoid collision with Wanjiku (0, 5, 9, 13, 17, 21)
    # Elizabeth now runs at 08:22 and 16:52 UTC
    - cron: '22 8,52 16 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_elizabeth.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate Tech Article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python - <<'PYEOF'
          import os, json, datetime, requests, re, time, sys, hashlib, textwrap, itertools
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          def get_target_urls():
              urls = []
              print("Scanning techweez.com...")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                      page = context.new_page()
                      page.goto('https://techweez.com/', timeout=60000, wait_until="domcontentloaded")
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if len(href) > 35 and 'techweez.com' in href and not any(x in href for x in ['/category/', '/tag/', '/author/']):
                              urls.append(href)
                      browser.close()
              except Exception as e: print(f"URL scan error: {e}")
              return list(set(urls))

          def scrape_article(url):
              print(f"Scraping: {url}")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto(url, timeout=45000, wait_until="domcontentloaded")
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()

                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          age_hours = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                          if age_hours > 12: return None, None, None
                      
                      title = soup.find('title').get_text().replace(' - TechWeez', '').strip()
                      img_url = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      
                      # Body extraction
                      paras = soup.find_all('p')
                      article_text = "\n\n".join([p.get_text(strip=True) for p in paras if len(p.get_text(strip=True)) > 40])
                      
                      return article_text, img_url, title
              except: return None, None, None

          # API Rotation Logic
          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label=""):
              global current_key, client
              for model_id in MODELS_TO_TRY:
                  try:
                      resp = client.models.generate_content(model=model_id, contents=prompt)
                      return resp.text.strip()
                  except Exception as e:
                      if "429" in str(e):
                          current_key = next(key_cycle)
                          client = genai.Client(api_key=current_key)
                          continue
              return None

          # Main Execution
          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          content_found = False
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article(link)
              if text and len(text) > 400:
                  # Title Step
                  t_prompt = f"Original: {title}\nGenerate ONE high-CTR tech SEO title. Output JSON only: {{\"final_title\": \"...\"}}"
                  res_t = gemini_generate(t_prompt, "title")
                  final_title = json.loads(re.search(r'\{.*\}', res_t).group())['final_title'] if res_t else title
                  
                  # Article Step
                  a_prompt = f"Write as Elizabeth Muthoni, Tech Journalist for Za Ndani. Based on: {text[:8000]}. No Sheng. Professional Kenyan English. Start with H2."
                  final_body = gemini_generate(a_prompt, "article")
                  
                  if final_body:
                      slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]
                      filepath = os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md")
                      with open(filepath, "w") as f:
                          f.write(textwrap.dedent(f"""\
                          ---
                          title: "{final_title}"
                          slug: "{slug}"
                          author: "Elizabeth Muthoni"
                          image: "{img}"
                          category: "Technology"
                          date: "{publish_timestamp}"
                          ---
                          
                          {final_body}
                          """))
                      memory.append(u_hash)
                      content_found = True
                      break

          if content_found:
              with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          PYEOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Elizabeth Muthoni"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Elizabeth Muthoni <bot@zandani.co.ke>"
          commit_message: "content: Tech news by Elizabeth Muthoni 🚀"
          file_pattern: 'content/posts/*.md .github/memory_elizabeth.json'
