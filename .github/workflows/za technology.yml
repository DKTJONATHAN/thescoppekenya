name: Elizabeth Muthoni - Techweez Scraper
on:
  schedule:
    - cron: '22 8,16 * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_elizabeth.json
jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: '${{ env.DEFAULT_BRANCH }}', token: '${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}', persist-credentials: true }
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium --with-deps
      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, textwrap, itertools, base64, random
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]
          MAX_AGE_HOURS = 24
          SITE_URL = "https://techweez.com/"
          SITE_DOMAIN = "techweez.com"
          BANNED_PHRASES = ["sasa basi","melting the pot","spill the tea","grab your popcorn","buckle up","breaking news","dive in","delve into","moreover","furthermore","in conclusion","it's worth noting","a testament to","navigating the landscape","in today's digital age","tapestry"]
          def upload_to_imgbb(u):
              k = os.environ.get("IMGBB_API_KEY")
              if not k or not u: return u
              try:
                  b = base64.b64encode(requests.get(u, timeout=15).content).decode('utf-8')
                  r = requests.post("https://api.imgbb.com/1/upload", data={"key":k,"image":b}, timeout=20)
                  return r.json()['data']['url'] if r.status_code == 200 else u
              except: return u
          def get_target_urls():
              urls = set()
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled","--disable-infobars","--window-size=1920,1080"])
                      ctx = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36", viewport={"width":1920,"height":1080}, locale="en-KE", timezone_id="Africa/Nairobi", extra_http_headers={"Accept-Language":"en-KE,en;q=0.9","Accept":"text/html,application/xhtml+xml,*/*;q=0.8","Sec-Fetch-Site":"none","Sec-Fetch-Mode":"navigate"})
                      page = ctx.new_page()
                      page.goto(SITE_URL, timeout=60000, wait_until="networkidle")
                      time.sleep(random.uniform(2,5))
                      for _ in range(3): page.evaluate("window.scrollBy(0,1800)"); time.sleep(random.uniform(2,4))
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href','').strip()
                          if not href: continue
                          full_url = href if href.startswith('http') else f'https://{SITE_DOMAIN}' + href
                          if SITE_DOMAIN not in full_url: continue
                          path = full_url.split(SITE_DOMAIN)[-1]; slug = path.rstrip('/').split('/')[-1]
                          if len(slug) > 15 and '-' in slug and not any(x in path for x in ['/author/','/tag/','/page/','/feed/','/comment-','/category/']): urls.add(full_url)
                      browser.close()
              except Exception as e: print(f"Scan failed: {e}")
              def dk(u):
                  m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', u)
                  return int(m.group(1)+m.group(2)+m.group(3)) if m else 19000101
              ul = sorted(list(urls), key=dk, reverse=True)
              print(f"Found {len(ul)} candidates."); [print(u) for u in ul[:8]]
              return ul[:12]
          def scrape_article(url):
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage","--disable-blink-features=AutomationControlled"])
                      ctx = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36")
                      page = ctx.new_page()
                      page.route("**/*", lambda route: route.abort() if route.request.resource_type in ["image","stylesheet","font","media"] else route.continue_())
                      page.goto(url, timeout=60000, wait_until="domcontentloaded"); time.sleep(random.uniform(1,3))
                      soup = BeautifulSoup(page.content(), "html.parser"); browser.close()
                      pub_time = None
                      for script in soup.find_all('script', type='application/ld+json'):
                          try:
                              data = json.loads(script.string or '{}')
                              if 'datePublished' in data: pub_time = date_parser.parse(data['datePublished']); break
                          except: pass
                      if not pub_time:
                          meta = soup.find('meta', property='article:published_time') or soup.find('meta', {'name':'date'})
                          if meta and meta.get('content'): pub_time = date_parser.parse(meta['content'])
                      if not pub_time:
                          m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', url)
                          if m: pub_time = datetime.datetime(int(m.group(1)),int(m.group(2)),int(m.group(3)), tzinfo=datetime.timezone.utc)
                      if pub_time:
                          if pub_time.tzinfo is None: pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                          age = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                          if age > MAX_AGE_HOURS: return None, None, None
                      title = soup.title.string.strip() if soup.title else ""
                      title = re.sub(r'\s*[-|\u2013]\s*Techweez.*', '', title, flags=re.I).strip()
                      article_text = ""
                      for sel in ['article','.article-body','.post-content','.entry-content','.content','main']:
                          cont = soup.select_one(sel)
                          if cont:
                              article_text = "\n\n".join(p.get_text(strip=True) for p in cont.find_all('p') if len(p.get_text(strip=True)) > 40)
                              if len(article_text) > 400: break
                      if len(article_text) < 400: article_text = "\n\n".join(p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 40)
                      img_url = ""
                      for tag in [soup.find('meta', property='og:image'), soup.find('meta', {'name':'twitter:image'})]:
                          if tag: img_url = tag.get('content', ''); break
                      return article_text, img_url, title
              except Exception as e: print(f"Scrape error: {e}"); return None, None, None
          def get_internal_context():
              pd = os.environ.get("POSTS_DIR", "content/posts")
              if not os.path.exists(pd): return ""
              files = [f for f in os.listdir(pd) if f.endswith(".md")]; sample = random.sample(files, min(len(files),3)); links = []
              for fn in sample:
                  try:
                      with open(os.path.join(pd, fn), "r", encoding="utf-8") as f: c = f.read()
                      t = re.search(r'title:\s*"(.*?)"', c); s = re.search(r'slug:\s*"(.*?)"', c)
                      if t and s: links.append(f'- [{t.group(1)}](https://zandani.co.ke/article/{s.group(1)})')
                  except: pass
              return "\n".join(links) if links else ""
          raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1"] if os.environ.get(k)]
          if not raw_keys: sys.exit(1)
          key_cycle = itertools.cycle(raw_keys); current_key = next(key_cycle); client = genai.Client(api_key=current_key)
          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              for model in MODELS_TO_TRY:
                  for _ in range(6):
                      try:
                          config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search else None
                          return client.models.generate_content(model=model, contents=prompt, config=config).text.strip()
                      except Exception as e:
                          if "429" in str(e) or "quota" in str(e).lower() or "rate" in str(e).lower():
                              time.sleep(random.uniform(20,35)); current_key = next(key_cycle); client = genai.Client(api_key=current_key); continue
                          break
              return None
          article_links = get_target_urls()
          if not article_links: sys.exit(0)
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          full_raw_text, target_image, target_title, final_hash = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article(link)
              if text and len(text) > 400: full_raw_text, target_image, target_title, final_hash = text, img, title or "Kenya Tech", u_hash; break
          if not full_raw_text: sys.exit(0)
          tp = f"""SCRAPED ARTICLE: {target_title}\nGenerate 3 SEO titles <60 chars. Pick best.\nOutput ONLY JSON: {{"final_title": "Title"}}"""
          tt = gemini_generate(tp, "title"); final_title = target_title
          if tt:
              try: final_title = json.loads(re.sub(r"^```json?\n?|```$", "", tt, flags=re.I|re.DOTALL).strip()).get('final_title', target_title)
              except: pass
          current_key = next(key_cycle); client = genai.Client(api_key=current_key); time.sleep(5)
          ap = f"""Current Date: {full_date_str}\nTITLE: {final_title}\nSOURCE TEXT: {full_raw_text[:9500]}\nINTERNAL LINKS: {get_internal_context()}\n\nTASK: Write a precise, analytical tech article as Elizabeth Muthoni for Za Ndani.\nFocus on Kenyan and African tech, startups, and innovation. Professional tone. No em-dashes. Single hyphens only.\nNo title/author/date in body. Start with ## H2. Then 35-45 word summary. Then ### subheadings.\nBANNED PHRASES: {", ".join(BANNED_PHRASES)}\nData-driven, innovation-focused. No cliches."""
          at = gemini_generate(ap, "article", use_search=True)
          if not at: sys.exit(1)
          at = re.sub(r"^```(?:markdown)?\n?", "", at).rstrip("```").strip()
          at = re.sub(r"^(Title|By|Date):.*?\n", "", at, flags=re.I|re.M)
          at = at.replace('\u2014', '-').replace('\u2013', '-')
          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]
          fi = upload_to_imgbb(target_image) if target_image else ""
          pd = os.environ.get("POSTS_DIR", "content/posts"); os.makedirs(pd, exist_ok=True)
          ff = textwrap.dedent(f"""\
          ---
          title: "{final_title.replace('"', "'")}"
          slug: "{slug}"
          author: "Elizabeth Muthoni"
          image: "{fi}"
          category: "Technology"
          date: "{publish_timestamp}"
          ---
          {at}
          """)
          fp = os.path.join(pd, f"{today_str}-{slug}.md")
          with open(fp, "w", encoding="utf-8") as f: f.write(ff)
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-300:], f)
          print(f"Saved: {fp}")
          EOF
      - name: Git Safety Pull
        run: |
          git config --global user.name "Elizabeth Muthoni"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Elizabeth Muthoni <bot@zandani.co.ke>"
          commit_message: "content: Tech news by Elizabeth Muthoni 🚀"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_elizabeth.json'
