name: Multi-Source Research Article Generator

on:
  workflow_dispatch:
    inputs:
      source_urls:
        description: 'Source URLs separated by pipe | or newline. Supports YouTube, Spotify, articles.'
        required: true
        type: string
      author:
        description: 'Author persona'
        required: true
        type: choice
        options:
          - Za Ndani
          - Mutheu Ann
          - Celestine Nzioka
        default: Za Ndani
      category:
        description: 'Article category'
        required: true
        type: choice
        options:
          - Entertainment
          - Politics
          - News
          - Gossip
          - Sports
          - Technology
        default: Entertainment
      article_angle:
        description: 'Optional angle guide (e.g. "focus on the controversy")'
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_multi_source.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil yt-dlp
          playwright install chromium

      - name: Scrape and generate article
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          INPUT_URLS: ${{ inputs.source_urls }}
          INPUT_AUTHOR: ${{ inputs.author }}
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_ANGLE: ${{ inputs.article_angle }}
        run: python .github/scripts/multi_source_scraper.py

      - name: Git safety pull
        run: |
          git config --global user.name "Za Ndani Bot"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani Bot <bot@zandani.co.ke>"
          commit_message: "content: Multi-source article"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_multi_source.json'
