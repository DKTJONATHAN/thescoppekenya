name: Multi-Source Research Article Generator

on:
  workflow_dispatch:
    inputs:
      source_urls:
        description: >
          Paste source URLs separated by | or one per line.
          Supports: YouTube channels/videos, Spotify artists/albums/tracks, news articles, etc.
          Example: https://www.youtube.com/@artistname | https://open.spotify.com/artist/xxxxx
        required: true
        type: string
      author:
        description: 'Author persona to write as'
        required: true
        type: choice
        options:
          - Za Ndani
          - Mutheu Ann
          - Celestine Nzioka
        default: Za Ndani
      category:
        description: 'Article category'
        required: true
        type: choice
        options:
          - Entertainment
          - Politics
          - News
          - Gossip
          - Sports
          - Technology
          - Lifestyle
          - Business
        default: Entertainment
      article_angle:
        description: 'Optional: guide the article angle (e.g. "focus on the controversy", "highlight the growth numbers")'
        required: false
        type: string
        default: ''
      title_keywords:
        description: >
          ARTICLE FOCUS â€” W-questions or topic signals that shape what the article covers.
          Use plain words like: who, where, how, when, why, what
          OR combine with names/topics: "who is Wizkid, where he was born, how he became famous"
          AI interprets each word as a question to answer about the subject, then generates
          a smart title from those angles. It does NOT paste these words into the title.
        required: false
        type: string
        default: ''
      title_format:
        description: >
          TITLE FORMAT â€” AUTO lets AI decide. LIST = "5 Reasons...", BIO = "Name: Age/Net Worth",
          SCANDAL = "Name Did X â€” Consequence", GUIDE = "How to X in 2025",
          TRENDING = dramatic hook, NEWS = straight factual headline.
        required: false
        type: choice
        options:
          - AUTO
          - LIST
          - BIO
          - SCANDAL
          - GUIDE
          - TRENDING
          - NEWS
        default: AUTO
      custom_title:
        description: >
          OVERRIDE TITLE â€” type an exact title to bypass AI title generation completely.
          Leave blank to let AI write the title using the signals/format above.
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_multi_source.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 \
            libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 \
            libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 \
            libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install \
            requests \
            google-genai \
            beautifulsoup4 \
            lxml \
            playwright \
            playwright-stealth==1.0.6 \
            python-dateutil \
            yt-dlp \
            Pillow
          playwright install chromium --with-deps

      - name: Scrape sources and generate article
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          INPUT_URLS: ${{ inputs.source_urls }}
          INPUT_AUTHOR: ${{ inputs.author }}
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_ANGLE: ${{ inputs.article_angle }}
          INPUT_TITLE_KEYWORDS: ${{ inputs.title_keywords }}
          INPUT_TITLE_FORMAT: ${{ inputs.title_format }}
          INPUT_CUSTOM_TITLE: ${{ inputs.custom_title }}
        run: |
          python - <<'PYEOF'
          import os, json, datetime, requests, re, time, sys, hashlib, itertools, base64, random, io
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          from playwright_stealth import stealth_sync
          from PIL import Image
          import yt_dlp

          today_str         = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str     = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          current_year      = datetime.datetime.utcnow().strftime("%Y")
          SITE_BASE_URL     = "https://zandani.co.ke"

          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          BANNED_PHRASES = [
              "sasa basi", "melting the pot", "spill the tea", "tea is hot",
              "grab your popcorn", "listen up", "buckle up", "breaking news",
              "sherehe", "form ni gani", "udaku", "hello guys", "welcome back",
              "mambo vipi", "niaje wasee", "karibuni", "tapestry", "dive in",
              "delve into", "moreover", "furthermore", "in conclusion",
              "it's worth noting", "a testament to", "navigating the landscape",
              "in today's digital age", "shed light on",
          ]

          AUTHOR_PERSONAS = {
              "Za Ndani": (
                  "You are Za Ndani, a seasoned Kenyan entertainment writer with 10+ years covering "
                  "celebrity culture, relationships, and pop culture. You write in a warm, direct, "
                  "conversational human tone - like a knowledgeable friend sharing a real opinion. "
                  "You draw on your own experience and observation. Never reference what other media "
                  "says or contrast with mainstream coverage. Just tell your own story with authority."
              ),
              "Mutheu Ann": (
                  "You are Mutheu Ann, a Kenyan lifestyle and entertainment journalist at Za Ndani. "
                  "You write with genuine passion and personal insight - never AI-sounding or robotic. "
                  "Your voice is energetic, relatable, and grounded in real Kenyan experience. "
                  "Never frame your content as a reaction to other media. Write independently with "
                  "your own take based on facts and your expertise."
              ),
              "Celestine Nzioka": (
                  "You are Celestine Nzioka, an authoritative Kenyan political and business journalist "
                  "at Za Ndani with deep expertise in East African affairs. You write clear, factual, "
                  "confident prose - no hedging, no cliches. Your credibility comes from your own "
                  "analysis and verified facts, not from contrasting with other outlets. Never use phrases like: what the media does not tell you. Write independently from your own expert standpoint."
              ),
          }

          AUTHOR_SLUGS = {
              "Za Ndani": "za-ndani",
              "Mutheu Ann": "mutheu-ann",
              "Celestine Nzioka": "celestine-nzioka",
          }

          SITE_SELECTORS = {
              "citizen.digital":           ["div.article-content", "div.single-post-content", "div.post-body"],
              "nation.africa":             ["div.article-body", "div.story-content", "section.article__body"],
              "standardmedia.co.ke":       ["div.article-body", "div.story-body", "div#article-content"],
              "tuko.co.ke":                ["div.post-content", "div.article__body", "div.tuko-post-content"],
              "kenyans.co.ke":             ["div.article-content", "div.news-body", "div.field-items"],
              "mpasho.co.ke":              ["div.entry-content", "div.post-content", "article"],
              "nairobinews.nation.africa": ["div.article-body", "div.story-content"],
              "businessdailyafrica.com":   ["div.article-body", "div.story-content"],
              "capitalfm.co.ke":           ["div.entry-content", "div.post-content"],
              "k24tv.co.ke":               ["div.article-content", "div.post-body"],
              "ntv.co.ke":                 ["div.article-content", "div.single-content"],
              "ew.com":                    ["div.article-body", "section[class*=article]", "div[class*=longform]"],
              "people.com":                ["div.article-body", "section.article-body", "div[class*=content-body]"],
              "tmz.com":                   ["div.article-content", "div[class*=article__content]"],
              "bbc.com":                   ["article", "div[data-component=text-block]", "div.article__body-content"],
              "bbc.co.uk":                 ["article", "div[data-component=text-block]"],
              "theguardian.com":           ["div.article-body-commercial-selector", "div[class*=article-body]"],
              "reuters.com":               ["div[class*=article-body]", "div.StandardArticleBody_body"],
              "apnews.com":                ["div.article-body", "div[class*=Article]", "div.RichTextStoryBody"],
              "aljazeera.com":             ["div.article-body", "div[class*=wysiwyg]"],
              "nytimes.com":               ["section[name=articleBody]", "div[class*=StoryBodyCompact]"],
              "dailymail.co.uk":           ["div.article-text", "div#js-article-text"],
              "thesun.co.uk":              ["div.article__content", "div[class*=article-content]"],
              "independent.co.uk":         ["div[class*=article-body]", "div.sc-d7f02f38"],
              "variety.com":               ["div.article-body", "div[class*=article-content]"],
              "hollywoodreporter.com":     ["div.article-body", "div[class*=content-body]"],
              "deadline.com":              ["div.a-content", "div[class*=article-content]"],
          }

          TITLE_SUFFIXES = [
              " | Citizen Digital", " - Citizen Digital", " | Nation Africa", " - Nation Africa",
              " | Nation", " - Nation", " | The Standard", " - The Standard",
              " | Mpasho", " - Mpasho", " | Kenyans.co.ke", " - Kenyans.co.ke",
              " | Tuko", " - Tuko", " | NTV Kenya", " - NTV Kenya",
              " | K24", " - K24", " | Capital FM", " - Capital FM",
              " | Business Daily", " - Business Daily", " | EW", " - EW",
              " | People", " | TMZ", " | BBC", " - BBC News",
              " | The Guardian", " | Reuters", " | AP News", " | Al Jazeera",
              " | Variety", " | The Hollywood Reporter", " | Deadline",
              " | The Sun", " | Daily Mail",
          ]

          def title_to_slug(t):
              s = t.lower()
              s = re.sub(r"[^a-z0-9\s-]", "", s)
              s = re.sub(r"\s+", "-", s.strip())
              s = re.sub(r"-+", "-", s).strip("-")
              return s[:70]

          def fmt_num(n):
              if n is None: return "N/A"
              try:
                  n = int(n)
                  if n >= 1_000_000_000: return f"{n/1_000_000_000:.2f}B"
                  if n >= 1_000_000:     return f"{n/1_000_000:.2f}M"
                  if n >= 1_000:         return f"{n/1_000:.1f}K"
                  return str(n)
              except Exception:
                  return str(n)

          def fmt_dur(secs):
              if not secs: return "N/A"
              try:
                  secs = int(secs)
                  m, s = divmod(secs, 60)
                  h, m = divmod(m, 60)
                  return f"{h}h {m}m {s}s" if h else f"{m}m {s}s"
              except Exception:
                  return str(secs)

          def clean_url(url):
              url = url.strip()
              url = re.sub(r'[?&](utm_[^&]*|source=[^&]*|ref=[^&]*)', '', url)
              return url.rstrip('?&')

          def parse_urls(raw):
              parts = re.split(r'[\n|,]+', raw)
              return [clean_url(u.strip()) for u in parts if u.strip().startswith('http')]

          def detect_platform(url):
              u = url.lower()
              if 'youtube.com' in u or 'youtu.be' in u: return 'youtube'
              if 'spotify.com' in u:                    return 'spotify'
              return 'article'

          def is_good_image(url):
              if not url or len(url) < 10: return False
              bad = ['logo', 'icon', 'placeholder', 'blank', 'pixel', 'spacer',
                     'avatar-default', 'no-image', 'default-user', 'data:image']
              u = url.lower()
              return not any(b in u for b in bad)

          def upload_to_imgbb(image_url):
              if not image_url: return ''
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key: return image_url
              try:
                  resp = requests.get(image_url, timeout=20,
                                      headers={'User-Agent': 'Mozilla/5.0'})
                  resp.raise_for_status()
                  img = Image.open(io.BytesIO(resp.content))
                  if img.mode in ('RGBA', 'LA', 'P'):
                      img = img.convert('RGB')
                  buf = io.BytesIO()
                  img.save(buf, format='WEBP', quality=85)
                  buf.seek(0)
                  b64 = base64.b64encode(buf.read()).decode("utf-8")
                  res = requests.post("https://api.imgbb.com/1/upload",
                                      data={"key": api_key, "image": b64}, timeout=25)
                  if res.status_code == 200:
                      new_url = res.json()["data"]["url"]
                      print(f"  Image re-hosted (WebP): {new_url}")
                      return new_url
                  print(f"  ImgBB upload failed ({res.status_code}): {res.text[:120]}")
              except Exception as e:
                  print(f"  ImgBB error: {e}")
              return image_url

          def get_site_key(url):
              for k in SITE_SELECTORS:
                  if k in url: return k
              return None

          # â”€â”€ Pick the best thumbnail from a yt-dlp thumbnails list â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          def best_yt_thumbnail(thumbnails):
              if not thumbnails: return ''
              ranked = sorted(
                  [t for t in thumbnails if t.get('url')],
                  key=lambda t: (t.get('width', 0) or 0) * (t.get('height', 0) or 0),
                  reverse=True
              )
              for t in ranked:
                  url = t.get('url', '')
                  if is_good_image(url):
                      return url
              return ranked[0].get('url', '') if ranked else ''

          def scrape_youtube(url):
              data = {'platform': 'YouTube', 'url': url, 'image': ''}
              is_channel = (
                  any(x in url for x in ['/@', '/channel/', '/c/', '/user/'])
                  or ('youtube.com' in url and '/watch' not in url and 'youtu.be' not in url)
              )
              print(f"[YouTube] {'channel' if is_channel else 'video'}: {url}")

              if is_channel:
                  opts = {
                      'quiet': True, 'no_warnings': True,
                      'extract_flat': 'in_playlist', 'playlist_end': 20,
                      'ignoreerrors': True,
                  }
                  try:
                      with yt_dlp.YoutubeDL(opts) as ydl:
                          info = ydl.extract_info(url, download=False)
                      if not info:
                          data['error'] = 'No data returned'; return data
                      data['type']             = 'channel'
                      data['channel_name']     = info.get('channel') or info.get('uploader') or info.get('title', 'Unknown')
                      data['subscriber_count'] = info.get('channel_follower_count')
                      data['description']      = (info.get('description') or '')[:800]
                      data['total_views']      = info.get('view_count')
                      data['video_count']      = info.get('playlist_count')
                      # Channel avatar â€” prefer the avatar/photo thumbnails
                      thumbnails = info.get('thumbnails') or []
                      avatar_candidates = [t for t in thumbnails if
                                           'avatar' in (t.get('id', '') + t.get('url', '')).lower()
                                           or (t.get('width') and t.get('height') and t['width'] == t['height'])]
                      data['image'] = best_yt_thumbnail(avatar_candidates) or best_yt_thumbnail(thumbnails)
                      entries = [e for e in (info.get('entries') or []) if e][:20]
                      data['recent_videos'] = [
                          {'title': e.get('title', ''), 'views': e.get('view_count'),
                           'likes': e.get('like_count'), 'duration': e.get('duration'),
                           'upload_date': e.get('upload_date', ''),
                           'thumbnail': e.get('thumbnail', '')}
                          for e in entries
                      ]
                      vcounts = [e.get('view_count', 0) for e in entries if e.get('view_count')]
                      if vcounts:
                          data['avg_views']  = int(sum(vcounts) / len(vcounts))
                          data['peak_views'] = max(vcounts)
                          data['min_views']  = min(vcounts)
                      # If no channel avatar found, use thumbnail of most viewed video
                      if not data['image']:
                          for v in sorted(data['recent_videos'], key=lambda x: x.get('views') or 0, reverse=True):
                              if v.get('thumbnail') and is_good_image(v['thumbnail']):
                                  data['image'] = v['thumbnail']
                                  break
                      print(f"  Channel: {data['channel_name']} | Subs: {fmt_num(data['subscriber_count'])} | Image: {'yes' if data['image'] else 'none'}")
                  except Exception as e:
                      print(f"  Channel error: {e}"); data['error'] = str(e)

              else:
                  opts = {
                      'quiet': True, 'no_warnings': True, 'getcomments': True,
                      'ignoreerrors': True,
                      'extractor_args': {'youtube': {'comment_sort': ['top'], 'max_comments': ['30', '0', '0', '0']}},
                  }
                  try:
                      with yt_dlp.YoutubeDL(opts) as ydl:
                          info = ydl.extract_info(url, download=False)
                      if not info:
                          data['error'] = 'No data returned'; return data
                      data['type']             = 'video'
                      data['title']            = info.get('title', '')
                      data['channel_name']     = info.get('channel') or info.get('uploader', '')
                      data['subscriber_count'] = info.get('channel_follower_count')
                      data['views']            = info.get('view_count')
                      data['likes']            = info.get('like_count')
                      data['comment_count']    = info.get('comment_count')
                      data['upload_date']      = info.get('upload_date', '')
                      data['duration']         = info.get('duration')
                      data['description']      = (info.get('description') or '')[:800]
                      data['tags']             = (info.get('tags') or [])[:10]
                      data['categories']       = info.get('categories', [])
                      # Video thumbnail â€” prefer maxresdefault
                      vid_id = info.get('id', '')
                      maxres = f"https://i.ytimg.com/vi/{vid_id}/maxresdefault.jpg" if vid_id else ''
                      hq     = f"https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg"     if vid_id else ''
                      data['image'] = maxres or info.get('thumbnail', '') or hq
                      raw_comments = info.get('comments') or []
                      top_comments = sorted(
                          [c for c in raw_comments if c.get('like_count', 0) > 0],
                          key=lambda c: c.get('like_count', 0), reverse=True
                      )[:15]
                      data['top_comments'] = [
                          {'text': (c.get('text') or '')[:280], 'likes': c.get('like_count', 0), 'author': c.get('author', '')}
                          for c in top_comments
                      ]
                      print(f"  Video: {data['title']} | Views: {fmt_num(data['views'])} | Image: {'yes' if data['image'] else 'none'}")
                  except Exception as e:
                      print(f"  Video error: {e}"); data['error'] = str(e)
              return data

          def scrape_spotify(url, pw_page):
              data = {'platform': 'Spotify', 'url': url, 'image': ''}
              print(f"[Spotify] {url}")
              try:
                  pw_page.goto(url, timeout=55000, wait_until='networkidle')
                  pw_page.wait_for_timeout(5000)
                  pw_page.evaluate("window.scrollBy(0, document.body.scrollHeight / 2)")
                  pw_page.wait_for_timeout(3000)
                  soup      = BeautifulSoup(pw_page.content(), 'html.parser')
                  full_text = soup.get_text(separator=' ', strip=True)

                  # â”€â”€ Extract image: og:image first, then largest img â”€â”€â”€â”€â”€â”€
                  for meta in soup.find_all('meta'):
                      prop = meta.get('property', '') or meta.get('name', '')
                      if prop in ['og:image', 'twitter:image', 'twitter:image:src']:
                          cand = meta.get('content', '')
                          if is_good_image(cand):
                              data['image'] = cand
                              break
                  if not data['image']:
                      # Try entity image containers Spotify uses
                      for sel in [
                          '[data-testid="entity-image"] img',
                          '[data-testid="artist-image"] img',
                          'img[src*="i.scdn.co"]',
                          'img[src*="mosaic.scdn.co"]',
                      ]:
                          el = soup.select_one(sel)
                          if el:
                              src = el.get('src', '')
                              if is_good_image(src):
                                  data['image'] = src; break

                  if '/artist/' in url:
                      data['type'] = 'artist'
                      h1 = soup.find('h1')
                      if h1: data['artist_name'] = h1.get_text(strip=True)
                      ml = re.search(r'([\d,\.]+)\s*monthly listeners?', full_text, re.IGNORECASE)
                      if ml: data['monthly_listeners'] = ml.group(1)
                      fl = re.search(r'([\d,\.]+)\s*followers?', full_text, re.IGNORECASE)
                      if fl: data['followers'] = fl.group(1)
                      rows = soup.select('[data-testid="tracklist-row"]') or soup.select('[class*="TrackListRow"]')
                      data['top_tracks'] = [r.get_text(separator=' | ', strip=True)[:200] for r in rows[:10]]
                      alb  = soup.select('[data-testid="artist-discography-section"] a')
                      data['recent_releases'] = list({a.get_text(strip=True) for a in alb if len(a.get_text(strip=True)) > 2})[:10]
                  elif '/album/' in url:
                      data['type'] = 'album'
                      h1 = soup.find('h1')
                      if h1: data['album_name'] = h1.get_text(strip=True)
                      rows = soup.select('[data-testid="tracklist-row"]') or soup.select('[class*="TrackListRow"]')
                      data['tracklist'] = [r.get_text(separator=' | ', strip=True)[:200] for r in rows[:25]]
                      yr = re.search(r'\b(20\d{2})\b', full_text)
                      if yr: data['release_year'] = yr.group(1)
                  elif '/track/' in url:
                      data['type'] = 'track'
                      h1 = soup.find('h1')
                      if h1: data['track_name'] = h1.get_text(strip=True)
                  else:
                      data['type'] = 'page'
                  data['page_summary'] = full_text[:3500]
                  print(f"  {data.get('type','?')}: {data.get('artist_name') or data.get('album_name') or data.get('track_name','N/A')} | Listeners: {data.get('monthly_listeners','N/A')} | Image: {'yes' if data['image'] else 'none'}")
              except Exception as e:
                  print(f"  Spotify error: {e}"); data['error'] = str(e)
              return data

          def extract_html_content(soup, url):
              page_title = ''
              for sel in ['h1', 'h1.article-title', 'h1.post-title', 'h1.entry-title']:
                  t = soup.select_one(sel)
                  if t:
                      page_title = t.get_text().strip()
                      if page_title: break
              if not page_title:
                  tt = soup.find('title')
                  if tt: page_title = tt.get_text().strip()
              if not page_title:
                  og = soup.find('meta', property='og:title')
                  if og: page_title = og.get('content', '').strip()
              for suf in TITLE_SUFFIXES:
                  page_title = page_title.replace(suf, '').strip()

              article_text = ''
              site_key = get_site_key(url)
              if site_key:
                  for sel in SITE_SELECTORS[site_key]:
                      c = soup.select_one(sel)
                      if c:
                          chunk = '\n\n'.join([p.get_text(strip=True) for p in c.find_all('p') if len(p.get_text(strip=True)) > 40])
                          if len(chunk) > 300:
                              article_text = chunk; break
              if len(article_text) < 300:
                  for c in soup.select(
                      'article, [class*=article-body], [class*=article-content], '
                      '[class*=article__body], [class*=post-content], [class*=entry-content], '
                      '[class*=story-body], [class*=story-content], [class*=content-body]'
                  ):
                      cn = ' '.join(c.get('class', []))
                      if any(x in cn for x in ['nav', 'sidebar', 'related', 'widget', 'comment', 'footer', 'header']): continue
                      chunk = '\n\n'.join([p.get_text(strip=True) for p in c.find_all('p') if len(p.get_text(strip=True)) > 40])
                      if len(chunk) > len(article_text): article_text = chunk
              if len(article_text) < 300:
                  all_p = soup.find_all('p')
                  chunk = '\n\n'.join([p.get_text(strip=True) for p in all_p if len(p.get_text(strip=True)) > 40])
                  if len(chunk) > 300: article_text = chunk
              if len(article_text) < 300:
                  body = soup.find('body')
                  if body:
                      for tag in body.find_all(['script', 'style', 'nav', 'header', 'footer', 'aside', 'noscript']): tag.decompose()
                      lns = [l.strip() for l in body.get_text(separator='\n').split('\n') if len(l.strip()) > 50]
                      article_text = '\n\n'.join(lns)

              # â”€â”€ Image extraction: og:image > twitter:image > article hero > first large img â”€â”€
              img_url = ''
              base_url = '/'.join(url.split('/')[:3])

              # 1. og/twitter meta tags
              for meta in soup.find_all('meta'):
                  prop = meta.get('property', '') or meta.get('name', '')
                  if prop in ['og:image', 'og:image:secure_url', 'twitter:image', 'twitter:image:src']:
                      cand = meta.get('content', '')
                      if is_good_image(cand):
                          img_url = cand; break

              # 2. Article hero / featured image selectors
              if not img_url:
                  for sel in [
                      '[class*=featured-image] img',
                      '[class*=hero] img',
                      '[class*=article-image] img',
                      '[class*=post-thumbnail] img',
                      'article img',
                      '[class*=article] img',
                      'picture source',
                      'picture img',
                  ]:
                      els = soup.select(sel)
                      for el in els:
                          src = (el.get('src') or el.get('srcset', '').split(' ')[0]
                                 or el.get('data-src') or el.get('data-lazy-src', ''))
                          if not src: continue
                          if not src.startswith('http'):
                              src = base_url + '/' + src.lstrip('/')
                          if is_good_image(src):
                              img_url = src; break
                      if img_url: break

              # 3. Any img tag with meaningful dimensions
              if not img_url:
                  for img in soup.find_all('img'):
                      src = img.get('src', '') or img.get('data-src', '')
                      w   = img.get('width', '0')
                      h   = img.get('height', '0')
                      try:
                          if int(str(w).replace('px','') or 0) >= 200 and is_good_image(src):
                              if not src.startswith('http'):
                                  src = base_url + '/' + src.lstrip('/')
                              img_url = src; break
                      except Exception:
                          pass

              return article_text, img_url, page_title

          def scrape_article_or_social(url):
              print(f"[Article] {url}")
              data = {'platform': 'Article', 'url': url, 'type': 'article', 'image': '', 'text': '', 'title': ''}
              best_text, best_img, best_title = '', '', ''
              for strategy, wait_until, block_media in [
                  ('networkidle',      'networkidle',      False),
                  ('domcontentloaded', 'domcontentloaded', False),
                  ('light-block',      'domcontentloaded', True),
              ]:
                  try:
                      with sync_playwright() as p:
                          browser = p.chromium.launch(headless=True, args=[
                              '--no-sandbox', '--disable-dev-shm-usage',
                              '--disable-blink-features=AutomationControlled'
                          ])
                          ctx  = browser.new_context(
                              user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36',
                              viewport={'width': 1920, 'height': 1080}
                          )
                          page = ctx.new_page()
                          stealth_sync(page)
                          if block_media:
                              page.route('**/*', lambda r: r.abort() if r.request.resource_type in ['media', 'font'] else r.continue_())
                          try: page.goto(url, timeout=60000, wait_until=wait_until)
                          except Exception: pass
                          try: page.wait_for_selector('p', timeout=8000)
                          except Exception: pass
                          page.evaluate('window.scrollBy(0, 800)')
                          page.wait_for_timeout(4000)
                          html = page.content()
                          browser.close()
                      soup = BeautifulSoup(html, 'html.parser')
                      text, img, title = extract_html_content(soup, url)
                      if len(text) > len(best_text): best_text = text
                      if img and not best_img:        best_img  = img
                      if title and not best_title:    best_title = title
                      if len(best_text) > 400 and best_img: break
                  except Exception as e:
                      print(f"  Strategy {strategy} failed: {e}")
              data['text']  = best_text
              data['image'] = best_img
              data['title'] = best_title
              print(f"  chars: {len(data['text'])} | image: {'yes' if data['image'] else 'none'} | title: {data['title'][:50]}")
              return data

          def format_all_sources(all_data):
              parts = []
              for idx, d in enumerate(all_data, 1):
                  plat = d.get('platform', 'Unknown')
                  parts.append(f'\n{"=" * 60}')
                  parts.append(f'SOURCE {idx}: {plat.upper()} -- {d.get("url", "")[:80]}')
                  parts.append('=' * 60)
                  if plat == 'YouTube':
                      if d.get('type') == 'channel':
                          parts.append(f'Channel Name   : {d.get("channel_name", "N/A")}')
                          parts.append(f'Subscribers    : {fmt_num(d.get("subscriber_count"))}')
                          parts.append(f'Total Views    : {fmt_num(d.get("total_views"))}')
                          parts.append(f'Total Videos   : {d.get("video_count", "N/A")}')
                          if d.get('avg_views'):
                              parts.append(f'Avg Views/Video: {fmt_num(d["avg_views"])}')
                              parts.append(f'Peak Views     : {fmt_num(d["peak_views"])}')
                              parts.append(f'Lowest Views   : {fmt_num(d["min_views"])}')
                          if d.get('description'):
                              parts.append(f'Channel Bio    : {d["description"]}')
                          if d.get('recent_videos'):
                              parts.append('\nRECENT VIDEOS:')
                              for v in d['recent_videos']:
                                  parts.append(f'  - {v["title"]} | Views: {fmt_num(v.get("views"))} | Likes: {fmt_num(v.get("likes"))} | Date: {v.get("upload_date", "")}')
                      elif d.get('type') == 'video':
                          parts.append(f'Video Title    : {d.get("title", "N/A")}')
                          parts.append(f'Channel        : {d.get("channel_name", "N/A")}')
                          parts.append(f'Channel Subs   : {fmt_num(d.get("subscriber_count"))}')
                          parts.append(f'Views          : {fmt_num(d.get("views"))}')
                          parts.append(f'Likes          : {fmt_num(d.get("likes"))}')
                          parts.append(f'Comments       : {fmt_num(d.get("comment_count"))}')
                          parts.append(f'Duration       : {fmt_dur(d.get("duration"))}')
                          parts.append(f'Upload Date    : {d.get("upload_date", "N/A")}')
                          if d.get('tags'):
                              parts.append(f'Tags           : {", ".join(d["tags"][:8])}')
                          if d.get('description'):
                              parts.append(f'Description    : {d["description"]}')
                          if d.get('top_comments'):
                              parts.append('\nTOP COMMENTS:')
                              for c in d['top_comments'][:12]:
                                  parts.append(f'  [{c["likes"]} likes] "{c["text"]}"')
                  elif plat == 'Spotify':
                      if d.get('artist_name'): parts.append(f'Artist           : {d["artist_name"]}')
                      if d.get('album_name'):  parts.append(f'Album            : {d["album_name"]}')
                      if d.get('track_name'):  parts.append(f'Track            : {d["track_name"]}')
                      if d.get('monthly_listeners'): parts.append(f'Monthly Listeners: {d["monthly_listeners"]}')
                      if d.get('followers'):   parts.append(f'Followers        : {d["followers"]}')
                      if d.get('top_tracks'):
                          parts.append('\nTOP TRACKS:')
                          for t in d['top_tracks']: parts.append(f'  - {t}')
                      if d.get('tracklist'):
                          parts.append('\nTRACKLIST:')
                          for t in d['tracklist']: parts.append(f'  - {t}')
                      if d.get('recent_releases'):
                          parts.append(f'Recent Releases  : {", ".join(d["recent_releases"][:8])}')
                      if d.get('page_summary'):
                          parts.append(f'\nFull page context:\n{d["page_summary"][:2000]}')
                  elif plat == 'Article':
                      parts.append(f'Headline : {d.get("title", "N/A")}')
                      if d.get('text'):
                          parts.append(f'\nArticle text:\n{d["text"][:5000]}')
              return '\n'.join(parts)

          # ================================================================
          #  MAIN EXECUTION
          # ================================================================
          raw_input_urls        = os.environ.get('INPUT_URLS', '').strip()
          author                = os.environ.get('INPUT_AUTHOR', 'Za Ndani').strip()
          category              = os.environ.get('INPUT_CATEGORY', 'Entertainment').strip()
          article_angle         = ' '.join(os.environ.get('INPUT_ANGLE', '').split())
          title_keywords_raw    = ' '.join(os.environ.get('INPUT_TITLE_KEYWORDS', '').split())
          title_format_choice   = os.environ.get('INPUT_TITLE_FORMAT', 'AUTO').strip()
          custom_title_override = ' '.join(os.environ.get('INPUT_CUSTOM_TITLE', '').split())

          persona     = AUTHOR_PERSONAS.get(author, AUTHOR_PERSONAS['Za Ndani'])
          posts_dir   = os.environ.get('POSTS_DIR', 'content/posts')
          memory_path = os.environ.get('MEMORY_FILE', '.github/memory_multi_source.json')

          urls = parse_urls(raw_input_urls)
          if not urls:
              print('No valid URLs found.'); sys.exit(1)

          print(f'\nProcessing {len(urls)} URL(s):')
          for u in urls: print(f'  > {u}')

          url_hash = hashlib.md5('|'.join(sorted(urls)).encode()).hexdigest()
          memory   = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          if url_hash in memory:
              print('Already processed. Exiting.'); sys.exit(0)

          all_source_data = []

          yt_urls    = [u for u in urls if detect_platform(u) == 'youtube']
          spot_urls  = [u for u in urls if detect_platform(u) == 'spotify']
          other_urls = [u for u in urls if detect_platform(u) == 'article']

          for u in yt_urls:
              all_source_data.append(scrape_youtube(u))

          if spot_urls:
              with sync_playwright() as pw:
                  browser = pw.chromium.launch(headless=True, args=[
                      '--no-sandbox', '--disable-dev-shm-usage',
                      '--disable-blink-features=AutomationControlled'
                  ])
                  ctx  = browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36',
                      viewport={'width': 1920, 'height': 1080}
                  )
                  page = ctx.new_page()
                  for u in spot_urls:
                      all_source_data.append(scrape_spotify(u, page))
                  browser.close()

          for u in other_urls:
              all_source_data.append(scrape_article_or_social(u))

          # â”€â”€ Pick best cover image â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cover_image = ''
          for d in all_source_data:
              img = d.get('image', '')
              if img and is_good_image(img):
                  cover_image = img
                  break
          if cover_image:
              print(f'  Using image from Article: {cover_image[:80]}')
              cover_image = upload_to_imgbb(cover_image)
          else:
              print('  No usable cover image found.')

          research_text = format_all_sources(all_source_data)
          print(f'\nTotal research data: {len(research_text)} chars')

          # â”€â”€ Gemini setup â€” EXACT pattern from working workflow â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1"] if os.environ.get(k)]
          if not raw_keys:
              print("No Gemini API keys found."); sys.exit(1)
          key_cycle    = itertools.cycle(raw_keys)
          current_key  = next(key_cycle)
          client       = genai.Client(api_key=current_key)

          def gemini_generate(prompt_text, label=""):
              global current_key, client
              import concurrent.futures
              CALL_TIMEOUT = 90  # hard 90s timeout per attempt

              def _call(mdl):
                  cfg = types.GenerateContentConfig(temperature=0.9, max_output_tokens=4096)
                  return client.models.generate_content(model=mdl, contents=prompt_text, config=cfg)

              for model in MODELS_TO_TRY:
                  for attempt in range(3):
                      try:
                          print(f'  [{label}] Trying {model} (attempt {attempt+1})...')
                          with concurrent.futures.ThreadPoolExecutor(max_workers=1) as ex:
                              future = ex.submit(_call, model)
                              try:
                                  resp = future.result(timeout=CALL_TIMEOUT)
                              except concurrent.futures.TimeoutError:
                                  print(f'  Timeout after {CALL_TIMEOUT}s ({model}) - trying next')
                                  future.cancel()
                                  break  # move to next model
                          text = (resp.text or '').strip()
                          if text:
                              print(f'[Gemini OK] ({model}): {label}')
                              return text
                          print(f'  Empty response ({model}) attempt {attempt+1}')
                      except Exception as e:
                          err = str(e)
                          if '429' in err or 'quota' in err.lower() or 'rate' in err.lower():
                              wait = random.uniform(20, 35)
                              print(f'  Rate limit ({model}), cycling key, waiting {wait:.0f}s...')
                              time.sleep(wait)
                              current_key = next(key_cycle)
                              client = genai.Client(api_key=current_key)
                              continue
                          print(f'  Gemini error ({model}): {e}')
                          break
              print(f'  All attempts failed for: {label}')
              return None

          # â”€â”€ Build title instruction â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          banned_str = ', '.join(f'"{p}"' for p in BANNED_PHRASES)
          if custom_title_override:
              title_instruction = f'USE THIS EXACT TITLE (do not change it): {custom_title_override}'
          else:
              fmt_hints = {
                  'LIST':     'Format the title as a numbered list hook e.g. "10 Reasons Why..."',
                  'BIO':      'Format as a biography hook e.g. "Name: Age, Net Worth and Story"',
                  'SCANDAL':  'Format as a scandal hook e.g. "Name Did X - And Paid The Price"',
                  'GUIDE':    f'Format as a guide hook e.g. "How To X in {current_year}"',
                  'TRENDING': 'Format as a dramatic trending hook that creates FOMO',
                  'NEWS':     'Format as a straight factual news headline',
                  'AUTO':     'Choose the best title format for the content.',
              }
              hint = fmt_hints.get(title_format_choice, fmt_hints['AUTO'])
              kw_instruction = (
                  f'\nARTICLE FOCUS SIGNALS: {title_keywords_raw}\n'
                  'Interpret each signal as an angle to address. '
                  'Generate a smart title from those angles - do NOT paste signals verbatim.'
              ) if title_keywords_raw else ''
              title_instruction = f'TITLE FORMAT: {hint}{kw_instruction}'

          angle_instruction = f'\nARTICLE ANGLE: {article_angle}' if article_angle else ''

          # â”€â”€ Build prompt â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          prompt = (
              f'You are writing as {persona}.\n'
              f'Today is {full_date_str}. Site: {SITE_BASE_URL}\n\n'
              f'{title_instruction}{angle_instruction}\n\n'
              f'RESEARCH DATA:\n{research_text}\n\n'
              'INSTRUCTIONS:\n'
              '- Write a complete article of 700-1000 words in HTML format.\n'
              '- TONE: Write like a real human journalist - conversational, direct, opinionated where appropriate. No AI-sounding phrases, no robotic structure.\n'
              '- EEAT (Experience, Expertise, Authoritativeness, Trustworthiness):\n'
              '  * Experience: Ground claims in real-world observation and Kenyan context. Mention specific places, people, situations.\n'
              '  * Expertise: Show deep knowledge of the topic. No shallow takes.\n'
              '  * Authoritativeness: Write with conviction. No hedging phrases like "it seems" or "some say".\n'
              '  * Trustworthiness: Stick to verifiable facts from the research data. No speculation presented as fact.\n'
              '- INDEPENDENCE: Write from your own expert perspective. NEVER reference, contrast with, or react to what other media outlets say. Do not use phrases like "mainstream media ignores", "what they won\'t tell you", "unlike other reports". Just write your original analysis.\n'
              '- STRUCTURE: Start with a 30-40 word lede (who/what/where/when). Then use <h2> subheadings and <p> tags. No heading above the lede.\n'
              f'- BANNED PHRASES (never use any of these): {banned_str}\n'
              '- Do NOT use markdown - use HTML only.\n'
              '- Do NOT start sentences with "Moreover", "Furthermore", "In conclusion", "It is worth noting".\n'
              '- End your response with the following metadata on their own lines:\n'
              'TITLE: Your High-CTR SEO Title\n'
              'EXCERPT: 140-155 character meta description starting with the subject or a verb, includes key news fact\n'
              f'- Category: {category}, Author: {author}\n'
          )

          # â”€â”€ Generate article â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          raw = gemini_generate(prompt, label='article')
          if not raw:
              print('Failed to generate content.'); sys.exit(1)

          # â”€â”€ Extract title â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          title_match = re.search(r'TITLE:\s*(.+)', raw, re.IGNORECASE)
          excerpt_match = re.search(r'EXCERPT:\s*(.+)', raw, re.IGNORECASE)

          if title_match:
              final_title = title_match.group(1).strip().strip('"')
              article_html = raw[:title_match.start()].strip()
          else:
              article_html = raw.strip()
              final_title = custom_title_override or 'Untitled Article'

          final_excerpt = ""
          if excerpt_match:
              final_excerpt = excerpt_match.group(1).strip().strip('"')
              article_html = article_html.replace(excerpt_match.group(0), "").strip()

          # â”€â”€ Write post file â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          slug        = title_to_slug(final_title)
          author_slug = AUTHOR_SLUGS.get(author, 'za-ndani')
          frontmatter = (
              '---\n'
              f'title: "{final_title.replace(chr(34), chr(39))}"\n'
              f'date: {publish_timestamp}\n'
              f'slug: {slug}\n'
              f'author: "{author_slug}"\n'
              f'category: "{category.lower()}"\n'
              f'excerpt: "{final_excerpt.replace(chr(34), chr(39))}"\n'
              f'image: "{cover_image}"\n'
              'draft: false\n'
              '---\n'
          )
          post_content = frontmatter + '\n' + article_html + '\n'
          os.makedirs(posts_dir, exist_ok=True)
          filename = f'{today_str}-{slug}.md'
          filepath = os.path.join(posts_dir, filename)
          with open(filepath, 'w', encoding='utf-8') as f:
              f.write(post_content)
          print(f'\nPublished: {filepath}')
          print(f'Title    : {final_title}')
          print(f'Image    : {cover_image[:80] if cover_image else "none"}')

          memory.append(url_hash)
          os.makedirs(os.path.dirname(memory_path), exist_ok=True)
          with open(memory_path, 'w') as f:
              json.dump(memory[-200:], f)
          print('Done!')
          PYEOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          commit_message: "content: new article published [skip ci]"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_multi_source.json'

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://zandani.co.ke/sitemap.xml" || true
          echo "Google sitemap pinged"