              'children':     'Mention [subject]s children — how many, their names, and context.',
              'kids':         'Mention [subject]s children — names, ages, and family context.',
              'family':       'Cover [subject]s family background, relatives, and family life.',
              'parents':      'Cover [subject]s parents — their names, background, and influence.',
              'siblings':     'Mention [subject]s siblings and their relationship.',
              'controversy':  'Focus on the controversy — what happened, public reactions, and fallout.',
              'scandal':      'Expose the scandal — facts, timeline, and consequences.',
              'beef':         'Cover the beef/feud — who, what was said, and current status.',
              'feud':         'Detail the feud — cause, escalation, and current resolution.',
              'drama':        'Cover the drama — events, reactions, and what it means.',
              'cheating':     'Address cheating allegations — claims, responses, and evidence.',
              'exposed':      'Cover what was exposed — the details and public reaction.',
              'arrested':     'Cover the arrest — charges, circumstances, and legal status.',
              'fired':        'Cover why [subject] was fired — what led to it and the aftermath.',
              'apology':      'Cover the apology — what was said sorry for and public reception.',
              'followers':    'Mention [subject]s social media following and online influence.',
              'viral':        'Cover the viral moment — what happened and why it spread.',
              'reaction':     'Include significant public and fan reactions and responses.',
              'fans':         'Cover fan reactions, fan base culture, and audience response.',
          }

          title_signal_block = ''
          if title_keywords_raw:
              raw_parts = [s.strip() for s in title_keywords_raw.split(',') if s.strip()]
              expanded_lines = []
              unknown_topics = []

              for part in raw_parts:
                  part_lower = part.lower()
                  if part_lower in FOCUS_MAP:
                      expanded_lines.append('  - ' + FOCUS_MAP[part_lower])
                  else:
                      matched = False
                      for word in part_lower.split():
                          if word in FOCUS_MAP:
                              expanded_lines.append('  - ' + FOCUS_MAP[word])
                              matched = True
                              break
                      if not matched:
                          unknown_topics.append(part)

              title_signal_block = '\nARTICLE FOCUS DIRECTIVES: ' + title_keywords_raw + '\n'
              if expanded_lines:
                  title_signal_block += 'The article MUST cover each of these points about the main subject:\n'
                  title_signal_block += '\n'.join(expanded_lines) + '\n'
              if unknown_topics:
                  title_signal_block += (
                      'Also weave these topics/names/events naturally into the article: '
                      + ', '.join(unknown_topics) + '\n'
                  )
              title_signal_block += (
                  'For the TITLE: craft a compelling headline inspired by the DOMINANT angle above.\n'
                  'Do NOT paste directive words (who/where/how/etc.) literally into the title.\n'
                  'WRONG: "Who Is Wizkid, Where and How He Made It"\n'
                  'RIGHT: "Wizkid: From Lagos Streets to Afrobeats Throne"\n'
              )

          title_format_block = ''
          if title_format_choice and title_format_choice != 'AUTO':
              title_format_block = (
                  '\nFORCED TITLE FORMAT: ' + title_format_choice + ' — use this pattern from the Smart Title Engine. No other format.\n'
              )

          custom_title_block = ''
          if custom_title_override:
              custom_title_block = (
                  '\nEDITOR TITLE OVERRIDE (do not change):\n'
                  '  TITLE: ' + custom_title_override + '\n'
                  '  SLUG : ' + title_to_slug(custom_title_override) + '\n'
                  'Output exactly these for TITLE and SLUG. Generate everything else normally.\n'
              )

          banned_str = ', '.join(BANNED_PHRASES)
          angle_str  = '\nARTICLE ANGLE: ' + article_angle + '\n' if article_angle else ''

          prompt = (
              'Current Date: ' + full_date_str + '. Current Year: ' + current_year + '.\n'
              + angle_str + custom_title_block + title_signal_block + title_format_block
              + 'RESEARCH DATA FROM ' + str(len(all_source_data)) + ' SOURCE(S):\n'
              + combined_data[:16000] + '\n\n'
              + internal_links + '\n\n'
              + 'TASK: Write a news/entertainment report as ' + persona + '\n'
              'You must use Google Search to verify facts and find additional context.\n\n'
              'CRITICAL RULES:\n'
              '- Write with authority. NEVER reveal the data source.\n'
              '- Reference numbers naturally: "commands X million subscribers" not "data shows".\n'
              '- Fan reactions: "Fans flooded the comments..." not "comments show".\n'
              '- When multiple platforms available, weave into one unified narrative.\n\n'
              'SMART TITLE ENGINE:\n'
              'Step 1 - Extract PRIMARY SUBJECT: the 1-2 most important names or entities.\n'
              'Step 2 - Identify the STORY HOOK: what makes this worth reading right now?\n'
              'Step 3 - If TITLE ANGLE SIGNALS provided, extract the CONCEPT behind them — do not use the words literally.\n'
              'Step 4 - Choose format (or use FORCED FORMAT if provided):\n'
              '  LIST    : "[N] Things About [Subject] That [Hook]"\n'
              '  BIO     : "[Subject]: Real Name, Age, Net Worth Revealed"\n'
              '  SCANDAL : "[Subject] [Specific Action] — [Consequence]"\n'
              '  GUIDE   : "[Subject]: How [Hook] in ' + current_year + '"\n'
              '  TRENDING: "[Subject] [Short Dramatic Hook]"\n'
              '  NEWS    : "[Subject] [Specific Fact]"\n'
              'Step 5 - Title: lead with the SUBJECT, under 65 characters, reads naturally.\n'
              'Step 6 - Slug: subject keywords only, lowercase, hyphens, no filler words.\n\n'
              'LANGUAGE RULES:\n'
              '- Professional Kenyan English only. No Sheng, no Swahili.\n'
              '- No British fillers ("Right,", "Well,").\n'
              '- No bracketed asides.\n'
              '- Single hyphens only — never em-dashes.\n'
              '- BANNED: ' + banned_str + '\n\n'
              'OUTPUT FORMAT (nothing else, no fences):\n'
              'TITLE: ...\n'
              'SLUG: ...\n'
              'EXCERPT: [140-155 chars, starts with subject or verb, contains key fact]\n'
              'TAGS: [comma-separated, lowercase, specific, SEO-focused]\n'
              'BODY:\n'
              '[1. Lede: 35-45 words, no heading, answers who/what/when/where — Google Featured Snippet.\n'
              '2. ## H2 containing PRIMARY SUBJECT.\n'
              '3. ### sub-sections reusing PRIMARY SUBJECT naturally.\n'
              'No title, author, date, or metadata inside the body.]'
          )

          raw_keys = [os.environ.get('GEMINI_WRITE_KEY'), os.environ.get('GEMINI_API_KEY'), os.environ.get('GEMINI_API_KEY1')]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys:
              print('No Gemini API keys.'); sys.exit(1)

          key_cycle    = itertools.cycle(api_keys)
          current_key  = next(key_cycle)
          client       = genai.Client(api_key=current_key)
          gsearch_tool = types.Tool(google_search=types.GoogleSearch())
          full_text    = ''
          success_flag = False

          for attempt in range(len(api_keys) * len(MODELS_TO_TRY)):
              model = MODELS_TO_TRY[attempt % len(MODELS_TO_TRY)]
              try:
                  response = client.models.generate_content(
                      model=model,
                      contents=prompt,
                      config=types.GenerateContentConfig(
                          tools=[gsearch_tool],
                          temperature=0.7,
                          max_output_tokens=8192,
                      )
                  )
                  full_text    = response.text
                  success_flag = True
                  print(f'[Gemini] Generated with {model}')
                  break
              except Exception as e:
                  print(f'[Gemini] Attempt {attempt + 1} failed ({model}): {e}')
                  current_key = next(key_cycle)
                  client      = genai.Client(api_key=current_key)
                  time.sleep(2)

          if not success_flag or not full_text:
              print('All Gemini attempts failed.'); sys.exit(1)

          def extract_field(text, field):
              m = re.search(r'^' + field + r':\s*(.+)$', text, re.MULTILINE)
              return m.group(1).strip().strip('"').strip("'") if m else ''

          title    = extract_field(full_text, 'TITLE')
          slug     = extract_field(full_text, 'SLUG')
          excerpt  = extract_field(full_text, 'EXCERPT')
          tags_str = extract_field(full_text, 'TAGS')
          body_m   = re.search(r'^BODY:\s*\n(.*)', full_text, re.MULTILINE | re.DOTALL)
          body     = body_m.group(1).strip() if body_m else ''

          if custom_title_override:
              title = custom_title_override
              slug  = title_to_slug(custom_title_override)

          if not title or not body:
              print('Failed to generate content.'); sys.exit(1)

          slug = re.sub(r'[^a-z0-9-]', '', slug.lower().replace(' ', '-'))
          slug = re.sub(r'-+', '-', slug).strip('-')[:70]
          if not slug: slug = title_to_slug(title)

          # Re-host the scraped image to ImgBB as WebP
          if primary_image:
              primary_image = upload_to_imgbb(primary_image)

          tags      = [t.strip().lower() for t in tags_str.split(',') if t.strip()]
          tags_yaml = ', '.join(['"' + t + '"' for t in tags])
          author_slug = AUTHOR_SLUGS.get(author, 'za-ndani')

          frontmatter = (
              '---\n'
              'title: "' + title + '"\n'
              'slug: "' + slug + '"\n'
              'date: "' + publish_timestamp + '"\n'
              'draft: false\n'
              'author: "' + author + '"\n'
              'authorSlug: "' + author_slug + '"\n'
              'categories: ["' + category + '"]\n'
              'tags: [' + tags_yaml + ']\n'
              'excerpt: "' + excerpt + '"\n'
              'image: "' + primary_image + '"\n'
              '---'
          )

          filename = today_str + '-' + slug + '.md'
          filepath = os.path.join(posts_dir, filename)
          os.makedirs(posts_dir, exist_ok=True)
          with open(filepath, 'w', encoding='utf-8') as f:
              f.write(frontmatter + '\n\n' + body + '\n')

          print('\n' + '=' * 60)
          print('File   : ' + filepath)
          print('Title  : ' + title)
          print('Slug   : ' + slug)
          print('Image  : ' + (primary_image or 'NONE'))
          print('=' * 60)

          memory.append(url_hash)
          os.makedirs(os.path.dirname(memory_path), exist_ok=True)
          with open(memory_path, 'w') as f:
              json.dump(memory[-200:], f)
          print('Done!')
          PYEOF

      - name: Commit and push article
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.POSTS_DIR }}/" "${{ env.MEMORY_FILE }}" || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: publish article [skip ci]"
            git push origin ${{ env.DEFAULT_BRANCH }}
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Article Generation Summary"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Status | :white_check_mark: Published |"
            echo "| Author | ${{ inputs.author }} |"
            echo "| Category | ${{ inputs.category }} |"
            if [ -n "${{ inputs.title_keywords }}" ]; then
              echo "| Title Signals | ${{ inputs.title_keywords }} |"
            fi
            echo "| Title Format | ${{ inputs.title_format }} |"
            if [ -n "${{ inputs.custom_title }}" ]; then
              echo "| Title Override | ${{ inputs.custom_title }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
