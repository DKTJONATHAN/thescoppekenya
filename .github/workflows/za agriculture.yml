name: Timothy Muli - Agriculture Scraper

on:
  schedule:
    - cron: '25 7,16 * * *' 
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_timothy.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")

          # STRICTLY ENFORCED MODELS
          MODELS_TO_TRY = ["gemini-3-pro-preview", "gemini-2.5-flash"]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  print(f"📸 Fetching image for ImgBB: {image_url}")
                  img_data = requests.get(image_url, timeout=15).content
                  base64_image = base64.b64encode(img_data)
                  payload = {"key": api_key, "image": base64_image}
                  res = requests.post("https://api.imgbb.com/1/upload", payload, timeout=20)
                  new_url = res.json()['data']['url']
                  print(f"✅ Successfully re-hosted to: {new_url}")
                  return new_url
              except Exception as e:
                  print(f"⚠️ ImgBB Failed: {e}")
                  return image_url

          def get_target_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      context = browser.new_context(user_agent="Mozilla/5.0")
                      page = context.new_page()
                      page.goto('https://smartfarmerkenya.com/', timeout=60000, wait_until="domcontentloaded")
                      page.evaluate("window.scrollBy(0, 1000)")
                      page.wait_for_timeout(3000)
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if len(href) > 35 and href.count('-') > 2 and '/author/' not in href:
                              urls.append(href if href.startswith('http') else 'https://smartfarmerkenya.com' + href)
                      browser.close()
              except Exception as e: print(f"Scan error: {e}")
              return list(set(urls))

          def scrape_article_free(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      img_url = ""
                      meta_img = soup.find('meta', property='og:image') or soup.find('meta', name='twitter:image')
                      if meta_img: 
                          img_url = upload_to_imgbb(meta_img.get('content'))
                      
                      paras = soup.find_all('p')
                      article_text = "\n\n".join([p.get_text() for p in paras if len(p.get_text()) > 40])
                      title = soup.title.string.replace(' - Smart Farmer', '') if soup.title else "Agri News"
                      return article_text, img_url, title
                  except Exception as e: 
                      print(f"Scrape failed for {url}: {e}")
                      return None, None, None
                  finally: browser.close()

          def dash_scrubber(text):
              if not text: return ""
              text = text.replace('\u2014', '-').replace('\u2013', '-')
              text = text.replace(chr(8212), '-').replace(chr(8211), '-')
              return text

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          
          if not api_keys:
              print("❌ No Gemini API keys provided.")
              sys.exit(1)
              
          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)
          
          google_search_tool = types.Tool(google_search=types.GoogleSearch())

          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          
          full_raw_text, final_hash, target_title, target_image = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article_free(link)
              if text and len(text) > 300:
                  full_raw_text, target_image, final_hash, target_title = text, img, u_hash, title
                  break

          if not full_raw_text: 
              print("No new content found.")
              sys.exit(0)

          prompt = f'''Current Date: {full_date_str}
          ORIGINAL HEADLINE: "{target_title}"
          SOURCE SCRAPED TEXT: "{full_raw_text[:6000]}"
          
          TASK: Write an authoritative Kenyan agricultural news report as Timothy Muli. Professional tone.

          STRICT TIME RULE AND GOOGLE SEARCH:
          You MUST use Google Search to verify agricultural policies, crop prices, weather data, or farming tech. On every single search query you make, you must remind yourself of the current date ({full_date_str}) and only find data accurate as of this exact date. Ignore old news.

          LANGUAGE MANDATE:
          - Write in clear, professional Kenyan English.
          - NEVER use em dashes or en dashes. Only use regular single hyphens (-).
          
          STRICT OUTPUT FORMAT:
          - DO NOT include the title, author name (e.g., "By Timothy Muli"), date, or "updated on" anywhere in the body text. 
          - Start immediately with the core article content and paragraphs. Do not add introductory metadata.
          '''

          generated_body = ""
          success_flag = False
          keys_tried_in_round = 0

          for model_id in MODELS_TO_TRY:
              if success_flag: break
              print(f"🤖 Trying {model_id}...")
              for retry in range(len(api_keys) * 2):
                  try:
                      response = client.models.generate_content(
                          model=model_id, 
                          contents=prompt,
                          config=types.GenerateContentConfig(temperature=0.7, tools=[google_search_tool])
                      )
                      generated_body = response.text.strip()
                      if generated_body:
                          success_flag = True
                          print(f"✅ SUCCESS with {model_id}!")
                          break
                  except Exception as e:
                      if "429" in str(e):
                          keys_tried_in_round += 1
                          current_key = next(key_cycle)
                          client = genai.Client(api_key=current_key)
                          if keys_tried_in_round >= len(api_keys):
                              print("⏳ All keys hit quota. Waiting 65s...")
                              time.sleep(65)
                              keys_tried_in_round = 0
                      else: 
                          print(f"❌ Error with {model_id}: {e}")
                          break
          
          if not success_flag: sys.exit(1)

          # Cleanup formatting
          generated_body = re.sub(r'^```(?:markdown|text|html)?\n', '', generated_body, flags=re.IGNORECASE)
          generated_body = re.sub(r'\n```$', '', generated_body).strip()
          
          # Safety net: Strip out unwanted leading titles, dates, or author bylines just in case
          generated_body = re.sub(r'^(?:\*\*?)?(?:Title|Headline):?.*?\n+', '', generated_body, flags=re.IGNORECASE).strip()
          generated_body = re.sub(r'^(?:\*\*?)?(?:By|Author):?.*?\n+', '', generated_body, flags=re.IGNORECASE).strip()
          generated_body = re.sub(r'^(?:\*\*?)?(?:Date|Updated):?.*?\n+', '', generated_body, flags=re.IGNORECASE).strip()

          generated_body = dash_scrubber(generated_body)

          slug_name = f"agri-news-{final_hash[:8]}"

          final_file = textwrap.dedent(f"""\
          ---
          title: "{target_title.replace('"', "'")}"
          slug: "{slug_name}"
          author: "Timothy Muli"
          image: "{target_image}"
          category: "Agriculture"
          date: "{today_str}"
          ---

          {generated_body}
          """)

          out_dir = os.environ.get("POSTS_DIR", "content/posts")
          os.makedirs(out_dir, exist_ok=True)
          filename = f"{slug_name}.md"
          filepath = os.path.join(out_dir, filename)
          
          with open(filepath, "w", encoding="utf-8") as f:
              f.write(final_file)
          
          print(f"📝 Article successfully saved to: {filepath}")

          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          EOF

      - name: Git Pull and Push
        run: |
          git config --global user.name "Timothy Muli"
          git config --global user.email "bot@zandani.co.ke"
          git add content/posts/*.md .github/memory_timothy.json
          git commit -m "content: Timothy Muli agriculture report 🌾" || echo "No changes to commit"
          git pull origin main --rebase
          git push origin main