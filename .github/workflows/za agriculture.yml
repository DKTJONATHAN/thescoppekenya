name: Timothy Muli - Agriculture Scraper

on:
  schedule:
    - cron: '25 7,16 * * *' # Morning and Afternoon UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_timothy.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")

          MODELS_TO_TRY = ["gemini-2.0-flash", "gemini-1.5-flash"] # Updated to current stable versions

          BANNED_PHRASES = [
              "sasa basi", "melting the pot", "spill the tea", "tea is hot", 
              "grab your popcorn", "listen up", "buckle up", "breaking news",
              "sherehe", "form ni gani", "udaku", "hello guys", "welcome back",
              "mambo vipi", "niaje wasee", "karibuni", "tapestry", "dive in",
              "delve into", "moreover", "furthermore", "in conclusion", 
              "it's worth noting", "a testament to", "navigating the landscape",
              "in today's digital age", "shed light on"
          ]

          def get_target_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      context = browser.new_context(user_agent="Mozilla/5.0...")
                      page = context.new_page()
                      page.goto('https://smartfarmerkenya.com/', timeout=60000, wait_until="domcontentloaded")
                      page.evaluate("window.scrollBy(0, 1500)")
                      page.wait_for_timeout(4000)
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if len(href) > 35 and href.count('-') > 2 and '/author/' not in href:
                              urls.append(href)
                      browser.close()
              except Exception as e: print(f"Scan error: {e}")
              return list(set(urls))

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  # Download image and convert to base64
                  response = requests.get(image_url, timeout=15)
                  if response.status_code == 200:
                      base64_image = base64.b64encode(response.content)
                      payload = {"key": api_key, "image": base64_image}
                      res = requests.post("https://api.imgbb.com/1/upload", payload, timeout=20)
                      return res.json()['data']['url']
              except Exception as e:
                  print(f"ImgBB Upload Failed: {e}")
              return image_url

          def scrape_article_free(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      
                      # Image Extraction
                      img_url = ""
                      meta_img = soup.find('meta', property='og:image') or soup.find('meta', name='twitter:image')
                      if meta_img: img_url = meta_img.get('content')
                      
                      # Text Extraction
                      paras = soup.find_all('p')
                      article_text = "\n\n".join([p.get_text() for p in paras if len(p.get_text()) > 40])
                      title = soup.title.string.replace(' - Smart Farmer', '') if soup.title else "News"
                      
                      # Re-host image on ImgBB
                      if img_url:
                          print(f"📸 Re-hosting image to ImgBB...")
                          img_url = upload_to_imgbb(img_url)

                      return article_text, img_url, title
                  except: return None, None, None
                  finally: browser.close()

          # --- KEY ROTATION (NOW WITH 3 KEYS) ---
          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          # ... (Logic for selecting link and preparing prompt remains same) ...
          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          
          full_raw_text, final_hash, target_title, target_image = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article_free(link)
              if text and len(text) > 300:
                  full_raw_text, target_image, final_hash, target_title = text, img, u_hash, title
                  break

          if not full_raw_text: sys.exit(0)

          prompt = f"TASK: Write news report as Timothy Muli... SOURCE: {full_raw_text[:8000]}" # Truncated for token safety

          success_flag = False
          keys_tried = 0
          for model_id in MODELS_TO_TRY:
              for retry in range(len(api_keys) * 2):
                  try:
                      response = client.models.generate_content(model=model_id, contents=prompt)
                      full_text = response.text.strip()
                      success_flag = True
                      break
                  except Exception as e:
                      if "429" in str(e):
                          print("⚠️ Rotating API Key...")
                          current_key = next(key_cycle)
                          client = genai.Client(api_key=current_key)
                          keys_tried += 1
                          if keys_tried >= len(api_keys): time.sleep(20)
                      else: break
              if success_flag: break

          # ... (Parsing and File Saving logic) ...
          # Note: The 'target_image' used in the frontmatter is now the ImgBB link.
          
          final_file = textwrap.dedent(f"""\
          ---
          title: "{target_title}"
          slug: "agri-news-{final_hash[:8]}"
          author: "Timothy Muli"
          image: "{target_image}"
          category: "Agriculture"
          date: "{today_str}"
          ---
          {full_text}
          """)

          out_dir = os.environ.get("POSTS_DIR")
          os.makedirs(out_dir, exist_ok=True)
          with open(os.path.join(out_dir, f"{final_hash}.md"), "w") as f: f.write(final_file)
          
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          EOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: Timothy Muli hosted images 🌾"