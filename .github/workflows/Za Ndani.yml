name: Za Ndani - Mpasho Scraper

on:
  schedule:
    - cron: '0 5,7,9,11,13,15,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_zandani.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
