          2. Rephrase for maximum curiosity/cynicism.
          3. Output JSON with "final_title".
          """
          title_resp = client.models.generate_content(model="gemini-2.0-flash", contents=title_prompt)
          title_data = json.loads(re.search(r'{.*}', title_resp.text, re.DOTALL).group())
          final_title = title_data.get('final_title', target_title)

