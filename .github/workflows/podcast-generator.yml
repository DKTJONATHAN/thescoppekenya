name: Za Ndani - Daily Brief Generator

on:
  schedule:
    - cron: "5 4 * * *" # Daily at 04:05 UTC
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  PODCAST_DIR: content/podcasts
  AUDIO_DIR: public/audio/podcasts
  MEMORY_FILE: .github/memory_podcast.json

jobs:
  generate-daily-brief:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai python-dateutil

      - name: Generate Daily Brief Audio and Markdown
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          PODCAST_DIR: ${{ env.PODCAST_DIR }}
          AUDIO_DIR: ${{ env.AUDIO_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import datetime
          import hashlib
          import itertools
          import json
          import os
          import random
          import re
          import sys
          import time
          from pathlib import Path

          import requests
          from dateutil import parser as date_parser
          from google import genai

          POSTS_DIR = Path(os.environ.get("POSTS_DIR", "content/posts"))
          PODCAST_DIR = Path(os.environ.get("PODCAST_DIR", "content/podcasts"))
          AUDIO_DIR = Path(os.environ.get("AUDIO_DIR", "public/audio/podcasts"))
          MEMORY_PATH = Path(os.environ.get("MEMORY_FILE", ".github/memory_podcast.json"))

          PODCAST_DIR.mkdir(parents=True, exist_ok=True)
          AUDIO_DIR.mkdir(parents=True, exist_ok=True)
          MEMORY_PATH.parent.mkdir(parents=True, exist_ok=True)

          def parse_frontmatter(raw: str):
              match = re.match(r"^---\s*\n(.*?)\n---\s*\n?(.*)$", raw, re.DOTALL)
              if not match:
                  return {}, raw
              fm_raw = match.group(1)
              body = match.group(2)
              data = {}
              for line in fm_raw.splitlines():
                  if ":" not in line:
                      continue
                  k, v = line.split(":", 1)
                  data[k.strip()] = v.strip().strip('"').strip("'")
              return data, body

          def extract_description(data: dict, body: str):
              desc = data.get("description") or data.get("excerpt") or data.get("summary")
              if desc:
                  return str(desc).strip()
              cleaned = re.sub(r"\s+", " ", body).strip()
              return cleaned[:280]

          def parse_dt(value: str):
              try:
                  return date_parser.parse(value)
              except Exception:
                  return datetime.datetime.min

          memory = []
          if MEMORY_PATH.exists():
              try:
                  memory = json.loads(MEMORY_PATH.read_text(encoding="utf-8"))
              except Exception:
                  memory = []

          posts = []
          for fp in POSTS_DIR.glob("*.md"):
              try:
                  raw = fp.read_text(encoding="utf-8")
              except Exception:
                  continue
              fm, body = parse_frontmatter(raw)
              title = str(fm.get("title", "")).strip()
              if not title:
                  continue
              date_val = str(fm.get("date", "")).strip()
              description = extract_description(fm, body)
              slug = str(fm.get("slug", fp.stem)).strip()
              posts.append({
                  "slug": slug,
                  "title": title,
                  "description": description,
                  "date": parse_dt(date_val) if date_val else datetime.datetime.fromtimestamp(fp.stat().st_mtime),
              })

          if len(posts) < 5:
              print(f"Need at least 5 articles, found {len(posts)}")
              sys.exit(1)

          posts.sort(key=lambda p: p["date"], reverse=True)
          latest_five = posts[:5]

          digest_input = "|".join([p["slug"] for p in latest_five])
          brief_hash = hashlib.md5(digest_input.encode("utf-8")).hexdigest()
          if brief_hash in memory:
              print("Daily brief for latest 5 articles already exists. Exiting.")
              sys.exit(0)

          gemini_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY", "GEMINI_API_KEY", "GEMINI_API_KEY1"] if os.environ.get(k)]
          if not gemini_keys:
              print("Missing Gemini key(s).")
              sys.exit(1)

          key_cycle = itertools.cycle(gemini_keys)
          gemini_client = genai.Client(api_key=next(key_cycle))
          models = ["gemini-2.5-pro", "gemini-2.5-flash", "gemini-2.0-flash"]

          prompt = (
              "Write a spoken daily news brief script in clear, energetic English for Za Ndani.\n"
              "Use exactly these 5 stories and keep all facts grounded in the given text.\n"
              "Output spoken script only, no stage directions, no speaker labels.\n"
              "Length: 320-420 words.\n\n"
          )
          for i, article in enumerate(latest_five, 1):
              prompt += (
                  f"Story {i}\n"
                  f"Title: {article['title']}\n"
                  f"Description: {article['description']}\n\n"
              )
          prompt += "Include a short intro, smooth transitions, and a concise outro."

          script_text = ""
          for model in models:
              for _ in range(3):
                  try:
                      resp = gemini_client.models.generate_content(model=model, contents=prompt)
                      script_text = (resp.text or "").strip()
                      script_text = re.sub(r"\[.*?\]", "", script_text)
                      script_text = re.sub(r"^[A-Za-z ]+:\s*", "", script_text, flags=re.MULTILINE)
                      if script_text:
                          break
                  except Exception as e:
                      if "429" in str(e):
                          time.sleep(random.uniform(4, 9))
                          gemini_client = genai.Client(api_key=next(key_cycle))
                          continue
                      print(f"Gemini error ({model}): {e}")
              if script_text:
                  break

          if not script_text:
              print("Failed to generate script from Gemini.")
              sys.exit(1)

          eleven_key = os.environ.get("ELEVENLABS_API_KEY")
          if not eleven_key:
              print("ELEVENLABS_API_KEY is missing.")
              sys.exit(1)

          voice_id = "21m00Tcm4TlvDq8ikWAM"
          tts_url = f"https://api.elevenlabs.io/v1/text-to-speech/{voice_id}"
          tts_headers = {
              "Accept": "audio/mpeg",
              "Content-Type": "application/json",
              "xi-api-key": eleven_key,
          }
          tts_payload = {
              "text": script_text,
              "model_id": "eleven_multilingual_v2",
              "voice_settings": {"stability": 0.45, "similarity_boost": 0.8},
          }

          tts_resp = requests.post(tts_url, headers=tts_headers, json=tts_payload, timeout=120)
          if tts_resp.status_code != 200:
              print(f"ElevenLabs failed: {tts_resp.status_code} {tts_resp.text}")
              sys.exit(1)

          now = datetime.datetime.utcnow()
          date_str = now.strftime("%Y-%m-%d")
          time_stamp = now.strftime("%Y%m%d-%H%M%S")
          slug = f"{date_str}-daily-brief"
          audio_filename = f"{date_str}-daily-brief-{time_stamp}.mp3"
          audio_path = AUDIO_DIR / audio_filename
          audio_path.write_bytes(tts_resp.content)
          audio_url = f"/audio/podcasts/{audio_filename}"

          top_titles = [p["title"] for p in latest_five]
          excerpt = "Daily brief on: " + "; ".join(top_titles[:3]) + "."
          iso_time = now.strftime("%Y-%m-%dT%H:%M:%SZ")

          md_content = "\n".join([
              "---",
              f'title: "Za Ndani Daily Brief - {date_str}"',
              f'slug: "{slug}"',
              f'date: "{iso_time}"',
              'author: "Za Ndani"',
              'authorUrl: "https://zandani.co.ke/author/za-ndani"',
              f'dateModified: "{iso_time}"',
              'schema: "PodcastEpisode"',
              f'excerpt: "{excerpt.replace(chr(34), chr(39))}"',
              f'audio_url: "{audio_url}"',
              "---",
              "",
              "**Brief Script:**",
              "",
              script_text,
          ])

          md_file = PODCAST_DIR / f"{slug}.md"
          md_file.write_text(md_content, encoding="utf-8")

          memory.append(brief_hash)
          MEMORY_PATH.write_text(json.dumps(memory[-300:]), encoding="utf-8")

          print(f"Created: {md_file}")
          print(f"Created: {audio_path}")
          EOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Podcast Bot <bot@zandani.co.ke>"
          commit_message: "content: generated daily brief audio and script"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: "content/podcasts/*.md public/audio/podcasts/*.mp3 .github/memory_podcast.json"
