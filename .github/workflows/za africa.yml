name: Amara Ndlovu - Pan-Africa Entertainment Scraper

on:
  schedule:
    # Nigeria (00:40 and 12:40 UTC)
    - cron: '40 0,12 * * *'
    # South Africa (02:40 and 14:40 UTC)
    - cron: '40 2,14 * * *'
    # Ghana (04:40 and 16:40 UTC)
    - cron: '40 4,16 * * *'
    # Uganda (06:40 and 18:40 UTC)
    - cron: '40 6,18 * * *'
    # Tanzania (08:40 and 20:40 UTC)
    - cron: '40 8,20 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_amara.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          current_hour = datetime.datetime.utcnow().hour

          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          # DYNAMIC COUNTRY ROUTING
          if current_hour in [0, 12]:
              target_country, target_url, base_url = "Nigeria", "https://www.pulse.ng/entertainment", "https://www.pulse.ng"
          elif current_hour in [2, 14]:
              target_country, target_url, base_url = "South Africa", "https://www.thesouthafrican.com/culture/entertainment/", "https://www.thesouthafrican.com"
          elif current_hour in [4, 16]:
              target_country, target_url, base_url = "Ghana", "https://www.pulse.com.gh/entertainment", "https://www.pulse.com.gh"
          elif current_hour in [6, 18]:
              target_country, target_url, base_url = "Uganda", "https://mbu.ug/", "https://mbu.ug"
          elif current_hour in [8, 20]:
              target_country, target_url, base_url = "Tanzania", "https://www.thecitizen.co.tz/tanzania/magazines/entertainment", "https://www.thecitizen.co.tz"
          else:
              target_country, target_url, base_url = "Pan-Africa", "https://www.pulse.ng/entertainment", "https://www.pulse.ng"

          print(f"🌍 Target: {target_country} | URL: {target_url}")

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  base64_image = base64.b64encode(img_data).decode('utf-8')
                  res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": base64_image}, timeout=20)
                  return res.json()['data']['url'] if res.status_code == 200 else image_url
              except: return image_url

          def get_target_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      context = browser.new_context(user_agent="Mozilla/5.0")
                      page = context.new_page()
                      page.goto(target_url, timeout=60000, wait_until="domcontentloaded")
                      page.evaluate("window.scrollBy(0, 1000)")
                      page.wait_for_timeout(3000)
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if len(href) > 25 and href.count('-') > 1:
                              full_url = href if href.startswith('http') else base_url + (href if href.startswith('/') else '/' + href)
                              if base_url.split('//')[-1] in full_url: urls.append(full_url)
                      browser.close()
              except: pass
              return list(set(urls))

          def scrape_article_free(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000, wait_until="domcontentloaded")
                      page.wait_for_timeout(3000)
                      soup = BeautifulSoup(page.content(), "html.parser")

                      # --- FRESHNESS CHECK (10 HOURS MAX) ---
                      pub_time = None
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          try:
                              pub_time = date_parser.parse(meta_pub.get('content'))
                              if pub_time.tzinfo is None: pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                              age_hours = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                              if age_hours > 10: return None, None, None
                          except: pass
                      
                      if not pub_time: return None, None, None

                      title = soup.find('title').get_text().split('|')[0].strip() if soup.find('title') else ""
                      body = "\n\n".join([p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 50])
                      
                      img = ""
                      for meta in soup.find_all('meta'):
                          if meta.get('property') in ['og:image', 'twitter:image']:
                              img = meta.get('content', '')
                              if img: break
                      return body, img, title
                  except: return None, None, None
                  finally: browser.close()

          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          full_raw_text, final_hash, target_title, target_image = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article_free(link)
              if text and len(text) > 400:
                  full_raw_text, target_image, final_hash, target_title = text, img, u_hash, title
                  break 

          if not full_raw_text: sys.exit(0)

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          client = genai.Client(api_key=api_keys[0])

          # === SMART TITLE CONTEST ===
          title_prompt = f"""
          ARTICLE SOURCE ({target_country}): {target_title}
          CONTENT: {full_raw_text[:2000]}

          FORMULAS: 1. Number+Keyword+Benefit, 2. Keyword+Power Word+Year, 3. Adjective+Number+Outcome, 4. Keyword+[Bracket Hook].

          INSTRUCTIONS:
          1. Extract keywords from "{target_title}".
          2. Generate 3 high-CTR titles front-loading keywords.
          3. Style: Amara Ndlovu (Cynical Pan-African).
          4. Output JSON: {{"final_title": "Winning Title"}}
          """
          title_resp = client.models.generate_content(model=MODELS_TO_TRY[0], contents=title_prompt)
          title_match = re.search(r'{.*}', title_resp.text, re.DOTALL)
          final_title = json.loads(title_match.group()).get('final_title', target_title)

          # === FULL ARTICLE GENERATION ===
          prompt = f'''Current Date: {full_date_str}
          TARGET COUNTRY: {target_country}
          TITLE: {final_title}
          SOURCE TEXT: "{full_raw_text[:10000]}"

          TASK: Write as Amara Ndlovu for Za Ndani.
          - Front-load keywords in Slug and ALL H2/H3 headings.
          - Today is {full_date_str}. Verifiably 10h fresh.
          - Structure: H2 Keyword Heading -> 40-word neutral snippet -> Cynical Body.
          - NO Sheng. NO dashes.
          '''
          response = client.models.generate_content(model=MODELS_TO_TRY[0], contents=prompt)
          full_text = response.text.strip()
          
          parsed_body = re.search(r'BODY:\s*(.*)', full_text, re.DOTALL | re.IGNORECASE)
          parsed_body = parsed_body.group(1).strip() if parsed_body else full_text
          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]

          final_file = textwrap.dedent(f"""\
          ---
          title: "{final_title.replace('"', "'")}"
          slug: "{slug}"
          author: "Amara Ndlovu"
          image: "{upload_to_imgbb(target_image)}"
          category: "Entertainment"
          date: "{today_str}"
          tags: ["{target_country.lower()}", "africa", "entertainment"]
          ---

          {parsed_body}
          """)

          with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f: f.write(final_file)
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          EOF

      - name: Git Pull & Push
        run: |
          git config --global user.name "Amara Ndlovu"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git fetch origin main
          git pull origin main --rebase
          git push origin main