name: Amara Ndlovu - Pan-Africa Entertainment Scraper

on:
  schedule:
    - cron: '48 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_amara.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 \
            libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 \
            libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 \
            libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install \
            requests \
            google-genai \
            beautifulsoup4 \
            lxml \
            playwright \
            playwright-stealth==1.0.6 \
            python-dateutil \
            Pillow
          playwright install chromium --with-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          cat > _pipeline.py << 'PYEOF'
          import os, json, datetime, requests, re, time, sys, hashlib, itertools, base64, random, io
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          from playwright_stealth import stealth_sync
          from PIL import Image

          # -- CONFIG ---------------------------------------------------------------------
          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str         = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str     = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          current_year      = datetime.datetime.utcnow().strftime("%Y")
          SITE_BASE_URL     = "https://zandani.co.ke"
          MAX_AGE_HOURS     = 10
          MAX_PER_RUN       = 1
          HISTORY_LOOK      = 8
          REWRITE_THRESH    = 7

          # March 2026 Model Pipeline
          MODELS_TO_TRY = [
              "gemini-3.1-pro-preview",
              "gemini-3.1-flash-lite-preview",
              "gemini-3-flash-preview",
              "gemini-2.5-pro",
              "gemini-2.5-flash"
          ]

          # Route source by UTC hour - each pair runs twice daily
          current_hour = datetime.datetime.utcnow().hour
          if current_hour in [0, 12]:
              SITE_URL, SITE_DOMAIN, target_country = "https://www.pulse.ng/entertainment", "pulse.ng", "Nigeria"
          elif current_hour in [2, 14]:
              SITE_URL, SITE_DOMAIN, target_country = "https://www.thesouthafrican.com/culture/entertainment/", "thesouthafrican.com", "South Africa"
          elif current_hour in [4, 16]:
              SITE_URL, SITE_DOMAIN, target_country = "https://www.pulse.com.gh/entertainment", "pulse.com.gh", "Ghana"
          elif current_hour in [6, 18]:
              SITE_URL, SITE_DOMAIN, target_country = "https://mbu.ug/", "mbu.ug", "Uganda"
          elif current_hour in [8, 20]:
              SITE_URL, SITE_DOMAIN, target_country = "https://www.thecitizen.co.tz/tanzania/magazines/entertainment", "thecitizen.co.tz", "Tanzania"
          else:
              SITE_URL, SITE_DOMAIN, target_country = "https://www.pulse.ng/entertainment", "pulse.ng", "Pan-Africa"
          
          print(f"[config] Target: {target_country} | URL: {SITE_URL}")

          BANNED_PHRASES = [
              "sasa basi", "melting the pot", "spill the tea", "tea is hot",
              "grab your popcorn", "buckle up", "breaking news", "dive in",
              "delve into", "moreover", "furthermore", "in conclusion",
              "it's worth noting", "a testament to", "navigating the landscape",
              "in today's digital age", "tapestry"
          ]

          EXCLUDED_PATHS = [
              '/author/', '/tag/', '/page/', '/feed/', '/comment-', '/category/',
              '/about', '/contact', '/terms', '/privacy', '/advertise', '/subscribe',
              '/login', '/register', '/search', '/sitemap', '/404', '/faq',
              '/newsletter', '/rss', '/careers', '/team', '/policy', '/disclaimer',
              '/cookie', '/help', '/support', '/write-for-us', '/correction'
          ]

          BAD_IMAGE_FRAGMENTS = [
              'logo', 'default', 'placeholder', 'icon', 'avatar',
              'favicon', 'sprite', 'blank', 'pixel', 'badge', 'watermark'
          ]

          SOURCE_DOMAINS = [
              "pulse.ng", "thesouthafrican.com", "pulse.com.gh", "mbu.ug", "thecitizen.co.tz"
          ]

          # -- STYLE PRESETS (Pan-Africa Entertainment) -----------------------------------
          STYLE_PRESETS = {
              "celeb_news": {
                  "name": "celeb_news",
                  "format": "breaking celebrity news",
                  "lead_style": "punchy declarative sentence, high-energy, names first",
                  "tone": "excited but credible, tabloid-smart",
                  "angle": "focus on the wow-factor moment and the immediate public reaction",
                  "structure": "hook -> what happened -> reaction -> context -> what comes next",
                  "sentence_mix": "short punchy sentences mixed with one longer explanatory clause per paragraph",
                  "closing": "forward-looking teaser or open question to the reader"
              },
              "explainer": {
                  "name": "explainer",
                  "format": "explainer / backgrounder",
                  "lead_style": "context-first: explain why this matters before stating what happened",
                  "tone": "authoritative, calm, informative - the friend who knows everything",
                  "angle": "why this Pan-African entertainment moment matters",
                  "structure": "context -> event -> background -> implications -> reader takeaway",
                  "sentence_mix": "medium-length sentences with one rhetorical question placed mid-article",
                  "closing": "practical or emotional takeaway for the reader"
              },
              "timeline": {
                  "name": "timeline",
                  "format": "chronological narrative",
                  "lead_style": "open with the most dramatic moment, then trace back to the beginning",
                  "tone": "narrative journalist, story-driven, vivid",
                  "angle": "how did we get here - the sequence of events that led to this moment",
                  "structure": "climax moment -> backstory -> step-by-step timeline -> current status",
                  "sentence_mix": "short for drama, longer for context - vary deliberately",
                  "closing": "where things stand right now and what fans should watch"
              },
              "reaction": {
                  "name": "reaction",
                  "format": "opinion roundup",
                  "lead_style": "open with the most striking public reaction or implied quote",
                  "tone": "lively, conversational, slightly opinionated",
                  "angle": "how fans across the continent are responding",
                  "structure": "lead reaction -> event summary -> range of responses -> analyst angle",
                  "sentence_mix": "punchy, quote-heavy feel, direct speech rhythm throughout",
                  "closing": "open question inviting the reader's own opinion"
              },
              "profile_led": {
                  "name": "profile_led",
                  "format": "profile / character-led feature",
                  "lead_style": "introduce the key person in a captivating way",
                  "tone": "feature magazine - warm, professional, admiring but honest",
                  "angle": "who is this artist and why does this story matter to their journey",
                  "structure": "person intro -> why they're in the news -> background -> current story -> significance",
                  "sentence_mix": "longer flowing sentences broken by short punchy standalone facts",
                  "closing": "what this moment reveals about the star's trajectory"
              }
          }
          PRESET_NAMES = list(STYLE_PRESETS.keys())

          # -- MEMORY ----------------------------------------------------------------------
          def load_memory(path):
              if not os.path.exists(path):
                  return {"published_hashes": [], "style_history": []}
              raw = json.loads(open(path).read())
              if isinstance(raw, list):
                  print("[memory] Migrating flat array -> new dict format")
                  return {"published_hashes": raw, "style_history": []}
              raw.setdefault("published_hashes", [])
              raw.setdefault("style_history", [])
              return raw

          def save_memory(path, mem):
              mem["published_hashes"] = mem["published_hashes"][-300:]
              mem["style_history"]    = mem["style_history"][-80:]
              with open(path, 'w') as f:
                  json.dump(mem, f, indent=2, ensure_ascii=False)

          def pick_style_preset(style_history):
              if len(style_history) >= 3:
                  last3 = [h.get("stylePreset") for h in style_history[-3:]]
                  if len(set(last3)) == 1 and last3[0] in PRESET_NAMES:
                      available = [p for p in PRESET_NAMES if p != last3[0]]
                      return random.choice(available)
              return random.choice(PRESET_NAMES)

          # -- GEMINI CLIENT ---------------------------------------------------------------
          raw_keys   = [os.environ.get(k) for k in ['GEMINI_WRITE_KEY', 'GEMINI_API_KEY', 'GEMINI_API_KEY1'] if os.environ.get(k)]
          if not raw_keys:
              print('No Gemini keys found'); sys.exit(1)
          key_cycle   = itertools.cycle(raw_keys)
          current_key = next(key_cycle)
          client      = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label='', temperature=0.75, max_tokens=4000, expect_json=False):
              global current_key, client
              seed = random.randint(1,999999)
              for model in MODELS_TO_TRY:
                  for attempt in range(6):
                      try:
                          config = types.GenerateContentConfig(
                              temperature=temperature,
                              max_output_tokens=max_tokens,
                              candidate_count=1, seed=seed, top_p=0.95,
                              frequency_penalty=0.35, presence_penalty=0.25,
                              response_mime_type='application/json' if expect_json else 'text/plain',
                          )
                          resp      = client.models.generate_content(model=model, contents=prompt, config=config)
                          candidate = resp.candidates[0] if resp.candidates else None
                          if candidate and candidate.content and candidate.content.parts:
                              result = ''.join(
                                  p.text for p in candidate.content.parts
                                  if hasattr(p, 'text') and p.text
                              ).strip()
                          else:
                              result = (resp.text or '').strip()
                          print(f'[gemini] OK ({model}, temp={temperature}): {label}')
                          return result
                      except Exception as e:
                          err = str(e).lower()
                          if any(x in err for x in ['429', 'quota', 'rate', '503', 'unavailable', '500', 'overloaded', 'resource_exhausted']):
                              wait = random.uniform(20, 35)
                              print(f'[gemini] Rate limit on {model} - rotating key, wait {wait:.1f}s')
                              time.sleep(wait)
                              current_key = next(key_cycle)
                              client      = genai.Client(api_key=current_key)
                              continue
                          elif any(x in err for x in ['not found', 'not support', 'not_found', 'deprecated']):
                              break
                          else:
                              print(f'[gemini] Error ({model}, attempt {attempt+1}): {e}')
                              time.sleep(3)
                              continue
              return None

          def safe_json(text, default=None):
              if default is None: default = {}
              if not text: return default
              cleaned = re.sub(r'^
```json\s*|