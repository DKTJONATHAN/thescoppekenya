name: Rebuild Sitemaps

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-sitemaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Sitemaps
        run: node scripts/generate-sitemap.js

      # ✅ DEBUG: See exactly what got written and where
      - name: Debug output
        run: |
          echo "=== public/ folder contents ==="
          ls -la public/
          echo "=== content/posts/ count ==="
          ls content/posts/ | wc -l
          echo "=== sitemap-news.xml preview ==="
          cat public/sitemap-news.xml || echo "FILE NOT FOUND"

      - name: Commit and push sitemaps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml public/sitemap-news.xml public/sitemap-index.xml
          git diff --staged --quiet || (
            git commit -m "chore: update sitemaps [skip ci]" &&
            git push
          )