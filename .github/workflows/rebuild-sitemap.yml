name: Rebuild Sitemap

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  push:
    branches:
      - main
    paths:
      - 'content/posts/**'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create dist directory
        run: mkdir -p dist public

      - name: Run sitemap generator
        run: node scripts/rebuild-sitemap.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "seo: automatically rebuild sitemap.xml and sitemap-news.xml"
          file_pattern: 'public/sitemap.xml public/sitemap-news.xml'
          branch: main
