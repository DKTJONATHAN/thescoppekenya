name: Wanjiku Karanja - Ghafla Entertainment Scraper

on:
  schedule:
    - cron: '0 5,9,13,17,21 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main

jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml python-dateutil

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: content/posts
          MEMORY_FILE: .github/memory_wanjiku.json
          PYTHONUNBUFFERED: "1"
        run: python .github/scripts/wanjiku_scraper.py

      - name: Configure git
        run: |
          git config user.name "Wanjiku Karanja"
          git config user.email "bot@zandani.co.ke"

      - name: Commit and push
        run: |
          git add content/posts .github/memory_wanjiku.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "content: Ghafla entertainment by Wanjiku Karanja"
          git push origin main