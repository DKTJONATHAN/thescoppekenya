name: Opinionated Columnist

on:
  schedule:
    - cron: '0 7 * * 2,5'  # Every Tuesday and Friday at 7:00 AM UTC
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Max opinion pieces to write per run (default: 3)'
        required: false
        default: '3'
      source_category:
        description: 'Source category to draw from (leave blank for all non-opinions)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_opinions.json

jobs:
  write-opinion-pieces:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai google-auth google-auth-httplib2

      - name: Write opinion pieces from existing articles
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          MAX_ARTICLES: ${{ inputs.max_articles || '3' }}
          SOURCE_CATEGORY: ${{ inputs.source_category || '' }}
        run: |
          python - <<'PYEOF'
          import os, json, re, time, datetime, hashlib, itertools, sys, random
          import requests
          from google import genai
          from google.genai import types

          today_str         = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str     = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          current_year      = datetime.datetime.utcnow().strftime("%Y")
          SITE_BASE_URL     = "https://zandani.co.ke"
          FALLBACK_IMAGE    = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200"

          MODELS = ["gemini-2.5-flash", "gemini-2.0-flash"]

          POSTS_DIR       = os.environ.get("POSTS_DIR", "content/posts")
          MEMORY_FILE     = os.environ.get("MEMORY_FILE", ".github/memory_opinions.json")
          MAX_ARTICLES    = int(os.environ.get("MAX_ARTICLES", "3"))
          SOURCE_CATEGORY = os.environ.get("SOURCE_CATEGORY", "").strip().lower()

          # Fixed author for all opinion pieces
          COLUMNIST_NAME  = "From The Editor"
          COLUMNIST_SLUG  = "from-the-editor"
          COLUMNIST_VOICE = (
              "a razor-tongued Kenyan opinion columnist writing as 'From The Editor' who is "
              "extremely opinionated and aggressively judgmental about every person and event covered. "
              "You hold nothing back. You name names, assign blame, mock poor decisions, praise bold "
              "ones, and issue hard verdicts on everyone involved. You write with total conviction — "
              "never neutral, never sitting on the fence. You pick a side, argue it hard, and judge "
              "every actor in the story with brutal clarity. Think of the most opinionated editorial "
              "voice in Kenyan media and multiply that by three."
          )

          BANNED_PHRASES = [
              "sasa basi", "melting the pot", "spill the tea", "grab your popcorn",
              "buckle up", "dive in", "delve into", "moreover", "furthermore",
              "in conclusion", "it's worth noting", "a testament to",
              "navigating the landscape", "in today's digital age", "tapestry",
              "it is what it is", "at the end of the day", "moving forward"
          ]
          banned_str = ", ".join(BANNED_PHRASES)

          # ── Gemini setup ──────────────────────────────────────────────────
          raw_keys = [
              os.environ.get("GEMINI_WRITE_KEY"),
              os.environ.get("GEMINI_API_KEY"),
              os.environ.get("GEMINI_API_KEY1"),
          ]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys:
              print("No Gemini API keys found. Exiting.")
              sys.exit(1)

          key_cycle          = itertools.cycle(api_keys)
          current_key        = next(key_cycle)
          client_g           = genai.Client(api_key=current_key)
          google_search_tool = types.Tool(google_search=types.GoogleSearch())

          def gemini_generate(prompt: str, temperature=0.92) -> str:
              global current_key, client_g
              for model_id in MODELS:
                  for _ in range(len(api_keys) * 2):
                      try:
                          resp      = client_g.models.generate_content(
                              model=model_id,
                              contents=prompt,
                              config=types.GenerateContentConfig(
                                  temperature=temperature,
                                  tools=[google_search_tool]
                              )
                          )
                          candidate = resp.candidates[0] if resp.candidates else None
                          if candidate and candidate.content and candidate.content.parts:
                              return "".join(
                                  p.text for p in candidate.content.parts
                                  if hasattr(p, "text") and p.text
                              ).strip()
                          return (resp.text or "").strip()
                      except Exception as e:
                          err = str(e).lower()
                          if "429" in err or "quota" in err or "resource_exhausted" in err:
                              print("Quota hit. Rotating key...")
                              current_key = next(key_cycle)
                              client_g    = genai.Client(api_key=current_key)
                              time.sleep(15)
                          else:
                              print(f"Gemini error ({model_id}): {e}")
                              break
              raise RuntimeError("All Gemini attempts failed")

          # ── Parse frontmatter from markdown file ──────────────────────────
          def parse_frontmatter(filepath: str) -> dict:
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      raw = f.read()
                  fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
                  if not fm_match:
                      return {}
                  fm_text = fm_match.group(1)
                  result  = {}
                  for line in fm_text.splitlines():
                      # Handle quoted and unquoted values
                      m = re.match(r'(\w+):\s*["\']?(.*?)["\']?\s*$', line)
                      if m:
                          result[m.group(1).lower()] = m.group(2).strip().strip('"').strip("'")
                  body_start    = raw.find("---", 3) + 3
                  result["body"] = raw[body_start:].strip()
                  return result
              except Exception as e:
                  print(f"  Parse error {filepath}: {e}")
                  return {}

          # ── Load all source articles (exclude opinions category) ──────────
          def load_source_articles() -> list:
              if not os.path.exists(POSTS_DIR):
                  print(f"Posts directory '{POSTS_DIR}' not found.")
                  return []
              sources = []
              for fn in sorted(os.listdir(POSTS_DIR), reverse=True):  # newest first
                  if not fn.endswith(".md"):
                      continue
                  fp   = os.path.join(POSTS_DIR, fn)
                  meta = parse_frontmatter(fp)
                  if not meta:
                      continue
                  cat = meta.get("category", "").lower().strip()
                  # HARD BLOCK: never use opinions posts as source material
                  if cat in ("opinions", "opinion"):
                      continue
                  # Optional category filter from workflow_dispatch input
                  if SOURCE_CATEGORY and cat != SOURCE_CATEGORY:
                      continue
                  # Extract image from original post — reuse it, no new fetch needed
                  original_image = meta.get("image", "").strip().strip('"').strip("'")
                  if not original_image:
                      original_image = FALLBACK_IMAGE

                  sources.append({
                      "file":     fn,
                      "slug":     meta.get("slug", fn.replace(".md", "")).strip().strip('"'),
                      "title":    meta.get("title", fn).strip().strip('"'),
                      "category": cat,
                      "tags":     meta.get("tags", ""),
                      "image":    original_image,   # reuse original post image directly
                      "body":     meta.get("body", "")[:3000],
                  })
              print(f"Loaded {len(sources)} source articles (opinions excluded)")
              return sources

          # ── Select articles not yet opinionated ───────────────────────────
          def pick_sources(sources: list, memory: dict, count: int) -> list:
              unchosen = [
                  s for s in sources
                  if hashlib.md5(s["slug"].encode()).hexdigest() not in memory
              ]
              # Keep newest-first order (already sorted above), take top N
              return unchosen[:count]

          # ── Research longtail keywords for the topic ──────────────────────
          def research_longtail_keywords(title: str, category: str) -> str:
              prompt = (
                  f'Search Google right now for the topic: "{title}"\n'
                  f"Category: {category}\n\n"
                  "Find the top 6 longtail keyword phrases Kenyan audiences are actually "
                  "searching on Google related to this topic right now in 2026.\n"
                  "Rules:\n"
                  "- Each keyword must be 3-6 words long\n"
                  "- Must be specific (include names, events, or details)\n"
                  "- No generic phrases like 'latest news' or 'who is'\n"
                  "- Return ONLY a comma-separated list of 6 phrases. Nothing else."
              )
              try:
                  raw = gemini_generate(prompt, temperature=0.3).strip()
                  # Clean up any numbered lists or bullet points
                  raw = re.sub(r'^[\d\.\-\*]+\s*', "", raw, flags=re.MULTILINE)
                  keywords = [k.strip().lower() for k in re.split(r'[,\n]', raw) if k.strip()]
                  result   = ", ".join(keywords[:6])
                  print(f"  Longtail keywords: {result}")
                  return result
              except Exception as e:
                  print(f"  Keyword research failed: {e}")
                  return title.lower()

          # ── Write the opinion piece ───────────────────────────────────────
          def write_opinion(source: dict, longtail_keywords: str) -> dict:
              src_title = source["title"]
              src_slug  = source["slug"]
              src_body  = source["body"]
              src_cat   = source["category"]

              # Pick 3 random other posts for optional internal links
              all_files = [f for f in os.listdir(POSTS_DIR) if f.endswith(".md")]
              sample    = random.sample(all_files, min(len(all_files), 3))
              internal_link_lines = []
              for fn in sample:
                  try:
                      with open(os.path.join(POSTS_DIR, fn), "r", encoding="utf-8") as cf:
                          txt = cf.read()
                      t_m = re.search(r'title:\s*["\']?(.*?)["\']?\s*$', txt, re.MULTILINE)
                      t   = t_m.group(1).strip().strip('"') if t_m else fn.replace(".md", "")
                      internal_link_lines.append(
                          f"- Title: {t} | Link: {SITE_BASE_URL}/article/{fn.replace('.md','')}"
                      )
                  except Exception:
                      continue
              internal_links = "\n".join(internal_link_lines)

              prompt = (
                  f"Current Date: {full_date_str}. Year: {current_year}.\n\n"
                  "════════════════════════════════════════════════\n"
                  f"YOUR ROLE: You are {COLUMNIST_VOICE}\n\n"
                  "OUTPUT TYPE: OPINION piece — not a news report, not a summary.\n"
                  "You are REACTING to the source article with hard editorial judgment.\n"
                  "════════════════════════════════════════════════\n\n"
                  "SOURCE ARTICLE (your trigger — DO NOT copy it verbatim):\n"
                  f'TITLE: "{src_title}"\n'
                  f"CATEGORY: {src_cat}\n"
                  f"URL: {SITE_BASE_URL}/article/{src_slug}\n"
                  f"EXCERPT:\n{src_body[:1500]}\n\n"
                  "════════════════════════════════════════════════\n"
                  "SEO LONGTAIL KEYWORDS (MANDATORY USAGE):\n"
                  f"Target keywords: {longtail_keywords}\n"
                  "Rules for keyword usage:\n"
                  "- Use at least 4 of these phrases naturally inside the article body\n"
                  "- Use at least 1 longtail keyword in the article TITLE\n"
                  "- Use at least 1 longtail keyword in the EXCERPT\n"
                  "- Use at least 2 longtail keywords in subheadings (## or ###)\n"
                  "- NEVER stuff keywords — they must read naturally in context\n"
                  "════════════════════════════════════════════════\n\n"
                  "RESEARCH INSTRUCTION:\n"
                  f'1. Search Google for: "{src_title}"\n'
                  f'2. Search Google for: "{src_title} {current_year} Kenya"\n'
                  "3. Extract real facts, real quotes, real names, real dates.\n"
                  "4. Ground every judgment in real evidence from your search.\n"
                  "DO NOT fabricate facts or quotes.\n"
                  "════════════════════════════════════════════════\n\n"
                  "MANDATORY SOURCE LINK (link this naturally once mid-body):\n"
                  f"Title: {src_title} | URL: {SITE_BASE_URL}/article/{src_slug}\n\n"
                  f"OPTIONAL INTERNAL LINKS (use ONE if genuinely relevant):\n"
                  f"{internal_links}\n\n"
                  "════════════════════════════════════════════════\n"
                  "WRITING RULES (ALL MANDATORY):\n"
                  "- Be EXTREMELY judgmental. Render clear verdicts on every named person.\n"
                  "- Call out hypocrisy, cowardice, greed, or incompetence — when evidence supports.\n"
                  "- Praise boldness or courage just as forcefully when warranted.\n"
                  "- Use short, punchy sentences. No diplomatic softening. No hedging.\n"
                  "- Kenyan cultural context is welcome. Professional English only — no Sheng, no Swahili.\n"
                  f"- BANNED PHRASES: {banned_str}\n"
                  "- No em-dashes. Single hyphens only.\n"
                  "- NEVER write the author name inside the article body.\n"
                  "- Minimum 750 words.\n\n"
                  "SMART TITLE ENGINE:\n"
                  "Step 1 - Front-load with the primary subject name or topic.\n"
                  "Step 2 - Include at least ONE longtail keyword phrase from the list above.\n"
                  "Step 3 - Make the title opinionated — it should signal a verdict, not just a topic.\n"
                  "Step 4 - Under 65 characters. No clickbait question marks.\n\n"
                  "STRUCTURE:\n"
                  "1. Opening paragraph (40-55 words): your verdict, stated immediately. No setup.\n"
                  "2. ## H2 subheading — must contain at least one longtail keyword.\n"
                  "3. 4-6 body sections with ### subheadings — each judges at least one named actor.\n"
                  "   At least 2 ### subheadings must contain a longtail keyword.\n"
                  "4. Mandatory source link naturally embedded mid-body.\n"
                  "5. Final paragraph: forceful verdict on what SHOULD happen next.\n\n"
                  "STRICT OUTPUT FORMAT (no code fences, nothing outside this block):\n"
                  "TITLE: [opinionated headline with longtail keyword, under 65 chars]\n"
                  "SLUG: [lowercase-hyphen-slug]\n"
                  "EXCERPT: [140-155 chars — states your verdict boldly, includes a longtail keyword]\n"
                  "TAGS: [comma, separated, lowercase — include the longtail keyword phrases as tags]\n"
                  "BODY:\n"
                  "[Full opinion piece. No title. No author name. No byline. Just the article.]\n"
              )

              raw = gemini_generate(prompt, temperature=0.95)
              raw = re.sub(r'^```(?:markdown|text)?\n?', "", raw, flags=re.IGNORECASE)
              raw = re.sub(r'\n?```$', "", raw).strip()

              def pf(label, text):
                  m = re.search(rf"^{label}:\s*(.+)$", text, re.MULTILINE | re.IGNORECASE)
                  return m.group(1).strip() if m else ""

              parsed_title   = pf("TITLE",   raw)
              parsed_slug    = pf("SLUG",    raw)
              parsed_excerpt = pf("EXCERPT", raw)
              parsed_tags    = pf("TAGS",    raw)

              body_m = re.search(r"BODY:\s*\n([\s\S]+)", raw, re.IGNORECASE)
              body   = body_m.group(1).strip() if body_m else raw

              for field in ["TITLE", "SLUG", "EXCERPT", "TAGS", "BODY"]:
                  body = re.sub(rf"^{field}:.*\n?", "", body, flags=re.MULTILINE | re.IGNORECASE).strip()
              body = re.sub(r"^(?:\*\*)?(?:By|Author|Opinion by|From The Editor):?.*?\n+", "", body, flags=re.IGNORECASE).strip()
              body = body.replace("\u2014", "-").replace("\u2013", "-")

              if not parsed_slug and parsed_title:
                  parsed_slug = re.sub(r"[^a-z0-9]+", "-", parsed_title.lower()).strip("-")[:70]

              return {
                  "TITLE":   parsed_title,
                  "SLUG":    parsed_slug,
                  "EXCERPT": parsed_excerpt,
                  "TAGS":    parsed_tags,
                  "BODY":    body,
              }

          # ── Save article — always category: Opinions, reuse source image ──
          def save_opinion(parsed: dict, source_image: str, source_slug: str) -> str:
              slug        = parsed["SLUG"]
              canonical   = f"{SITE_BASE_URL}/article/{slug}"
              author_url  = f"{SITE_BASE_URL}/author/{COLUMNIST_SLUG}"
              description = parsed["EXCERPT"].replace('"', "'")[:160]

              tags_list = [t.strip().lower().replace(" ", "-") for t in parsed["TAGS"].split(",") if t.strip()]
              if "opinions" not in tags_list:
                  tags_list.insert(0, "opinions")
              tags_json = json.dumps(tags_list)

              lines = [
                  "---",
                  f'title: "{parsed["TITLE"].replace(chr(34), chr(39))}"',
                  f'slug: "{slug}"',
                  f'description: "{description}"',
                  f'author: "{COLUMNIST_NAME}"',
                  f'author_url: "{author_url}"',
                  f'image: "{source_image}"',   # reused directly from source post
                  'category: "Opinions"',        # always hardcoded to Opinions
                  f'tags: {tags_json}',
                  f'canonical: "{canonical}"',
                  f'date: "{publish_timestamp}"',
                  "---",
                  "",
                  parsed["BODY"],
                  ""
              ]

              os.makedirs(POSTS_DIR, exist_ok=True)
              filename = f"{today_str}-{slug}.md"
              with open(os.path.join(POSTS_DIR, filename), "w", encoding="utf-8") as f:
                  f.write("\n".join(lines))

              print(f"  Saved    : {filename}")
              print(f"  Author   : {COLUMNIST_NAME}")
              print(f"  Category : Opinions (forced)")
              print(f"  Image    : reused from /article/{source_slug}")
              print(f"  Canon    : {canonical}")
              return filename

          # ════════════════════════════════════════════════════════════════
          # MAIN
          # ════════════════════════════════════════════════════════════════
          memory  = json.load(open(MEMORY_FILE)) if os.path.exists(MEMORY_FILE) else {}
          sources = load_source_articles()

          if not sources:
              print("No source articles available. Exiting.")
              sys.exit(0)

          picks            = pick_sources(sources, memory, MAX_ARTICLES)
          articles_written = 0

          if not picks:
              print("All available source articles have already been opinionated. Nothing new to write.")
              sys.exit(0)

          for source in picks:
              print(f"\n--- Opinion on: {source['title']} ---")
              print(f"    Image   : {source['image'][:70]}")

              # Step 1: research longtail keywords for this topic
              longtail_kw = research_longtail_keywords(source["title"], source["category"])
              time.sleep(5)

              # Step 2: write the full opinion piece
              try:
                  parsed = write_opinion(source, longtail_kw)
              except Exception as e:
                  print(f"  Write failed: {e}")
                  continue

              # Step 3: save using the original post's image — no upload needed
              save_opinion(parsed, source["image"], source["slug"])

              # Step 4: mark as done in memory
              src_hash = hashlib.md5(source["slug"].encode()).hexdigest()
              memory[src_hash] = {
                  "source_title":    source["title"],
                  "opinion_slug":    parsed["SLUG"],
                  "longtail_kw":     longtail_kw,
                  "written_at":      publish_timestamp,
              }
              articles_written += 1
              time.sleep(12)

          os.makedirs(os.path.dirname(MEMORY_FILE), exist_ok=True)
          with open(MEMORY_FILE, "w") as f:
              json.dump(memory, f, indent=2)

          print(f"\n{'=' * 40}")
          print(f"Done. {articles_written} opinion pieces written.")
          print(f"{'=' * 40}")
          PYEOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Za Ndani Bot"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push opinion articles
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani Bot <bot@zandani.co.ke>"
          commit_message: "content: Opinion pieces [${{ github.run_number }}]"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_opinions.json'

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://zandani.co.ke/sitemap.xml" || true
          echo "Google sitemap pinged"
