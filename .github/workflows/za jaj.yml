name: Opinionated Columnist

on:
  schedule:
    - cron: '13 8 * * 1,4'  # Twice weekly: 08:13 UTC on Monday and Thursday
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Max opinion pieces to write per run (default: 1)'
        required: false
        default: '1'
      source_category:
        description: 'Source category to draw from (leave blank for all non-opinions)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_opinions.json

jobs:
  write-opinion-pieces:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Write opinion pieces from existing articles
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          MAX_ARTICLES: ${{ inputs.max_articles || '1' }}
          SOURCE_CATEGORY: ${{ inputs.source_category || '' }}
        run: |
          cat > _pipeline.py << 'PYEOF'
          import os, json, re, time, datetime, hashlib, itertools, sys, random
          import requests
          from google import genai
          from google.genai import types

          today_str         = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str     = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          current_year      = datetime.datetime.utcnow().strftime("%Y")
          SITE_BASE_URL     = "https://zandani.co.ke"
          FALLBACK_IMAGE    = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200"

          MODELS_TO_TRY = [
              "gemini-3.1-pro-preview",
              "gemini-3.1-flash-lite-preview",
              "gemini-3-flash-preview",
              "gemini-2.5-pro",
              "gemini-2.5-flash"
          ]

          POSTS_DIR       = os.environ.get("POSTS_DIR", "content/posts")
          MEMORY_FILE     = os.environ.get("MEMORY_FILE", ".github/memory_opinions.json")
          MAX_ARTICLES    = int(os.environ.get("MAX_ARTICLES", "1"))
          SOURCE_CATEGORY = os.environ.get("SOURCE_CATEGORY", "").strip().lower()

          COLUMNIST_NAME  = "From The Editor"
          COLUMNIST_SLUG  = "from-the-editor"

          BANNED_PHRASES = [
              "sasa basi", "melting the pot", "spill the tea", "grab your popcorn",
              "buckle up", "dive in", "delve into", "moreover", "furthermore",
              "in conclusion", "it's worth noting", "a testament to",
              "navigating the landscape", "in today's digital age", "tapestry",
              "it is what it is", "at the end of the day", "moving forward"
          ]
          
          # -- STYLE PRESETS FOR THE COLUMNIST ---------------------------------------------
          STYLE_PRESETS = {
              "harsh_critic": {
                  "name": "harsh_critic",
                  "lead_style": "direct attack on a poor decision or action",
                  "tone": "brutal, unapologetic, zero-tolerance",
                  "angle": "who failed, how they failed, and why they should be embarrassed",
                  "structure": "verdict -> evidence of failure -> mocking the excuses -> final judgment",
                  "sentence_mix": "short, sharp, aggressive sentences",
                  "closing": "a definitive statement on the consequences of the failure"
              },
              "mocking_satire": {
                  "name": "mocking_satire",
                  "lead_style": "heavy sarcasm or feigned surprise",
                  "tone": "sarcastic, witty, dismissive",
                  "angle": "how ridiculous the situation is when you actually look at the facts",
                  "structure": "sarcastic hook -> exposing the absurdity -> laughing at the main players -> final joke",
                  "sentence_mix": "flowing sentences dripping with irony",
                  "closing": "a punchline summarizing the farce"
              },
              "contrarian_take": {
                  "name": "contrarian_take",
                  "lead_style": "stating the exact opposite of what the public currently believes",
                  "tone": "intellectual, provocative, slightly arrogant",
                  "angle": "why everyone else is wrong and missing the real point",
                  "structure": "the popular myth -> dismantling it -> the actual truth -> conclusion",
                  "sentence_mix": "argumentative, debate-style pacing",
                  "closing": "a challenge to the reader's assumptions"
              },
              "moral_outrage": {
                  "name": "moral_outrage",
                  "lead_style": "fiery denunciation of the broader societal issue",
                  "tone": "angry, passionate, righteous",
                  "angle": "why this news item represents a deeper rot in society or the industry",
                  "structure": "the outrage -> the specific trigger event -> the wider systemic problem -> call to action",
                  "sentence_mix": "rhetorical questions mixed with declarative statements",
                  "closing": "a demand for accountability"
              },
              "reluctant_praise": {
                  "name": "reluctant_praise",
                  "lead_style": "admitting that, for once, someone actually did something right",
                  "tone": "grudgingly respectful, surprised",
                  "angle": "why this action deserves praise, despite the person's usual flaws",
                  "structure": "the surprising success -> why it was unexpected -> why it worked -> final nod",
                  "sentence_mix": "balanced, weighing pros and cons",
                  "closing": "a warning not to mess it up next time"
              }
          }
          PRESET_NAMES = list(STYLE_PRESETS.keys())

          # -- MEMORY MANAGEMENT -----------------------------------------------------------
          def load_memory(path):
              if not os.path.exists(path):
                  return {"published_hashes": [], "style_history": []}
              raw = json.loads(open(path).read())
              if isinstance(raw, list):
                  print("[memory] Migrating flat array -> new dict format")
                  return {"published_hashes": raw, "style_history": []}
              # If it's the old dict format without style_history, update it
              if "published_hashes" not in raw:
                  hashes = list(raw.keys())
                  return {"published_hashes": hashes, "style_history": []}
              
              raw.setdefault("published_hashes", [])
              raw.setdefault("style_history", [])
              return raw

          def save_memory(path, mem):
              mem["published_hashes"] = mem["published_hashes"][-300:]
              mem["style_history"]    = mem["style_history"][-80:]
              with open(path, 'w') as f:
                  json.dump(mem, f, indent=2, ensure_ascii=False)

          def pick_style_preset(style_history):
              if len(style_history) >= 3:
                  last3 = [h.get("stylePreset") for h in style_history[-3:]]
                  if len(set(last3)) == 1 and last3[0] in PRESET_NAMES:
                      available = [p for p in PRESET_NAMES if p != last3[0]]
                      return random.choice(available)
              return random.choice(PRESET_NAMES)

          # -- GEMINI CLIENT ---------------------------------------------------------------
          raw_keys = [
              os.environ.get("GEMINI_WRITE_KEY"),
              os.environ.get("GEMINI_API_KEY"),
              os.environ.get("GEMINI_API_KEY1"),
          ]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys:
              print("No Gemini API keys found. Exiting.")
              sys.exit(1)

          key_cycle   = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client      = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label='', expect_json=False, temperature=0.75, max_tokens=4000, use_search=False):
              global current_key, client
              seed = random.randint(1,999999)
              for model in MODELS_TO_TRY:
                  for attempt in range(6):
                      try:
                          config = types.GenerateContentConfig(
                              temperature=temperature,
                              max_output_tokens=max_tokens,
                              candidate_count=1, seed=seed, top_p=0.95,
                              frequency_penalty=0.35, presence_penalty=0.25,
                              response_mime_type='application/json' if expect_json else 'text/plain',
                              tools=[types.Tool(google_search=types.GoogleSearch())] if use_search else None
                          )
                          resp      = client.models.generate_content(model=model, contents=prompt, config=config)
                          candidate = resp.candidates[0] if resp.candidates else None
                          if candidate and candidate.content and candidate.content.parts:
                              result = ''.join(
                                  p.text for p in candidate.content.parts
                                  if hasattr(p, 'text') and p.text
                              ).strip()
                          else:
                              result = (resp.text or '').strip()
                          print(f'[gemini] OK ({model}, temp={temperature}): {label}')
                          return result
                      except Exception as e:
                          err = str(e).lower()
                          if any(x in err for x in ['429', 'quota', 'rate', '503', 'unavailable', '500', 'overloaded', 'resource_exhausted']):
                              wait = random.uniform(20, 35)
                              print(f'[gemini] Rate limit on {model} - rotating key, wait {wait:.1f}s')
                              time.sleep(wait)
                              current_key = next(key_cycle)
                              client      = genai.Client(api_key=current_key)
                              continue
                          elif any(x in err for x in ['not found', 'not support', 'not_found', 'deprecated']):
                              break
                          else:
                              print(f'[gemini] Error ({model}, attempt {attempt+1}): {e}')
                              time.sleep(3)
                              continue
              return None

          def safe_json(text, default=None):
              if default is None: default = {}
              if not text: return default
              cleaned = re.sub(r'^```json\s*|```\s*$', '', text.strip(), flags=re.I|re.M).strip()
              try: return json.loads(cleaned)
              except Exception:
                  m = re.search(r'\{.*\}|\[.*\]', cleaned, re.S)
                  if m:
                      try: return json.loads(m.group(0))
                      except: pass
              return default

          def clean_text(text):
              text = text.replace('\u2014', '-').replace('\u2013', '-').replace('\xa0', ' ')
              return re.sub(r'\s+', ' ', text).strip()

          # -- PARSE EXISTING ARTICLES -----------------------------------------------------
          def parse_frontmatter(filepath: str) -> dict:
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      raw = f.read()
                  fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
                  if not fm_match: return {}
                  fm_text = fm_match.group(1)
                  result  = {}
                  for line in fm_text.splitlines():
                      m = re.match(r'(\w+):\s*["\']?(.*?)["\']?\s*$', line)
                      if m: result[m.group(1).lower()] = m.group(2).strip().strip('"').strip("'")
                  body_start     = raw.find("---", 3) + 3
                  result["body"] = raw[body_start:].strip()
                  return result
              except Exception as e:
                  print(f"  Parse error {filepath}: {e}")
                  return {}

          def get_recent_history(posts_dir, limit=10):
              # Lightweight snapshot of recent posts to discourage repeated openings/framings.
              if not os.path.isdir(posts_dir):
                  return []
              files = sorted(
                  [f for f in os.listdir(posts_dir) if f.endswith(".md")],
                  reverse=True,
              )[:limit]
              history = []
              for fn in files:
                  try:
                      meta = parse_frontmatter(os.path.join(posts_dir, fn))
                      if not meta:
                          continue
                      history.append({
                          "title": meta.get("title", ""),
                          "slug":  meta.get("slug", fn.replace(".md", "")),
                          "stylePreset": meta.get("stylepreset", ""),
                          "bodySample": (meta.get("body", "") or "")[:400],
                      })
                  except Exception:
                      continue
              return history

          def load_source_articles() -> list:
              if not os.path.exists(POSTS_DIR):
                  print(f"Posts directory '{POSTS_DIR}' not found.")
                  return []
              sources = []
              for fn in sorted(os.listdir(POSTS_DIR), reverse=True):
                  if not fn.endswith(".md"): continue
                  fp   = os.path.join(POSTS_DIR, fn)
                  meta = parse_frontmatter(fp)
                  if not meta: continue
                  
                  cat = meta.get("category", "").lower().strip()
                  if cat in ("opinions", "opinion"): continue
                  if SOURCE_CATEGORY and cat != SOURCE_CATEGORY: continue
                  
                  original_image = meta.get("image", "").strip().strip('"').strip("'")
                  if not original_image: original_image = FALLBACK_IMAGE
                  
                  sources.append({
                      "file":     fn,
                      "slug":     meta.get("slug", fn.replace(".md", "")).strip().strip('"'),
                      "title":    meta.get("title", fn).strip().strip('"'),
                      "category": cat,
                      "tags":     meta.get("tags", ""),
                      "image":    original_image,
                      "body":     meta.get("body", "")[:3000],
                  })
              print(f"Loaded {len(sources)} source articles (opinions excluded)")
              return sources

          def pick_sources(sources: list, memory: dict, count: int) -> list:
              published_hashes = memory.get("published_hashes", [])
              unchosen = [
                  s for s in sources
                  if hashlib.md5(s["slug"].encode()).hexdigest() not in published_hashes
              ]
              return unchosen[:count]

          # -- PIPELINE STAGES ------------------------------------------------------------
          def stage_research_and_seo(source_title, source_category, source_body):
              prompt = (
                  f"Search Google right now for the topic: \"{source_title}\"\n"
                  f"Category: {source_category}\n\n"
                  f"Original article excerpt: {source_body[:1000]}\n\n"
                  "Based on your search and the context, act as an SEO Strategist and Opinion Editor.\n"
                  "1. Find 3-5 longtail keyword phrases audiences are searching for related to this topic right now.\n"
                  "2. Create an aggressive, highly opinionated headline (under 65 chars) for a column.\n"
                  "3. Create a punchy meta description (120-155 chars).\n"
                  "4. Generate a clean URL slug (3-5 words).\n\n"
                  "Return ONLY valid JSON:\n"
                  '{"longtail_keywords": ["kw1", "kw2"], "final_title": "...", "meta_description": "...", "seo_slug": "...", "tags": ["..."]}'
              )
              text = gemini_generate(prompt, label='research-seo', expect_json=True, temperature=0.5, use_search=True)
              return safe_json(text, default={})

          def stage_write(source, seo_data, style_preset, all_history):
              src_title = source["title"]
              src_slug  = source["slug"]
              src_body  = source["body"]
              src_cat   = source["category"]
              
              recent_samples = json.dumps([
                  {'title':h['title'],'stylePreset':h['stylePreset'],'articleAngle':h['articleAngle']}
                  for h in all_history[:4]
              ],ensure_ascii=False)
              
              banned_str = ", ".join(BANNED_PHRASES)
              keywords_str = ", ".join(seo_data.get('longtail_keywords', []))
              
              prompt = (
                  f"Current Date: {full_date_str}. Year: {current_year}.\n\n"
                  f"YOUR ROLE: You are a razor-tongued Kenyan opinion columnist writing as '{COLUMNIST_NAME}'.\n"
                  f"You hold nothing back. You name names, assign blame, mock poor decisions, and issue hard verdicts.\n\n"
                  f"SOURCE EVENT TO REACT TO:\n"
                  f"Title: {src_title}\n"
                  f"Excerpt:\n{src_body[:2000]}\n\n"
                  f"COLUMN METADATA:\n"
                  f"Title: {seo_data.get('final_title', src_title)}\n"
                  f"Keywords to use naturally: {keywords_str}\n"
                  f"Style Preset: {json.dumps(style_preset, ensure_ascii=False)}\n"
                  f"Recent angles used (do not repeat): {recent_samples}\n\n"
                  "WRITING RULES:\n"
                  f"- Banned phrases: {banned_str}\n"
                  "- No em-dashes or en-dashes. Single hyphens only.\n"
                  "- NEVER write your author name or byline in the text.\n"
                  "- Output ONLY the Markdown article body.\n"
                  "- Start immediately with a 40-55 word introductory verdict paragraph.\n"
                  "- Do not open with a generic relevance line or a 'what this means' setup.\n"
                  "- Do not add FAQ, key facts, takeaway, or reader-impact sections at the end.\n"
                  "- Do not summarize the source like a neutral news report; keep the verdict sharp from the first sentence.\n"
                  "- Use ## and ### subheadings to break up your arguments.\n"
                  f"- Naturally embed this link exactly once mid-body: [{src_title}]({SITE_BASE_URL}/article/{src_slug})\n"
                  "- Ground your arguments in the facts provided in the excerpt.\n"
                  "- Minimum 600 words.\n"
              )
              return gemini_generate(prompt, label='column-write', expect_json=False, temperature=0.9, max_tokens=4200)

          def stage_review(article_text, source_text, style_preset, all_history):
              recent_samples = json.dumps([
                  {'title':h['title'],'bodySample':h['bodySample'],'stylePreset':h['stylePreset']}
                  for h in all_history[:3]
              ],ensure_ascii=False)
              prompt = (
                  "Strict Editor-in-Chief reviewer.\n"
                  f"Style preset used: {json.dumps(style_preset,ensure_ascii=False)}\n"
                  f"Recent columns: {recent_samples}\n\n"
                  f"Source news:\n{source_text[:2000]}\n\n"
                  f"Generated column:\n{article_text[:4000]}\n\n"
                  "Score and return only valid JSON:\n"
                  '{"source_similarity":1,"house_style_repetition":1,"opinion_strength":10,"verdict":"keep or rewrite"}\n\n'
                  "source_similarity: 1=completely original take, 10=just summarizes the news.\n"
                  "house_style_repetition: 1=fresh format, 10=sounds exactly like recent columns.\n"
                  "opinion_strength: 1=weak/neutral, 10=strong clear verdict.\n"
                  "verdict MUST be 'rewrite' if source_similarity>=6 or opinion_strength<=6\n"
              )
              text = gemini_generate(prompt, label='column-review', expect_json=True, temperature=0.2, max_tokens=1000)
              return safe_json(text, default={})

          def stage_rewrite(article_text, source_text, style_preset, review_data, keywords_str):
              prompt = (
                  "Rewrite this opinion column to be more aggressive, more original, and less like a news summary.\n\n"
                  f"Style preset: {json.dumps(style_preset,ensure_ascii=False)}\n"
                  f"Review feedback: {json.dumps(review_data,ensure_ascii=False)}\n"
                  f"Keywords to include: {keywords_str}\n\n"
                  f"Column to rewrite:\n{article_text[:6000]}\n\n"
                  "Rules: Output only Markdown body. No em-dashes. Be opinionated. Render a verdict.\n"
                  "Do not add reader-impact, key facts, or takeaway sections.\n"
              )
              return gemini_generate(prompt, label='column-rewrite', expect_json=False, temperature=0.92, max_tokens=4200)

          # -- MAIN EXECUTION --------------------------------------------------------------
          memory  = load_memory(MEMORY_FILE)
          sources = load_source_articles()

          if not sources:
              print("No source articles available. Exiting.")
              sys.exit(0)

          picks = pick_sources(sources, memory, MAX_ARTICLES)
          if not picks:
              print("All available source articles have already been opinionated. Nothing new to write.")
              sys.exit(0)

          posts_dir = os.environ.get("POSTS_DIR", "content/posts")
          os.makedirs(posts_dir, exist_ok=True)
          
          recent_history    = get_recent_history(posts_dir, limit=HISTORY_LOOK)
          style_history_mem = memory.get('style_history', [])
          all_history       = recent_history + style_history_mem[-5:]
          
          articles_written = 0

          for source in picks:
              print(f"\n--- Processing Opinion on: {source['title']} ---")
              
              preset_name  = pick_style_preset(style_history_mem)
              style_preset = STYLE_PRESETS[preset_name]
              print(f'Style preset: {preset_name}')

              seo_data = stage_research_and_seo(source["title"], source["category"], source["body"])
              if not seo_data or not seo_data.get('final_title'):
                  print("SEO research failed, falling back.")
                  seo_data = {
                      "final_title": source["title"] + " - The Editor's Verdict",
                      "meta_description": f"An opinion piece on {source['title']}.",
                      "seo_slug": re.sub(r'[^a-z0-9]+', '-', source["title"].lower()).strip('-')[:68],
                      "tags": ["Opinions", "Editorial"],
                      "longtail_keywords": []
                  }
                  
              time.sleep(5)
              
              article_text = stage_write(source, seo_data, style_preset, all_history)
              if not article_text:
                  print('Write failed. Skipping.')
                  continue
                  
              article_text = re.sub(r'^```(?:markdown)?\s*', '', article_text, flags=re.I).rstrip('`').strip()
              article_text = clean_text(article_text)
              
              time.sleep(5)
              review_data = stage_review(article_text, source["body"], style_preset, all_history)
              print(f'[review] similarity:{review_data.get("source_similarity")} strength:{review_data.get("opinion_strength")} verdict:{review_data.get("verdict")}')
              
              if review_data.get('verdict') == 'rewrite':
                  print('[review] Rewriting for stronger opinion...')
                  kw_str = ", ".join(seo_data.get('longtail_keywords', []))
                  rewritten = stage_rewrite(article_text, source["body"], style_preset, review_data, kw_str)
                  if rewritten:
                      article_text = re.sub(r'^```(?:markdown)?\s*', '', rewritten, flags=re.I).rstrip('`').strip()
                      article_text = clean_text(article_text)

              slug          = seo_data.get('seo_slug') or re.sub(r'[^a-z0-9]+', '-', seo_data.get('final_title', source['title']).lower()).strip('-')[:68]
              canonical_url = f"{SITE_BASE_URL}/article/{slug}"
              author_url    = f"{SITE_BASE_URL}/author/{COLUMNIST_SLUG}"
              tags_list     = [t.strip().lower().replace(" ", "-") for t in seo_data.get('tags', [])]
              if "opinions" not in tags_list: tags_list.insert(0, "opinions")
              
              def q(s): return str(s).replace('"', "'")

              frontmatter = (
                  '---\n'
                  f'title: "{q(seo_data.get("final_title", source["title"]))}"\n'
                  f'slug: "{slug}"\n'
                  f'author: "{COLUMNIST_NAME}"\n'
                  f'author_url: "{author_url}"\n'
                  f'image: "{source["image"]}"\n'
                  'category: "Opinions"\n'
                  f'tags: {json.dumps(tags_list, ensure_ascii=False)}\n'
                  f'canonical: "{canonical_url}"\n'
                  f'date: "{publish_timestamp}"\n'
                  f'authorUrl: "https://zandani.co.ke/author/{COLUMNIST_SLUG}"\n'
                  f'dateModified: "{publish_timestamp}"\n'
                  'schema: "NewsArticle"\n'
                  f'description: "{q(seo_data.get("meta_description", ""))[:155]}"\n'
                  f'excerpt: "{q(seo_data.get("meta_description", ""))[:155]}"\n'
                  f'focusKeyword: "{q(seo_data.get("focus_keyword", ""))}"\n'
                  f'stylePreset: "{style_preset["name"]}"\n'
                  f'leadStyle: "{q(style_preset["lead_style"])}"\n'
                  f'articleAngle: "{q(style_preset["angle"])}"\n'
                  '---\n\n'
              )

              filepath = os.path.join(posts_dir, f"{today_str}-{slug}.md")
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(frontmatter + article_text + '\n')

              src_hash = hashlib.md5(source["slug"].encode()).hexdigest()
              memory.setdefault("published_hashes", []).append(src_hash)
              memory.setdefault("style_history", []).append({
                  'title': seo_data.get("final_title"),
                  'slug': slug,
                  'stylePreset': style_preset['name'],
                  'bodySample': article_text[:600],
              })
              save_memory(MEMORY_FILE, memory)

              print(f"Saved: {filepath}")
              articles_written += 1
              time.sleep(12)

          print(f"\n{'=' * 40}")
          print(f"Done. {articles_written} opinion pieces written.")
          print(f"{'=' * 40}")
          PYEOF
          python _pipeline.py

      - name: Git Safety Pull
        run: |
          git config --global user.name "Za Ndani Bot"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push opinion articles
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani Bot <bot@zandani.co.ke>"
          commit_message: "content: Opinion pieces [${{ github.run_number }}]"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_opinions.json'

      - name: Ping Google Sitemap
        run: |
