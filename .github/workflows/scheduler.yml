name: Scheduled Posts Publisher

# Hugo hides posts where publishDate is in the future (no --buildFuture flag).
# This workflow runs every hour, and when a post becomes due, it commits a
# tiny state-file update. That commit triggers Vercel's auto-deploy,
# which rebuilds the site — and Hugo now renders the post.

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild (optional)'
        required: false
        type: string
        default: 'Manual rebuild'

concurrency:
  group: scheduled-publisher
  cancel-in-progress: true

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  STATE_FILE: .github/scheduler_state.json

jobs:
  check-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-dateutil
        run: pip install python-dateutil --quiet

      - name: Check for posts due to publish
        id: check_due
        run: |
          python3 - <<'PYEOF'
          import os, re, datetime, json

          posts_dir  = os.environ.get('POSTS_DIR', 'content/posts')
          state_file = os.environ.get('STATE_FILE', '.github/scheduler_state.json')
          now_utc    = datetime.datetime.utcnow().replace(tzinfo=datetime.timezone.utc)
          due_posts  = []

          last_state = {}
          if os.path.exists(state_file):
              with open(state_file) as f:
                  last_state = json.load(f)

          if not os.path.exists(posts_dir):
              print("No posts directory — nothing to check.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write("has_due_posts=false
")
              exit(0)

          from dateutil import parser as dp

          for fname in os.listdir(posts_dir):
              if not fname.endswith('.md'):
                  continue
              fpath = os.path.join(posts_dir, fname)
              with open(fpath, 'r', encoding='utf-8') as f:
                  content = f.read()

              pub_match = re.search(r"^publishDate:\s*["']?(.+?)["']?\s*$", content, re.MULTILINE)
              if not pub_match:
                  continue

              try:
                  pub_dt = dp.parse(pub_match.group(1).strip())
                  if pub_dt.tzinfo is None:
                      pub_dt = pub_dt.replace(tzinfo=datetime.timezone.utc)
              except Exception:
                  continue

              # Due = publishDate is now in the past AND not already activated
              if pub_dt <= now_utc and fname not in last_state.get('activated', []):
                  due_posts.append(fname)
                  print(f"  NOW DUE: {fname}  (publishDate = {pub_dt.strftime('%Y-%m-%d %H:%M UTC')})")

          if due_posts:
              activated = last_state.get('activated', [])
              activated.extend(due_posts)
              last_state['activated'] = activated[-500:]
              last_state['last_check'] = now_utc.isoformat()
              last_state['last_activated'] = due_posts
              os.makedirs(os.path.dirname(state_file), exist_ok=True)
              with open(state_file, 'w') as f:
                  json.dump(last_state, f, indent=2)

              print(f"\n{len(due_posts)} post(s) activated. Committing state file to trigger Vercel rebuild.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write(f"has_due_posts=true\n")
                  fh.write(f"count={len(due_posts)}\n")
          else:
              print("No posts due yet. Nothing to do.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write("has_due_posts=false\n")
          PYEOF

      # ── This commit is the ONLY trigger Vercel needs. ────────────────────
      # Since your site redeploys on every push, pushing the state file
      # causes Vercel to rebuild Hugo WITHOUT --buildFuture, which means
      # Hugo now renders the newly-due post for the first time.
      - name: Push state file to trigger Vercel rebuild
        if: steps.check_due.outputs.has_due_posts == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.STATE_FILE }}
          git diff --staged --quiet || git commit -m "chore: activate ${{ steps.check_due.outputs.count }} scheduled post(s) [skip ci]"
          git push origin ${{ env.DEFAULT_BRANCH }}
          echo "Pushed. Vercel will now rebuild and the post(s) will go live."

      - name: Summary
        run: |
          echo "## Scheduled Posts Publisher" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_due.outputs.has_due_posts }}" = "true" ]; then
            echo ":white_check_mark: **${{ steps.check_due.outputs.count }} post(s) activated.**" >> $GITHUB_STEP_SUMMARY
            echo "Vercel rebuild triggered via commit push." >> $GITHUB_STEP_SUMMARY
          else
            echo ":clock1: No posts due yet. Next check in ~1 hour." >> $GITHUB_STEP_SUMMARY
          fi
