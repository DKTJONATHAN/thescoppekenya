name: Scheduled Posts Publisher

# Runs every hour. When a post's publishDate arrives, commits a state
# file — that push triggers Vercel's auto-deploy and Hugo renders the post.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "Manual rebuild"

concurrency:
  group: scheduled-publisher
  cancel-in-progress: true

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  STATE_FILE: .github/scheduler_state.txt

jobs:
  check-and-publish:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Check for posts due to publish
        id: check
        run: |
          NOW=$(date -u +"%Y%m%d%H%M%S")
          STATE="${{ env.STATE_FILE }}"
          POSTS="${{ env.POSTS_DIR }}"
          DUE_COUNT=0

          # Create state file if it does not exist yet
          mkdir -p "$(dirname "$STATE")"
          [ -f "$STATE" ] || touch "$STATE"

          # Loop every markdown file in the posts directory
          for filepath in "$POSTS"/*.md; do
            [ -f "$filepath" ] || continue
            FNAME=$(basename "$filepath")

            # Skip files already activated
            grep -qxF "$FNAME" "$STATE" && continue

            # Pull out the publishDate line
            PUB_LINE=$(grep -m 1 "^publishDate:" "$filepath" 2>/dev/null || true)
            [ -z "$PUB_LINE" ] && continue

            # Strip to a 14-digit comparable string: YYYYMMDDHHmmss
            # Handles both  publishDate: "2025-04-20T09:30:00Z"
            #           and  publishDate: 2025-04-20T09:30:00Z
            PUB_COMPACT=$(echo "$PUB_LINE"               | sed "s/publishDate://"               | tr -d ' "'"'"''               | sed 's/[-:TZ]//g'               | cut -c1-14)

            [ -z "$PUB_COMPACT" ] && continue

            # Numeric comparison: due when publishDate <= now
            if [ "$PUB_COMPACT" -le "$NOW" ] 2>/dev/null; then
              echo "  DUE: $FNAME  (publishDate compact: $PUB_COMPACT | now: $NOW)"
              echo "$FNAME" >> "$STATE"
              DUE_COUNT=$((DUE_COUNT + 1))
            fi
          done

          echo "due_count=$DUE_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$DUE_COUNT" -gt 0 ]; then
            echo "has_due_posts=true" >> "$GITHUB_OUTPUT"
            echo "$DUE_COUNT post(s) are newly due."
          else
            echo "has_due_posts=false" >> "$GITHUB_OUTPUT"
            echo "No posts due yet. Nothing to do."
          fi

      # Committing the state file is the ONLY trigger Vercel needs.
      # Your repo auto-deploys on every push, so this commit causes
      # Hugo to rebuild without --buildFuture — the post goes live.
      - name: Commit state and trigger Vercel rebuild
        if: steps.check.outputs.has_due_posts == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.STATE_FILE }}"
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: activate ${{ steps.check.outputs.due_count }} scheduled post(s)"
          git push origin ${{ env.DEFAULT_BRANCH }}
          echo "Pushed. Vercel will now rebuild and the post(s) will go live."

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Scheduled Posts Publisher"
            if [ "${{ steps.check.outputs.has_due_posts }}" = "true" ]; then
              echo ":white_check_mark: **${{ steps.check.outputs.due_count }} post(s) activated — Vercel rebuild triggered.**"
            else
              echo ":clock1: No posts due yet. Next check in ~1 hour."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
