name: Za Ndani - Mpasho Scraper
on:
  schedule:
    - cron: '15 0,2,5,7,10,12,15,17,20,22 * * *'
  workflow_dispatch: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_zandani.json
jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 \
            libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 \
            libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 \
            libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install \
            requests \
            google-genai \
            beautifulsoup4 \
            lxml \
            playwright \
            playwright-stealth==1.0.6 \
            python-dateutil \
            Pillow
          playwright install chromium --with-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, itertools, base64, random, io
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          from playwright_stealth import stealth_sync
          from PIL import Image

          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str         = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str     = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          current_year      = datetime.datetime.utcnow().strftime("%Y")
          SITE_BASE_URL     = "https://zandani.co.ke"
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]
          MAX_AGE_HOURS     = 24
          MIN_ARTICLE_TEXT_CHARS = 140
          SITE_URL          = "https://www.mpasho.co.ke/"
          SITE_DOMAIN       = "mpasho.co.ke"

          BANNED_PHRASES = [
              "online debate in Kenya", "ignited a fiery online debate", "sparked a debate across", "caused a lot of online debate", "this April 2026", "this March 2026", "sasa basi", "melting the pot", "spill the tea", "tea is hot",
              "grab your popcorn", "buckle up", "breaking news", "dive in",
              "delve into", "moreover", "furthermore", "in conclusion",
              "it's worth noting", "a testament to", "navigating the landscape",
              "in today's digital age", "tapestry"
          ]

          BANNED_URL_PATHS = [
              '/author/', '/tag/', '/page/', '/feed/', '/comment-',
              '/category/', '/terms', '/about', '/privacy', '/contact',
              '/advertise', '/policy', '/disclaimer'
          ]

          # SEO: Convert to WebP before uploading for better LCP
          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  img = Image.open(io.BytesIO(img_data))
                  if img.mode in ('RGBA', 'LA', 'P'):
                      img = img.convert('RGB')
                  webp_buf = io.BytesIO()
                  img.save(webp_buf, format='WEBP', quality=82)
                  webp_buf.seek(0)
                  b64 = base64.b64encode(webp_buf.read()).decode('utf-8')
                  res = requests.post("https://api.imgbb.com/1/upload",
                                      data={"key": api_key, "image": b64}, timeout=20)
                  if res.status_code == 200:
                      new_url = res.json()['data']['url']
                      print(f"Re-hosted as WebP: {new_url}")
                      return new_url
                  print(f"ImgBB failed: {res.text}")
                  return image_url
              except Exception as e:
                  print(f"ImgBB/WebP error: {e}")
                  return image_url

          def get_target_urls():
              urls_list = []
              seen = set()
              print(f"Scanning {SITE_URL}...")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=["--no-sandbox", "--disable-dev-shm-usage",
                                "--disable-blink-features=AutomationControlled",
                                "--disable-infobars", "--window-size=1920,1080"]
                      )
                      context = browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36",
                          viewport={"width": 1920, "height": 1080},
                          locale="en-KE",
                          timezone_id="Africa/Nairobi",
                          extra_http_headers={
                              "Accept-Language": "en-KE,en;q=0.9",
                              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
                              "Sec-Fetch-Site": "none",
                              "Sec-Fetch-Mode": "navigate"
                          }
                      )
                      page = context.new_page()
                      stealth_sync(page)
                      page.goto(SITE_URL, timeout=60000, wait_until="networkidle")
                      time.sleep(random.uniform(2, 5))
                      for _ in range(3):
                          page.evaluate("window.scrollBy(0, 1800)")
                          time.sleep(random.uniform(2, 4))
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '').strip()
                          if not href: continue
                          full_url = href if href.startswith('http') else f'https://www.{SITE_DOMAIN}' + href
                          if SITE_DOMAIN not in full_url: continue
                          path = full_url.split(SITE_DOMAIN)[-1].lower()
                          slug = path.rstrip('/').split('/')[-1]
                          if (len(slug) > 15 and '-' in slug
                                  and not any(x in path for x in BANNED_URL_PATHS)):
                              if full_url not in seen:
                                  seen.add(full_url)
                                  urls_list.append(full_url)
                      browser.close()
              except Exception as e:
                  print(f"Scan failed: {e}")
              print(f"Found {len(urls_list)} candidates. Top 8:")
              for u in urls_list[:8]: print(u)
              return urls_list[:12]

          def scrape_article(url):
              print(f"Scraping: {url}")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(
                          headless=True,
                          args=["--no-sandbox", "--disable-dev-shm-usage",
                                "--disable-blink-features=AutomationControlled"]
                      )
                      context = browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36"
                      )
                      page = context.new_page()
                      stealth_sync(page)
                      page.route("**/*", lambda route: route.abort()
                                 if route.request.resource_type in ["image","stylesheet","font","media"]
                                 else route.continue_())
                      page.goto(url, timeout=60000, wait_until="domcontentloaded")
                      time.sleep(random.uniform(1, 3))
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()
                      pub_time = None
                      for script in soup.find_all('script', type='application/ld+json'):
                          try:
                              data = json.loads(script.string or '{}')
                              if 'datePublished' in data:
                                  pub_time = date_parser.parse(data['datePublished'])
                                  break
                          except: pass
                      if not pub_time:
                          meta = soup.find('meta', property='article:published_time') or soup.find('meta', {'name': 'date'})
                          if meta and meta.get('content'):
                              pub_time = date_parser.parse(meta['content'])
                      if not pub_time:
                          pat = r'(\d+)\s*(min|mins|hr|hrs|hour|hours|day|days)\s*ago|\d{1,2}\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'
                          for el in soup.find_all(string=re.compile(pat, re.I)):
                              try: pub_time = date_parser.parse(el, fuzzy=True); break
                              except: continue
                      if not pub_time:
                          m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', url)
                          if m: pub_time = datetime.datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), tzinfo=datetime.timezone.utc)
                      if pub_time:
                          if pub_time.tzinfo is None:
                              pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                          age = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                          print(f"Date: {pub_time} ({age:.1f}h old)")
                          if age > MAX_AGE_HOURS:
                              print("Too old - skip")
                              return None, None, None, None
                      else:
                          print("No date - assume fresh")

                      if not pub_time:
                          pub_time = datetime.datetime.min.replace(tzinfo=datetime.timezone.utc)

                      title = soup.title.string.strip() if soup.title else ""
                      title = re.sub(r'\s*[-|\u2013]\s*Mpasho.*', '', title, flags=re.I).strip()

                      def collect_text(container):
                          chunks = []
                          seen_chunks = set()
                          if not container:
                              return ""
                          for node in container.find_all(['p', 'li']):
                              text = node.get_text(" ", strip=True)
                              text = re.sub(r'\s+', ' ', text).strip()
                              if len(text) < 20:
                                  continue
                              if text in seen_chunks:
                                  continue
                              seen_chunks.add(text)
                              chunks.append(text)
                          return "\n\n".join(chunks)

                      article_text = ""
                      for sel in ['article', '.article-body', '.post-content', '.entry-content', '.content', 'main']:
                          cont = soup.select_one(sel)
                          if cont:
                              article_text = collect_text(cont)
                              if len(article_text) >= MIN_ARTICLE_TEXT_CHARS:
                                  break
                      if len(article_text) < MIN_ARTICLE_TEXT_CHARS:
                          article_text = collect_text(soup)
                      img_url = ""
                      og = soup.find('meta', property='og:image')
                      if og: img_url = og.get('content', '')
                      if not img_url:
                          tw = soup.find('meta', {'name': 'twitter:image'})
                          if tw: img_url = tw.get('content', '')
                      print(f"Text length: {len(article_text)}")
                      return article_text, img_url, title, pub_time
              except Exception as e:
                  print(f"Scrape error: {e}")
                  return None, None, None, None

          def get_internal_context():
              posts_dir = os.environ.get("POSTS_DIR", "content/posts")
              if not os.path.exists(posts_dir): return ""
              files  = [f for f in os.listdir(posts_dir) if f.endswith(".md")]
              sample = random.sample(files, min(len(files), 3))
              links  = []
              for fn in sample:
                  try:
                      with open(os.path.join(posts_dir, fn), "r", encoding="utf-8") as f:
                          content = f.read()
                      title_m = re.search(r'title:\s*"(.*?)"', content)
                      slug_m  = re.search(r'slug:\s*"(.*?)"', content)
                      if title_m and slug_m:
                          links.append(f'- [{title_m.group(1)}]({SITE_BASE_URL}/article/{slug_m.group(1)})')
                  except: pass
              return "\n".join(links) if links else ""

          raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1"] if os.environ.get(k)]
          if not raw_keys:
              print("No Gemini keys"); sys.exit(1)
          key_cycle   = itertools.cycle(raw_keys)
          current_key = next(key_cycle)
          client      = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              prompt_variants = [prompt]
              if len(prompt) > 12000:
                  prompt_variants.append(prompt[:12000])
              if len(prompt) > 8000:
                  prompt_variants.append(prompt[:8000])

              phases = []
              if use_search:
                  phases.append((True, "search"))
              phases.append((False, "no-search"))

              for use_search_now, phase_name in phases:
                  for variant_index, prompt_variant in enumerate(prompt_variants, start=1):
                      for model in MODELS_TO_TRY:
                          for _ in range(len(raw_keys)):
                              try:
                                  config = types.GenerateContentConfig(
                                      tools=[types.Tool(google_search=types.GoogleSearch())]
                                  ) if use_search_now else None
                                  resp = client.models.generate_content(model=model, contents=prompt_variant, config=config)
                                  candidate = resp.candidates[0] if resp.candidates else None
                                  if candidate and candidate.content and candidate.content.parts:
                                      result = "".join(
                                          p.text for p in candidate.content.parts
                                          if hasattr(p, "text") and p.text
                                      ).strip()
                                  else:
                                      result = (resp.text or "").strip()
                                  print(f"Gemini OK ({model}, {phase_name}, prompt {variant_index}): {label}")
                                  return result
                              except Exception as e:
                                  err = str(e).lower()
                                  if any(x in err for x in ["429", "quota", "rate", "resource exhausted", "unavailable", "overloaded", "busy", "timeout"]):
                                      time.sleep(random.uniform(8, 16))
                                      current_key = next(key_cycle)
                                      client = genai.Client(api_key=current_key)
                                      continue
                                  print(f"Gemini error ({model}, {phase_name}, prompt {variant_index}): {e}")
                                  current_key = next(key_cycle)
                                  client = genai.Client(api_key=current_key)
                                  break
              return None

          def clean_generated_title(raw_title):
              if not raw_title:
                  return ""
              clean = re.sub(r'^```json?\s*|\s*```$', '', raw_title, flags=re.I | re.DOTALL).strip()
              try:
                  parsed = json.loads(clean)
                  if isinstance(parsed, dict):
                      clean = str(parsed.get("final_title", "")).strip()
                  else:
                      clean = str(parsed).strip()
              except Exception:
                  clean = clean.splitlines()[0].strip()
              clean = re.sub(r'^["\'`]+|["\'`]+$', '', clean).strip()
              clean = re.sub(r'\s+', ' ', clean)
              clean = re.sub(r'\s*[|:;-]+\s*$', '', clean).strip()
              return clean

          def tighten_title(title, max_len=65):
              title = re.sub(r'\s+', ' ', (title or "")).strip(" .,:;!-")
              if len(title) <= max_len:
                  return title
              window = title[:max_len + 1]
              split_match = list(re.finditer(r'\b(?:after|amid|over|as|for|from|with|on|in|at)\b', window, flags=re.I))
              if split_match:
                  cut = split_match[-1].start()
                  if cut >= 28:
                      return window[:cut].strip(" .,:;!-")
              return window[:max_len].rsplit(' ', 1)[0].strip(" .,:;!-")

          def clean_meta_text(value):
              value = re.sub(r'\[([^\]]+)\]\((https?://[^\s)]+)\)', r'\1', value or "")
              value = re.sub(r'https?://\S+', '', value)
              value = re.sub(r'[#*_>`]+', ' ', value)
              value = re.sub(r'\s+', ' ', value)
              return value.strip(" \"'")

          def trim_meta_text(value, max_len=155):
              value = clean_meta_text(value)
              if len(value) <= max_len:
                  return value
              shortened = value[:max_len + 1].rsplit(' ', 1)[0].rstrip(" ,;:-")
              return shortened or value[:max_len].rstrip(" ,;:-")

          def looks_like_lede_copy(candidate, source_text):
              candidate_clean = clean_meta_text(candidate).lower()
              lead = clean_meta_text("\n\n".join((source_text or "").split("\n\n")[:2]))[:260].lower()
              if len(candidate_clean) < 40 or not lead:
                  return False
              if candidate_clean in lead:
                  return True
              words = candidate_clean.split()
              if len(words) >= 8:
                  for i in range(len(words) - 7):
                      if " ".join(words[i:i + 8]) in lead:
                          return True
              return False

          def finalise_meta_text(candidate, title, source_text):
              cleaned = trim_meta_text(candidate)
              if cleaned and len(cleaned) >= 135 and not looks_like_lede_copy(cleaned, source_text):
                  return cleaned.replace('"', "'")
              title_clean = clean_meta_text(title)
              gist = " ".join(clean_meta_text(source_text).split()[:18]).strip()
              fallback = f"{title_clean}. {gist}" if gist else title_clean
              return trim_meta_text(fallback).replace('"', "'")

          def enforce_internal_links(article_text, internal_links):
              link_pairs = [
                  (re.sub(r'\s+', ' ', link_title).strip(), link_url.strip())
                  for link_title, link_url in re.findall(r'- \[(.*?)\]\((https?://[^\s)]+)\)', internal_links or "")
              ]
              if not article_text or not link_pairs:
                  return article_text
              for link_title, link_url in link_pairs:
                  article_text = re.sub(
                      rf'(?<!\]\(){re.escape(link_url)}(?=[\s).,;:!?]|$)',
                      f'[{link_title}]({link_url})',
                      article_text
                  )
              if re.search(r'\[[^\]]+\]\(https?://(?:www\.)?zandani\.co\.ke/article/[^)]+\)', article_text):
                  return article_text
              fallback_title, fallback_url = link_pairs[0]
              return article_text.rstrip() + f"\n\nRelated reading: [{fallback_title}]({fallback_url})"

          # ── Scrape ───────────────────────────────────────────────────────
          article_links = get_target_urls()
          if not article_links:
              print("No candidates"); sys.exit(0)

          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          chosen_candidate = None

          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title, pub_time = scrape_article(link)
              if text and len(text) >= MIN_ARTICLE_TEXT_CHARS:
                  candidate = {
                      "text": text,
                      "img": img,
                      "title": title or "Entertainment News",
                      "hash": u_hash,
                      "pub_time": pub_time or datetime.datetime.min.replace(tzinfo=datetime.timezone.utc),
                      "link": link,
                  }
                  if not chosen_candidate or candidate["pub_time"] > chosen_candidate["pub_time"]:
                      chosen_candidate = candidate

          if not chosen_candidate:
              print("No fresh valid article"); sys.exit(0)

          print(f"Selected newest valid article: {chosen_candidate['link']} ({chosen_candidate['pub_time']})")
          full_raw_text = chosen_candidate["text"]
          target_image = chosen_candidate["img"]
          target_title = chosen_candidate["title"]
          final_hash = chosen_candidate["hash"]

          # ── Title ─────────────────────────────────────────────────────────
          title_prompt = (
              "SCRAPED ARTICLE TITLE: " + target_title + "\n"
              "ARTICLE SNIPPET:\n" + full_raw_text[:1200] + "\n"
              "TASK: Write a new high-CTR, SEO-optimized title for this article.\n"
              "RULES: Focus on major keywords from the content. Do NOT just copy the scraped title. Keep it under 65 characters. Plain reporting tone. No clickbait or hype words. Title must be a complete headline, not a fragment. Output ONLY JSON: {\"final_title\": \"...\"}\n"
          )
          title_text  = gemini_generate(title_prompt, "title")
          final_title = tighten_title(target_title)
          parsed_title = clean_generated_title(title_text)
          if parsed_title:
              final_title = tighten_title(parsed_title)

          current_key = next(key_cycle); client = genai.Client(api_key=current_key); time.sleep(2)
          excerpt_prompt = (
              "Write a single SEO meta description (140-155 characters) for this entertainment article.\n"
              "TITLE: " + final_title + "\n"
              "CONTENT: " + full_raw_text[:800] + "\n"
              "Rules: Factual, no clickbait, starts with the subject or a verb, includes the key news fact. Do not copy the opening paragraph verbatim or reuse long phrases from it. Output ONLY JSON: {\"excerpt\": \"...\"}"
          )
          excerpt_text = gemini_generate(excerpt_prompt, "excerpt")
          final_excerpt = ""
          if excerpt_text:
              try: final_excerpt = finalise_meta_text(json.loads(re.sub(r"^```json?\n?|```$", "", excerpt_text, flags=re.I|re.DOTALL).strip()).get('excerpt', ""), final_title, full_raw_text)
              except: pass
          if not final_excerpt:
              final_excerpt = finalise_meta_text("", final_title, full_raw_text)

          current_key = next(key_cycle)
          client      = genai.Client(api_key=current_key)
          time.sleep(5)

          internal_links = get_internal_context()
          banned_str     = ", ".join(BANNED_PHRASES)
          slug           = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]
          canonical_url  = f"{SITE_BASE_URL}/article/{slug}"

          # ── Article ───────────────────────────────────────────────────────
          article_prompt = (
              "Current Date: " + full_date_str + ". The current year is " + current_year + ".\n"
              "TITLE: " + final_title + "\n"
              "SOURCE TEXT:\n" + full_raw_text[:9500] + "\n"
              "INTERNAL LINKS TO WEAVE IN (use 1-2 naturally):\n" + internal_links + "\n\n"
              "Internal-link rule: use 1-2 of the provided Za Ndani article URLs as proper Markdown hyperlinks inside sentences.\n"
              "Format links exactly as [descriptive anchor text](full-url). Never paste a bare URL and never leave a raw link showing in the article.\n"
              "TASK: Write a vibrant Kenyan entertainment article for Za Ndani.\n"
              "Engaging, witty, celebrity-focused. No Sheng. No em-dashes. Single hyphens only.\n"
              "IMPORTANT: All dates and references must reflect " + current_year + ". Do not write about events as if they happened in any prior year.\n"
              "No title, no author name, no date in body.\n"
              "CRITICAL AUTHOR RULE: Write in third-person news style throughout. "
              "NEVER write phrases like 'I am Za Ndani', 'This is Za Ndani reporting', "
              "'Za Ndani can confirm', 'reporting for Za Ndani', 'as your journalist', "
              "or any first-person self-identification. The author name is a byline only.\n\n"
              "STRUCTURE (follow exactly in this order):\n"
              "1. Start with a 35-45 word lede paragraph (who, what, when, where - no heading above it). This answers the core question immediately.\n"
              "   - NEVER start with \"This has caused a lot of online debate in Kenya\" or \"sparked a firestorm\".\n"
              "   - DO NOT include the current month and year in the opening sentence.\n"
              "2. ## H2 subheading containing the primary keyword.\n"
              "3. ### subheadings with supporting detail.\n"
              "BANNED PHRASES (never use): " + banned_str + "\n"
              "CRITICAL BRANDING: You are writing FOR Za Ndani (zandani.co.ke). "
              "NEVER mention 'Mpasho', 'mpasho.co.ke', or any source site by name. "
              "If attribution is needed, omit the source entirely.\n"
              "Entertaining, vivid, Kenyan pop culture. No cliches."
          )
          article_text = gemini_generate(article_prompt, "article", use_search=True)
          if not article_text: sys.exit(1)

          article_text = re.sub(r"^```(?:markdown)?\n?", "", article_text).rstrip("```").strip()
          article_text = re.sub(r"^(Title|By|Date):.*?\n", "", article_text, flags=re.I|re.M)
          article_text = article_text.replace('\u2014', '-').replace('\u2013', '-')
          article_text = re.sub(r'\bmpasho\.co\.ke\b', 'zandani.co.ke', article_text, flags=re.I)
          article_text = re.sub(r'\bMpasho\b(?=\s+(has|have|said|reported|confirmed|noted|stated|revealed))', 'Za Ndani', article_text)
          article_text = enforce_internal_links(article_text, internal_links)

          current_key = next(key_cycle)
          client      = genai.Client(api_key=current_key)
          time.sleep(3)

          # ── Meta description ──────────────────────────────────────────────
          desc_prompt = (
              "Write a single meta description (140-155 characters) for this entertainment article.\n"
              "Title: " + final_title + "\n"
              "Article snippet: " + article_text[:600] + "\n"
              "Rules: factual, no clickbait, starts with the subject or a verb, includes the key news fact. Do not copy the opening paragraph verbatim.\n"
              'Output ONLY JSON: {"description": "..."}'
          )
          desc_text        = gemini_generate(desc_prompt, "description")
          meta_description = ""
          if desc_text:
              try:
                  clean            = re.sub(r"^```json?\n?|```$", "", desc_text, flags=re.I|re.DOTALL).strip()
                  meta_description = finalise_meta_text(json.loads(clean).get('description', ''), final_title, article_text)
              except Exception as e:
                  print(f"Desc parse error: {e}")
          if not meta_description:
              meta_description = finalise_meta_text("", final_title, article_text)

          time.sleep(3)

          # ── Tags ──────────────────────────────────────────────────────────
          tags_prompt = (
              "Generate 4-5 relevant SEO tags for this Kenyan entertainment article.\n"
              "Title: " + final_title + "\n"
              "Rules: lowercase, hyphenated for multi-word, topically specific. "
              'Output ONLY JSON: {"tags": ["tag-one", "tag-two", "tag-three", "tag-four"]}'
          )
          tags_text    = gemini_generate(tags_prompt, "tags")
          article_tags = []
          if tags_text:
              try:
                  clean        = re.sub(r"^```json?\n?|```$", "", tags_text, flags=re.I|re.DOTALL).strip()
                  article_tags = [str(t).lower().replace(' ', '-') for t in json.loads(clean).get('tags', [])[:5]]
              except Exception as e:
                  print(f"Tags parse error: {e}")

          # ── Image + file ──────────────────────────────────────────────────
          final_image = upload_to_imgbb(target_image) if target_image else ""
          author_url  = f"{SITE_BASE_URL}/author/za-ndani"
          tags_json   = json.dumps(article_tags)

          posts_dir = os.environ.get("POSTS_DIR", "content/posts")
          os.makedirs(posts_dir, exist_ok=True)

          lines = [
              "---",
              'title: "' + final_title.replace('"', "'") + '"',
              'slug: "' + slug + '"',
              'excerpt: "' + final_excerpt.replace('"', "'") + '"',
              'description: "' + meta_description + '"',
              'author: "Za Ndani"',
              'author_url: "' + author_url + '"',
              'image: "' + final_image + '"',
              'category: "Entertainment"',
              'tags: ' + tags_json,
              'canonical: "' + canonical_url + '"',
              'date: "' + publish_timestamp + '"',
              "---",
              article_text,
              ""
          ]
          filepath = os.path.join(posts_dir, today_str + "-" + slug + ".md")
          with open(filepath, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          memory.append(final_hash)
          with open(memory_path, 'w') as f:
              json.dump(memory[-300:], f)
          print(f"Saved: {filepath}")
          print(f"Canonical : {canonical_url}")
          print(f"Tags      : {article_tags}")
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Za Ndani"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani <bot@zandani.co.ke>"
          commit_message: "content: Mpasho entertainment by Za Ndani"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_zandani.json'

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://zandani.co.ke/sitemap.xml" || true
          echo "Google sitemap pinged"



