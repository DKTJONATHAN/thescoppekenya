name: Global Sports Scraper (Football365)

on:
  schedule:
    - cron: '55 3,7,11,15,19 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/scrape_memory.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium --with-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, urllib.parse, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          publish_timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          BANNED_PHRASES = ["sasa basi","melting the pot","spill the tea","tea is hot","grab your popcorn","buckle up","breaking news","dive in","delve into","moreover","furthermore","in conclusion","it's worth noting","a testament to","navigating the landscape","in today's digital age","tapestry"]

          print(f"Target: Football365 All The News - {full_date_str}")

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  base64_image = base64.b64encode(img_data).decode('utf-8')
                  res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": base64_image}, timeout=20)
                  if res.status_code == 200: return res.json()['data']['url']
                  return image_url
              except: return image_url

          def get_real_image(query):
              key = os.environ.get("UNSPLASH_ACCESS_KEY")
              fallback = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200"
              if not key: return fallback
              try:
                  r = requests.get(f"https://api.unsplash.com/photos/random?query={urllib.parse.quote(query)}&orientation=landscape&client_id={key}", timeout=10)
                  if r.status_code == 200: return r.json()['urls']['regular']
              except: pass
              return fallback

          def get_target_urls():
              urls_with_time = []
              print("Scanning Football365 latest news feed...")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-blink-features=AutomationControlled"])
                      context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36", viewport={"width": 1920, "height": 1080})
                      page = context.new_page()
                      page.goto('https://www.football365.com/all-the-news', timeout=90000, wait_until="networkidle")
                      for _ in range(4):
                          page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
                          page.wait_for_timeout(4000)
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      items = soup.select('article, .teaser, .news-teaser, .card, li[data-article-id], .feed-item, .story-teaser, [data-testid="article-teaser"]')
                      if not items: items = soup.select('a[href*="/news/"]')
                      for item in items:
                          a_tag = item.find('a', href=True)
                          if not a_tag: continue
                          href = a_tag['href']
                          if '/news/' not in href or len(href) < 30: continue
                          full_url = href if href.startswith('http') else 'https://www.football365.com' + href
                          time_el = item.find('time') or item.find(attrs={"datetime": True})
                          pub_str = time_el.get('datetime') or time_el.get_text(strip=True) if time_el else None
                          pub_dt = datetime.datetime.min.replace(tzinfo=datetime.timezone.utc)
                          if pub_str:
                              try:
                                  pub_dt = date_parser.parse(pub_str)
                                  if pub_dt.tzinfo is None: pub_dt = pub_dt.replace(tzinfo=datetime.timezone.utc)
                              except: pass
                          urls_with_time.append((full_url, pub_dt))
                      browser.close()
              except Exception as e: print(f"List scrape error: {e}")
              urls_with_time.sort(key=lambda x: x[1], reverse=True)
              seen = set()
              ordered_urls = []
              for url, _ in urls_with_time:
                  if url not in seen:
                      seen.add(url)
                      ordered_urls.append(url)
              print(f"Found {len(ordered_urls)} unique article links")
              return ordered_urls[:20]

          def is_still_fresh_on_source(target_url, max_position=30):
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-blink-features=AutomationControlled"])
                      context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                      page = context.new_page()
                      page.goto('https://www.football365.com/all-the-news', timeout=60000, wait_until="networkidle")
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      browser.close()
                      current_urls = []
                      for a in soup.select('article a[href*="/news/"], .teaser a[href*="/news/"]'):
                          href = a['href']
                          full = 'https://www.football365.com' + href if href.startswith('/') else href
                          current_urls.append(full)
                      return target_url in current_urls[:max_position]
              except: return True

          def scrape_article(url):
              print(f"Scraping: {url}")
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-blink-features=AutomationControlled"])
                  context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                  page = context.new_page()
                  try:
                      page.goto(url, timeout=60000, wait_until="domcontentloaded")
                      page.wait_for_timeout(4000)
                      soup = BeautifulSoup(page.content(), "html.parser")

                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub and meta_pub.get('content'):
                          try:
                              pub_time = date_parser.parse(meta_pub['content'])
                              if pub_time.tzinfo is None: pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                              if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 48:
                                  print("Too old. Skipping.")
                                  return None, None, None
                          except: pass

                      title_tag = soup.find('title')
                      title = title_tag.get_text().replace(' - Football365', '').replace('| Football365', '').strip() if title_tag else ""

                      article_text = ""
                      for sel in ['article .article-body', '.article__body', '.post-content', '.entry-content', '.content', 'main article']:
                          container = soup.select_one(sel)
                          if container:
                              article_text = "\n\n".join(p.get_text(strip=True) for p in container.find_all('p') if len(p.get_text(strip=True)) > 30)
                              if len(article_text) > 600: break
                      if len(article_text) < 600:
                          article_text = "\n\n".join(p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 30)

                      img_url = ""
                      for meta in soup.find_all('meta'):
                          prop = meta.get('property') or meta.get('name')
                          if prop in ['og:image', 'twitter:image']:
                              img_url = meta.get('content', '')
                              if img_url: break

                      return article_text, img_url, title
                  except Exception as e:
                      print(f"Scrape failed: {e}")
                      return None, None, None
                  finally:
                      browser.close()

          def get_internal_context(posts_dir):
              if not os.path.exists(posts_dir): return ""
              files = [f for f in os.listdir(posts_dir) if f.endswith('.md')]
              if not files: return ""
              sample = random.sample(files, min(4, len(files)))
              context = "RECENT RELATED STORIES (link one naturally if relevant):\n"
              for f in sample:
                  try:
                      with open(os.path.join(posts_dir, f), 'r', encoding='utf-8') as c:
                          content = c.read()
                          t_match = re.search(r'title:\s*"(.*?)"', content)
                          title = t_match.group(1) if t_match else f.replace('.md', '')
                          context += f"- [{title}](https://zandani.co.ke/article/{f.replace('.md', '')})\n"
                  except: continue
              return context

          raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY","GEMINI_API_KEY","GEMINI_API_KEY1"] if os.environ.get(k)]
          if not raw_keys:
              print("No Gemini keys")
              sys.exit(1)
          key_cycle = itertools.cycle(raw_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              for model in MODELS_TO_TRY:
                  for _ in range(6):
                      try:
                          config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search else None
                          resp = client.models.generate_content(model=model, contents=prompt, config=config)
                          print(f"Gemini OK ({model}): {label}")
                          return resp.text.strip()
                      except Exception as e:
                          if "429" in str(e) or "quota" in str(e).lower() or "rate" in str(e).lower():
                              time.sleep(random.uniform(20, 35))
                              current_key = next(key_cycle)
                              client = genai.Client(api_key=current_key)
                              continue
                          print(f"Gemini error ({model}): {e}")
                          break
              return None

          article_links = get_target_urls()
          if not article_links: sys.exit(0)

          memory_path = os.environ.get('MEMORY_FILE', '.github/scrape_memory.json')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          full_raw_text, target_image, target_title, final_hash = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              if not is_still_fresh_on_source(link): continue
              text, img, title = scrape_article(link)
              if text and len(text) > 500:
                  full_raw_text, target_image, target_title, final_hash = text, img, title or "Latest Football News", u_hash
                  break

          if not full_raw_text:
              print("No usable article found.")
              sys.exit(0)

          title_prompt = (
              "SCRAPED ARTICLE TITLE: " + target_title + "\n"
              "ARTICLE SNIPPET:\n" + full_raw_text[:1200] + "\n"
              "TASK: Write a new high-CTR, SEO-optimized title for this article.\n"
              "RULES: Focus on major keywords from the content. Do NOT just copy the scraped title. Keep it under 65 characters. Plain reporting tone. No clickbait or hype words.\n"
              "Output ONLY JSON: {\"final_title\": \"Your New SEO Title Here\"}"
          )
          title_text = gemini_generate(title_prompt, "title")
          final_title = target_title
          if title_text:
              try:
                  clean = re.sub(r"^```json?\n?|```$", "", title_text, flags=re.I|re.DOTALL).strip()
                  final_title = json.loads(clean).get('final_title', target_title)
              except: pass

          current_key = next(key_cycle); client = genai.Client(api_key=current_key); time.sleep(2)
          excerpt_prompt = (
              "Write a single SEO meta description (140-155 characters) for this article.\n"
              "TITLE: " + final_title + "\n"
              "CONTENT: " + full_raw_text[:800] + "\n"
              "Rules: Factual, no clickbait, starts with a verb or the subject, includes the key sport fact. Output ONLY JSON: {\"excerpt\": \"...\"}"
          )
          excerpt_text = gemini_generate(excerpt_prompt, "excerpt")
          final_excerpt = ""
          if excerpt_text:
              try: final_excerpt = json.loads(re.sub(r"^```json?\n?|```$", "", excerpt_text, flags=re.I|re.DOTALL).strip()).get('excerpt', "")[:160]
              except: pass

          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)
          time.sleep(5)

          article_prompt = (
              "Current Date: " + full_date_str + "\n"
              "TITLE: " + final_title + "\n"
              "SOURCE TEXT:\n" + full_raw_text[:9500] + "\n"
              "INTERNAL LINKS TO WEAVE IN (use 1-2 naturally):\n" + get_internal_context(os.environ.get("POSTS_DIR", "content/posts")) + "\n\n"
              "TASK: Write an engaging article as a sharp, cynical football pundit for Za Ndani.\n"
              "Emulate a highly opinionated tone, pointing out the bad side of the story or the angles that the mainstream media ignores.\n"
              "Use natural, professional English suited for sports analysis.\n"
              "Never write about old matches or transfers as if they are happening now.\n"
              "No title/author/date in body. No em-dashes. Single hyphens only.\n"
              "Start with ## H2 keyword heading. Then 35-45 word summary. Then ### subheadings.\n"
              "BANNED PHRASES (never use): " + ", ".join(BANNED_PHRASES) + "\n"
              "Factual, direct, cynical sports context. No cliches."
          )

          article_text = gemini_generate(article_prompt, "article", use_search=True)
          if not article_text: sys.exit(1)

          article_text = re.sub(r"^```(?:markdown)?\n?", "", article_text).rstrip("```").strip()
          article_text = re.sub(r"^(Title|By|Date):.*?\n", "", article_text, flags=re.I|re.M)
          article_text = article_text.replace('\u2014', '-').replace('\u2013', '-')

          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]

          if target_image:
              final_image = upload_to_imgbb(target_image)
          else:
              search_term = "football " + final_title.split()[0]
              final_image = get_real_image(search_term)

          posts_dir = os.environ.get("POSTS_DIR", "content/posts")
          os.makedirs(posts_dir, exist_ok=True)

          lines = [
              "---",
              'title: "' + final_title.replace('"', "'") + '"',
              'slug: "' + slug + '"',
              'excerpt: "' + final_excerpt.replace('"', "'") + '"',
              'author: "Sports Desk"',
              'image: "' + final_image + '"',
              'category: "Sports"',
              'date: "' + publish_timestamp + '"',
              "---",
              article_text,
              ""
          ]
          final_file = "\n".join(lines)

          filepath = os.path.join(posts_dir, today_str + "-" + slug + ".md")
          with open(filepath, "w", encoding="utf-8") as f: f.write(final_file)

          memory.append(final_hash)
          os.makedirs(os.path.dirname(memory_path), exist_ok=True)
          with open(memory_path, 'w') as f: json.dump(memory[-500:], f)

          print(f"Saved: {filepath}")
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Za Ndani"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Za Ndani <bot@zandani.co.ke>"
          commit_message: "content: Football365 sports analysis by Za Ndani ⚽"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/scrape_memory.json'
