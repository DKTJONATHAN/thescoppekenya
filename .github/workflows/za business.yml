name: Grace Mkamburi - Business Scraper

on:
  schedule:
    - cron: '50 9,17 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_grace.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-3-flash-preview", "gemini-2.5-flash"]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  base64_image = base64.b64encode(img_data).decode('utf-8')
                  payload = {"key": api_key, "image": base64_image}
                  res = requests.post("https://api.imgbb.com/1/upload", data=payload, timeout=20)
                  return res.json()['data']['url'] if res.status_code == 200 else image_url
              except: return image_url

          def get_target_urls():
              urls = []
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  page.goto('https://kenyanwallstreet.com/', timeout=60000)
                  soup = BeautifulSoup(page.content(), 'html.parser')
                  for a in soup.find_all('a', href=True):
                      href = a.get('href', '')
                      if len(href) > 35 and 'kenyanwallstreet.com' in href: urls.append(href)
                  browser.close()
              return list(set(urls))

          def scrape_article_free(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 10: return None, None, None
                      else: return None, None, None
                      title = soup.find('title').get_text().replace(' - Kenyan Wallstreet', '').strip()
                      text = "\n\n".join([p.get_text() for p in soup.find_all('p') if len(p.get_text()) > 40])
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      return text, img, title
                  except: return None, None, None
                  finally: browser.close()

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys:
              print("No Gemini API keys.")
              sys.exit(1)

          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label=""):
              keys_tried = 0
              for model_id in MODELS_TO_TRY:
                  for retry in range(len(api_keys) * 2):
                      try:
                          resp = client.models.generate_content(model=model_id, contents=prompt)
                          print(f"SUCCESS with {model_id} for {label}")
                          return resp.text.strip()
                      except Exception as e:
                          if "429" in str(e):
                              keys_tried += 1
                              if keys_tried >= len(api_keys):
                                  print(f"All keys hit quota. Waiting 45s...")
                                  time.sleep(45)
                                  keys_tried = 0
                              else:
                                  print("Quota hit. Rotating key...")
                                  global current_key, client
                                  current_key = next(key_cycle)
                                  client = genai.Client(api_key=current_key)
                              continue
                          print(f"Error with {model_id} for {label}: {e}")
                          break
              return None

          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          full_raw_text, target_image, target_title, final_hash = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article_free(link)
              if text and len(text) > 300:
                  full_raw_text, target_image, target_title, final_hash = text, img, title, u_hash
                  break
          if not full_raw_text: sys.exit(0)

          # SMART TITLE GENERATION
          title_prompt = f"""SCRAPED ARTICLE: {target_title}\nClassify type: LIST, BIO, QUESTION, SHOCKING, GUIDE, NEWS, TRENDING.
          HIGH-CTR FORMULAS: 1. Number+Keyword+Benefit, 2. Keyword+Power Word+Year, 3. How/What+Keyword+Number, 4. Keyword+[Bracket Hook], 5. Adjective+Number+Outcome.
          INSTRUCTIONS: Generate EXACTLY 3 SEO titles front-loading main keyword. Output ONLY VALID JSON: {{"final_title": "Winning Title"}}"""
          title_text = gemini_generate(title_prompt, "title")
          final_title = target_title
          if title_text:
              try:
                  final_title = json.loads(re.search(r'{.*}', title_text, re.DOTALL).group()).get('final_title', target_title)
              except:
                  pass

          time.sleep(5)  # 5s delay between API calls

          # Rotate key for next call
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          # ARTICLE GENERATION
          article_prompt = f"""TITLE: {final_title}\nSOURCE: {full_raw_text[:12000]}\nTASK: Write analytical business report as Grace Mkamburi. Professional Kenyan English. No dashes. Front-load keywords in slug and headings. 10h freshness only."""
          article_text = gemini_generate(article_prompt, "article")
          if not article_text:
              print("Failed to generate article.")
              sys.exit(1)
          
          slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]
          final_file = f"---\ntitle: \"{final_title}\"\nslug: \"{slug}\"\nauthor: \"Grace Mkamburi\"\nimage: \"{upload_to_imgbb(target_image)}\"\ncategory: \"Business\"\ndate: \"{today_str}\"\n---\n\n{article_text}"
          with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f: f.write(final_file)
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          EOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Grace Mkamburi <bot@zandani.co.ke>"
          commit_message: "content: Business update by Grace Mkamburi 📈"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_grace.json'