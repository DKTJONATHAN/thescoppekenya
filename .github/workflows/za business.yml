name: Grace Mkamburi - Business Scraper

on:
  schedule:
    - cron: '50 9,17 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_grace.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, itertools, base64, textwrap
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-2.0-flash", "gemini-1.5-flash"]

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  base64_image = base64.b64encode(img_data).decode('utf-8')
                  res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": base64_image}, timeout=20)
                  return res.json()['data']['url'] if res.status_code == 200 else image_url
              except: return image_url

          def get_target_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto('https://kenyanwallstreet.com/', timeout=60000)
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if len(href) > 40 and 'kenyanwallstreet.com' in href and not any(x in href for x in ['/tag/', '/category/', '/author/']):
                              urls.append(href)
                      browser.close()
              except: pass
              return list(set(urls))

          def scrape_article(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      
                      # 12-hour Freshness Gate
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 12:
                              return None, None, None
                      
                      title = soup.find('title').get_text().split('|')[0].strip()
                      paras = soup.select('div.entry-content p, article p')
                      text = "\n\n".join([p.get_text() for p in paras if len(p.get_text()) > 40])
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      return text, img, title
                  except: return None, None, None
                  finally: browser.close()

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys: sys.exit(1)

          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              for model_id in MODELS_TO_TRY:
                  try:
                      config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search else None
                      resp = client.models.generate_content(model=model_id, contents=prompt, config=config)
                      return resp.text.strip()
                  except Exception:
                      current_key = next(key_cycle)
                      client = genai.Client(api_key=current_key)
                      continue
              return None

          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
          
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article(link)
              
              if text and len(text) > 400:
                  # Title Generation
                  t_prompt = f"Output ONLY JSON: {{\"final_title\": \"...\"}}. Rephrase this business headline for maximum SEO/CTR: {title}. Focus on financial impact."
                  res_t = gemini_generate(t_prompt, "title")
                  try: final_title = json.loads(re.search(r'\{.*\}', res_t).group())['final_title']
                  except: final_title = title

                  # Article Generation
                  a_prompt = f"Write an analytical business report as Grace Mkamburi. Professional Kenyan English. Source: {text[:9000]}. Current Date: {full_date_str}. Use H2 subheadings. Focus on economic implications."
                  final_body = gemini_generate(a_prompt, "article", use_search=True)
                  
                  if final_body:
                      slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]
                      final_img = upload_to_imgbb(img)
                      content = f"---\ntitle: \"{final_title}\"\nslug: \"{slug}\"\nauthor: \"Grace Mkamburi\"\nimage: \"{final_img}\"\ncategory: \"Business\"\ndate: \"{today_str}\"\n---\n\n{final_body}"
                      
                      with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f:
                          f.write(content)
                      memory.append(u_hash)
                      with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
                      break
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Grace Mkamburi"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "No stash"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Grace Mkamburi <bot@zandani.co.ke>"
          commit_message: "content: Business update by Grace Mkamburi 📈"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_grace.json'
