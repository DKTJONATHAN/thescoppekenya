name: Weekly AI Podcast Episode

on:
  schedule:
    - cron: '0 8 * * 5' # Every Friday at 8:00 AM UTC
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts # Source for stories
  AUDIO_DIR: public/audio/podcasts # Destination for MP3 files
  PODCAST_CONTENT_DIR: content/briefings # Destination for episode markdown

jobs:
  build-podcast-episode:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 20 # Fetch enough history to find recent posts
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests google-generativeai

      - name: Generate Podcast Episode
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          AUDIO_DIR: ${{ env.AUDIO_DIR }}
          PODCAST_CONTENT_DIR: ${{ env.PODCAST_CONTENT_DIR }}
        run: |
          python - <<'PYEOF'
          import os, json, re, time, datetime, sys, random, traceback
          import requests
          from google import genai as genai_client
          
          # --- Constants ---
          POSTS_DIR = os.environ.get("POSTS_DIR", "content/posts")
          AUDIO_DIR = os.environ.get("AUDIO_DIR", "public/audio/podcasts")
          PODCAST_CONTENT_DIR = os.environ.get("PODCAST_CONTENT_DIR", "content/briefings")
          SITE_BASE_URL = "https://zandani.co.ke"
          MAX_STORIES = 5
          DAYS_AGO = 7
          
          # --- Find recent articles (Robust version) ---
          def find_recent_articles():
              articles = []
              # Use timezone-aware datetime
              cutoff_date = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=DAYS_AGO)
              
              if not os.path.exists(POSTS_DIR):
                  print(f"Error: Posts directory '{POSTS_DIR}' not found.", file=sys.stderr)
                  return []
                  
              print(f"Scanning for articles in '{POSTS_DIR}' published in the last {DAYS_AGO} days...")
              for filename in os.listdir(POSTS_DIR):
                  if not filename.endswith('.md'):
                      continue
                  
                  filepath = os.path.join(POSTS_DIR, filename)
                  try:
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()
          
                      # Extract frontmatter using a simple regex approach
                      frontmatter_match = re.search(r'^---\s*\n([\s\S]*?)\n---', content)
                      if not frontmatter_match:
                          # This is not an error, just a file to skip
                          continue
          
                      frontmatter_text = frontmatter_match.group(1)
                      
                      # Extract title, excerpt, and date from frontmatter
                      title_m = re.search(r'^\s*title:\s*["\']?(.*?)["\']?\s*$', frontmatter_text, re.MULTILINE)
                      excerpt_m = re.search(r'^\s*excerpt:\s*["\']?(.*?)["\']?\s*$', frontmatter_text, re.MULTILINE)
                      date_m = re.search(r'^\s*date:\s*["\']?(.*?)["\']?\s*$', frontmatter_text, re.MULTILINE)
          
                      if not date_m:
                          # Skip if no date is found
                          continue
          
                      date_str = date_m.group(1).strip()
                      post_date = None
                      try:
                          # Handles full ISO 'YYYY-MM-DDTHH:MM:SSZ'
                          post_date = datetime.datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          if post_date.tzinfo is None:
                              post_date = post_date.replace(tzinfo=datetime.timezone.utc)
                      except ValueError:
                          try:
                              # Fallback for 'YYYY-MM-DD' format
                              post_date = datetime.datetime.strptime(date_str.split('T')[0], '%Y-%m-%d').replace(tzinfo=datetime.timezone.utc)
                          except ValueError:
                              # This was the source of the original errors. Now we just log it and skip.
                              # print(f"Could not parse date '{date_str}' in {filename}. Skipping.", file=sys.stderr)
                              continue
          
                      if post_date and post_date >= cutoff_date:
                          if title_m and excerpt_m:
                              articles.append({
                                  "title": title_m.group(1).strip(),
                                  "excerpt": excerpt_m.group(1).strip()
                              })
                  except Exception as e:
                      print(f"Error processing file {filename}: {e}", file=sys.stderr)
                      
              return articles
          
          # --- Generate script with Gemini (Robust version) ---
          def generate_podcast_script(stories):
              story_block = "\n".join([f"- TITLE: {s['title']}\n  EXCERPT: {s['excerpt']}" for s in stories])
              prompt = (
                  "You are 'Za Ndani', the sharp, cynical host of the 'Za Ndani Weekly' audio briefing. "
                  "Your tone is gossipy, authoritative, and you always have the inside scoop. "
                  "Your audience are savvy Kenyans who want the real story behind the headlines.\n\n"
                  "TASK: Create a 4-5 minute podcast script summarizing the following top stories from this week. "
                  "Weave them together into a compelling narrative. Start with a catchy intro, transition smoothly "
                  "between stories with your signature commentary, and end with a thought-provoking outro.\n\n"
                  f"STORIES TO COVER:\n{story_block}\n\n"
                  "RULES:\n"
                  "- The script should be for a single speaker (you).\n"
                  "- Speak directly to the listener. Use phrases like 'Now, listen to this...' or 'And get this...'.\n"
                  "- Use sound effect cues in brackets, like [UPBEAT INTRO MUSIC] and [STORY TRANSITION SOUND].\n"
                  "- Keep it engaging and fast-paced. No long pauses.\n"
                  "- The final output should be ONLY the script text. No preamble or sign-off."
              )
              try:
                  api_key = os.environ.get("GEMINI_WRITE_KEY") or os.environ.get("GEMINI_API_KEY")
                  if not api_key:
                      print("Error: Gemini API key not found.", file=sys.stderr)
                      return None
                  
                  genai_client.configure(api_key=api_key)
                  
                  # Use a more stable model to avoid 404 errors.
                  model = genai_client.GenerativeModel('gemini-pro') 
                  response = model.generate_content(prompt)
                  return response.text.strip()
              except Exception as e:
                  print(f"Gemini script generation failed: {e}", file=sys.stderr)
                  return None
          
          # --- Generate audio with ElevenLabs ---
          def generate_audio(script_text, output_path):
              api_key = os.environ.get("ELEVENLABS_API_KEY")
              if not api_key:
                  print("::error:: ELEVENLABS_API_KEY secret not found. Cannot generate audio.", file=sys.stderr)
                  return False
          
              VOICE_ID = "21m00Tcm4TlvDq8ikWAM" # "Rachel"
              TTS_URL = f"https://api.elevenlabs.io/v1/text-to-speech/{VOICE_ID}"
          
              headers = {
                  "Accept": "audio/mpeg",
                  "Content-Type": "application/json",
                  "xi-api-key": api_key
              }
          
              speech_text = re.sub(r'\[.*?\]', '...', script_text)
          
              data = {
                  "text": speech_text,
                  "model_id": "eleven_multilingual_v2",
                  "voice_settings": { "stability": 0.5, "similarity_boost": 0.75 }
              }
          
              try:
                  response = requests.post(TTS_URL, json=data, headers=headers, timeout=90)
                  response.raise_for_status()
                  os.makedirs(os.path.dirname(output_path), exist_ok=True)
                  with open(output_path, 'wb') as f:
                      for chunk in response.iter_content(chunk_size=1024):
                          if chunk:
                              f.write(chunk)
                  print(f"Audio file saved to {output_path} using ElevenLabs.")
                  return True
              except Exception as e:
                  print(f"ElevenLabs TTS generation failed: {e}", file=sys.stderr)
                  if 'response' in locals() and response.text:
                      print(f"Response body: {response.text}", file=sys.stderr)
                  return False
          
          # --- Create briefing markdown file ---
          def create_podcast_episode_post(audio_url, script_text, stories):
              today = datetime.datetime.now(datetime.timezone.utc)
              date_str = today.strftime("%Y-%m-%d")
              timestamp = today.strftime("%Y-%m-%dT%H:%M:%SZ")
              week_num = today.isocalendar()[1]
              title = f"Za Ndani Podcast: Top Stories for Week {week_num}, {today.year}"
              slug = f"za-ndani-podcast-{date_str}"
              excerpt = f"Listen to the top Kenyan entertainment and news stories for the week of {today.strftime('%B %d, %Y')}. Your weekly audio download from Za Ndani."
          
              safe_title = title.replace('"', '\\"')
              safe_excerpt = excerpt.replace('"', '\\"')
          
              frontmatter = '\n'.join([
                  "---",
                  f'title: "{safe_title}"',
                  f'slug: "{slug}"',
                  f'date: "{timestamp}"',
                  f'excerpt: "{safe_excerpt}"',
                  f'author: "Za Ndani"',
                  f'category: "Audio Briefing"',
                  f'audio_url: "{audio_url}"',
                  "---"
              ])
              content = f"{frontmatter}\n\n## Transcript\n\n{script_text}\n"
              os.makedirs(PODCAST_CONTENT_DIR, exist_ok=True)
              filepath = os.path.join(PODCAST_CONTENT_DIR, f"{slug}.md")
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"Podcast episode post created: {filepath}")
          
          # --- Main Execution ---
          def main():
              print("Starting Weekly Podcast Episode generation...")
              recent_articles = find_recent_articles()
              if not recent_articles:
                  print("No recent articles found in the last 7 days. Exiting.")
                  sys.exit(0)
          
              stories_to_cover = random.sample(recent_articles, min(len(recent_articles), MAX_STORIES))
              print(f"\nSelected {len(stories_to_cover)} stories for the briefing:")
              for story in stories_to_cover:
                  print(f"- {story['title']}")
          
              print("\nGenerating podcast script...")
              script = generate_podcast_script(stories_to_cover)
              if not script:
                  sys.exit(1)
              print("Script generated successfully.")
          
              print("\nGenerating audio file...")
              audio_filename = f"za-ndani-podcast-{datetime.datetime.utcnow().strftime('%Y-%m-%d')}.mp3"
              audio_output_path = os.path.join(AUDIO_DIR, audio_filename)
              
              if not generate_audio(script, audio_output_path):
                  sys.exit(1)
          
              final_audio_url = f"/audio/podcasts/{audio_filename}"
              create_podcast_episode_post(final_audio_url, script, stories_to_cover)
          
              print("\n✅ Podcast episode successfully generated!")
          
          if __name__ == "__main__":
              main()
          PYEOF

      - name: Commit and push podcast episode
        run: |
          git config user.name "Za Ndani Bot"
          git config user.email "bot@zandani.co.ke"
          git add ${{ env.AUDIO_DIR }}/*.mp3 ${{ env.PODCAST_CONTENT_DIR }}/*.md
          if git diff --staged --quiet; then
            echo "No new podcast episode to commit."
          else
            git commit -m "content: Add weekly podcast episode"
            git push origin ${{ env.DEFAULT_BRANCH }}
          fi