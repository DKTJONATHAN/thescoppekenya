{{ define "main" }}
<style>
  .briefing-single-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  .briefing-single-header .date { font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .briefing-single-header h1 { font-size: 2.8rem; font-weight: 800; margin: 0.5rem 0 1rem 0; color: #1a1a1a; line-height: 1.2; }
  
  .audio-player-box { background-color: #f7f9fc; border: 1px solid #e1e8ed; border-radius: 12px; padding: 1.5rem; margin: 2rem 0; }
  .audio-player-box h3 { margin: 0 0 1rem 0; font-size: 1.2rem; font-weight: 700; color: #333; }
  .audio-player-box audio { width: 100%; border-radius: 5px; }
  
  .transcript-content { margin-top: 2.5rem; line-height: 1.7; font-size: 1.1rem; color: #333; }
  .transcript-content h2 { font-size: 1.8rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #eee; }
  .transcript-content p { margin-bottom: 1.5rem; }
  .transcript-content strong { font-weight: 700; }
</style>

<article class="briefing-single-container">
  <header class="briefing-single-header">
    <div class="date">{{ .Date.Format "January 2, 2006" }}</div>
    <h1>{{ .Title }}</h1>
  </header>

  {{ if .Params.audio_url }}
    <div class="audio-player-box">
      <h3>Listen to the Briefing</h3>
      <audio controls preload="metadata">
        <source src="{{ .Params.audio_url | absURL }}" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
  {{ end }}

  <div class="transcript-content">
    {{ .Content }}
  </div>
</article>

{{ end }}
