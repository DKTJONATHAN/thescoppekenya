name: Zed Mogaka - George Diano Stories

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: georgediano-scraper
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scraper
        env:
          DEFAULT_BRANCH: main
          POSTS_DIR: content/posts
          MEMORY_FILE: .github/memory_georgediano.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python - <<'EOF'
import os
import json
import re
import urllib.parse
import urllib.request
from datetime import datetime
import xml.etree.ElementTree as ET

DEFAULT_BRANCH = os.environ.get("DEFAULT_BRANCH", "main")
POSTS_DIR = os.environ.get("POSTS_DIR", "content/posts")
MEMORY_FILE = os.environ.get("MEMORY_FILE", ".github/memory_georgediano.json")
GEMINI_API_KEY = os.environ.get("GEMINI_API_KEY")
IMGBB_API_KEY = os.environ.get("IMGBB_API_KEY")
TARGET_USER = "georgediano"
MIN_LENGTH = 500

os.makedirs(POSTS_DIR, exist_ok=True)
os.makedirs(os.path.dirname(MEMORY_FILE), exist_ok=True)

# ---------------------------------------------------------
# FIX: Handle empty or corrupted JSON memory file
# ---------------------------------------------------------
memory = []
if os.path.exists(MEMORY_FILE):
    try:
        with open(MEMORY_FILE, "r", encoding="utf-8") as f:
            memory = json.load(f)
    except json.JSONDecodeError:
        print("Memory file is empty or corrupted. Starting fresh.")
        memory = []

def fetch_url(url):
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    try:
        with urllib.request.urlopen(req) as response:
            return response.read()
    except Exception as e:
        print(f"Error fetching {url}: {e}")
        return None

def fix_image_url(image_url):
    if not image_url: return ""
    if image_url.startswith("/pic/"):
        path = urllib.parse.unquote(image_url).replace("/pic/", "", 1)
        return f"https://pbs.twimg.com/{path}"
    if image_url.startswith("media/"):
        return f"https://pbs.twimg.com/{image_url}"
    if image_url.startswith("https://media/"):
        return image_url.replace("https://media/", "https://pbs.twimg.com/media/")
    return image_url

def upload_to_imgbb(image_url):
    if not image_url or not IMGBB_API_KEY: return ""
    fixed_url = fix_image_url(image_url)
    img_data = fetch_url(fixed_url)
    if not img_data: return ""
    try:
        import base64
        b64_img = base64.b64encode(img_data).decode('utf-8')
        data = urllib.parse.urlencode({'key': IMGBB_API_KEY, 'image': b64_img}).encode('utf-8')
        req = urllib.request.Request("https://api.imgbb.com/1/upload", data=data)
        with urllib.request.urlopen(req) as response:
            res = json.loads(response.read().decode('utf-8'))
            if res.get('success'): return res['data']['url']
    except Exception as e:
        print(f"ImgBB error: {e}")
    return ""

def call_gemini(prompt, task_name):
    if not GEMINI_API_KEY: return ""
    url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_API_KEY}"
    payload = {"contents": [{"parts": [{"text": prompt}]}], "generationConfig": {"temperature": 0.7}}
    data = json.dumps(payload).encode('utf-8')
    req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
    try:
        with urllib.request.urlopen(req) as response:
            res = json.loads(response.read().decode('utf-8'))
            print(f"Gemini OK: {task_name}")
            return res['candidates'][0]['content']['parts'][0]['text'].strip()
    except Exception as e:
        print(f"Gemini error: {e}")
        return ""

def get_tweets():
    tweets = []
    # Syndication
    url = f"https://syndication.twitter.com/srv/timeline-profile/screen-name/{TARGET_USER}"
    print(f"Trying syndication feed: {url}")
    html = fetch_url(url)
    if html:
        match = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.+?)</script>', html.decode('utf-8'))
        if match:
            try:
                data = json.loads(match.group(1))
                entries = data['props']['pageProps']['timeline']['entries']
                for entry in entries:
                    if entry['type'] == 'tweet':
                        t = entry['content']['tweet']
                        text = t.get('full_text', '')
                        tid = t.get('id_str', '')
                        img = ""
                        try:
                            media = t.get('entities', {}).get('media', [])
                            if media and media[0].get('type') == 'photo':
                                img = media[0].get('media_url_https', '')
                        except: pass
                        if len(text) >= MIN_LENGTH and tid not in memory:
                            tweets.append({'id': tid, 'text': text, 'image_url': img})
            except Exception: pass
    if tweets: return tweets

    # Nitter Fallback
    print("Trying Nitter fallback...")
    xml_data = fetch_url(f"https://nitter.net/{TARGET_USER}/rss")
    if xml_data:
        try:
            root = ET.fromstring(xml_data)
            for item in root.findall('.//item'):
                link = item.find('link').text
                desc = item.find('description').text or ""
                tid = link.split('/')[-1].split('#')[0]
                clean_text = re.sub(r'<[^>]+>', ' ', desc).strip()
                if len(clean_text) >= MIN_LENGTH and tid not in memory:
                    img = ""
                    m = re.search(r'<img[^>]+src="([^">]+)"', desc)
                    if m: img = m.group(1)
                    tweets.append({'id': tid, 'text': clean_text, 'image_url': img})
        except Exception: pass
    return tweets

tweets = get_tweets()
if not tweets:
    print("No qualifying posts found.")
    exit(0)

print(f"Using {len(tweets)} tweets.")
for tweet in tweets:
    interpreted = call_gemini(f"Interpret this tweet contextually: {tweet['text']}", "interpret")
    title = call_gemini(f"Write a catchy gossip/news title for this: {interpreted}", "title").replace('"', '')
    article = call_gemini(f"Write a 3-paragraph engaging news article based on this: {interpreted}", "article")
    desc = call_gemini(f"Write a 1-sentence SEO meta description for this article: {article}", "description").replace('"', '')
    tags = call_gemini(f"Provide 3-5 comma-separated lowercase tags for this: {interpreted}", "tags")

    imgbb_url = upload_to_imgbb(tweet['image_url'])

    slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')[:60]
    filename = f"{datetime.now().strftime('%Y-%m-%d')}-{slug}.md"
    filepath = os.path.join(POSTS_DIR, filename)

    md = f"""---
title: "{title}"
description: "{desc}"
date: {datetime.now().strftime("%Y-%m-%dT%H:%M:%S+03:00")}
tags: [{tags}]
image: "{imgbb_url}"
---

{article}
"""
    with open(filepath, "w", encoding="utf-8") as f: f.write(md)
    print(f"Saved: {filepath}")
    memory.append(tweet['id'])
    with open(MEMORY_FILE, "w", encoding="utf-8") as f: json.dump(memory, f)
EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ .github/memory_georgediano.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-published George Diano stories" && git push)
