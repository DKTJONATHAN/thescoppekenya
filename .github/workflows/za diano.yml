name: Zed Mogaka - George Diano Stories

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: georgediano-scraper
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scraper
        env:
          DEFAULT_BRANCH: main
          POSTS_DIR: content/posts
          MEMORY_FILE: .github/memory_georgediano.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python - <<'EOF'
import os
import json
import re
import urllib.parse
import urllib.request
import urllib.error
from datetime import datetime
import xml.etree.ElementTree as ET

# Configuration
DEFAULT_BRANCH = os.environ.get("DEFAULT_BRANCH", "main")
POSTS_DIR = os.environ.get("POSTS_DIR", "content/posts")
MEMORY_FILE = os.environ.get("MEMORY_FILE", ".github/memory_georgediano.json")
GEMINI_API_KEY = os.environ.get("GEMINI_API_KEY")
IMGBB_API_KEY = os.environ.get("IMGBB_API_KEY")

TARGET_USER = "georgediano"
MIN_LENGTH = 500

os.makedirs(POSTS_DIR, exist_ok=True)
os.makedirs(os.path.dirname(MEMORY_FILE), exist_ok=True)

# Load Memory
if os.path.exists(MEMORY_FILE):
    with open(MEMORY_FILE, "r", encoding="utf-8") as f:
        memory = json.load(f)
else:
    memory = []

def fetch_url(url):
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    try:
        with urllib.request.urlopen(req) as response:
            return response.read()
    except Exception as e:
        print(f"Error fetching {url}: {e}")
        return None

def get_syndication_tweets():
    print(f"Trying syndication feed: https://syndication.twitter.com/srv/timeline-profile/screen-name/{TARGET_USER}")
    url = f"https://syndication.twitter.com/srv/timeline-profile/screen-name/{TARGET_USER}"
    html = fetch_url(url)
    if not html:
        print("Syndication empty/blocked. Trying Nitter fallback...")
        return []

    html = html.decode('utf-8')
    match = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.+?)</script>', html)
    if not match:
        print("Syndication empty/blocked. Trying Nitter fallback...")
        return []

    data = json.loads(match.group(1))
    tweets = []
    try:
        entries = data['props']['pageProps']['timeline']['entries']
        for entry in entries:
            if entry['type'] == 'tweet':
                tweet = entry['content']['tweet']
                text = tweet.get('full_text', '')
                tweet_id = tweet.get('id_str', '')

                # Extract image if available
                image_url = ""
                try:
                    media = tweet.get('entities', {}).get('media', [])
                    if media and media[0].get('type') == 'photo':
                        image_url = media[0].get('media_url_https', '')
                except:
                    pass

                if len(text) >= MIN_LENGTH and tweet_id not in memory:
                    tweets.append({'id': tweet_id, 'text': text, 'image_url': image_url})
    except KeyError:
        pass
    return tweets

def get_nitter_tweets():
    nitter_url = f"https://nitter.net/{TARGET_USER}/rss"
    print(f"Trying Nitter: {nitter_url}")
    xml_data = fetch_url(nitter_url)
    if not xml_data:
        return []

    tweets = []
    try:
        root = ET.fromstring(xml_data)
        items = root.findall('.//item')
        print(f"  -> Found {len(items)} items via https://nitter.net")
        for item in items:
            link = item.find('link').text
            description = item.find('description').text or ""
            tweet_id = link.split('/')[-1].split('#')[0]

            # Clean HTML tags from description for length check
            clean_text = re.sub(r'<[^>]+>', ' ', description).strip()

            if len(clean_text) >= MIN_LENGTH and tweet_id not in memory:
                print(f"[nitter:https://nitter.net] Accepted post: {len(clean_text)} chars")

                # Extract image from description CDATA/HTML
                image_url = ""
                img_match = re.search(r'<img[^>]+src="([^">]+)"', description)
                if img_match:
                    image_url = img_match.group(1)

                tweets.append({'id': tweet_id, 'text': clean_text, 'image_url': image_url})
    except Exception as e:
        print(f"Error parsing Nitter RSS: {e}")
    return tweets

def fix_image_url(image_url):
    if not image_url:
        return ""
    # Fix the host resolution issue caused by relative Nitter paths
    if image_url.startswith("https://media/"):
        return image_url.replace("https://media/", "https://pbs.twimg.com/media/")
    if image_url.startswith("/pic/"):
        decoded = urllib.parse.unquote(image_url)
        path = decoded.replace("/pic/", "", 1)
        return f"https://pbs.twimg.com/{path}"
    if image_url.startswith("media/"):
        return f"https://pbs.twimg.com/{image_url}"
    return image_url

def upload_to_imgbb(image_url):
    if not image_url or not IMGBB_API_KEY:
        return ""

    fixed_url = fix_image_url(image_url)

    # Download image first
    img_data = fetch_url(fixed_url)
    if not img_data:
        print(f"Failed to download image from {fixed_url}")
        return ""

    try:
        # Upload to ImgBB
        import base64
        b64_img = base64.b64encode(img_data).decode('utf-8')
        data = urllib.parse.urlencode({
            'key': IMGBB_API_KEY,
            'image': b64_img
        }).encode('utf-8')

        req = urllib.request.Request("https://api.imgbb.com/1/upload", data=data)
        with urllib.request.urlopen(req) as response:
            res_json = json.loads(response.read().decode('utf-8'))
            if res_json.get('success'):
                return res_json['data']['url']
    except Exception as e:
        print(f"ImgBB/WebP error: {e}")
    return ""

def call_gemini(prompt, task_name):
    if not GEMINI_API_KEY:
        return "Gemini API Key missing"

    url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_API_KEY}"
    headers = {'Content-Type': 'application/json'}
    payload = {
        "contents": [{"parts": [{"text": prompt}]}],
        "generationConfig": {"temperature": 0.7}
    }

    data = json.dumps(payload).encode('utf-8')
    req = urllib.request.Request(url, data=data, headers=headers)
    try:
        with urllib.request.urlopen(req) as response:
            res_json = json.loads(response.read().decode('utf-8'))
            print(f"Gemini OK (gemini-2.5-flash): {task_name}")
            return res_json['candidates'][0]['content']['parts'][0]['text'].strip()
    except Exception as e:
        print(f"Gemini error: {e}")
        return ""

def process_tweets():
    tweets = get_syndication_tweets()
    if not tweets:
        tweets = get_nitter_tweets()

    if not tweets:
        print("No qualifying posts found.")
        return

    print(f"Using {len(tweets)} tweets.")

    for tweet in tweets:
        # Generate content via Gemini
        raw_text = tweet['text']

        interpreted = call_gemini(f"Interpret this tweet contextually: {raw_text}", "interpret")
        title = call_gemini(f"Write a catchy gossip/news title for this: {interpreted}", "title").replace('"', '')
        article = call_gemini(f"Write a 3-paragraph engaging news article based on this: {interpreted}", "article")
        description = call_gemini(f"Write a 1-sentence SEO meta description for this article: {article}", "description").replace('"', '')
        tags = call_gemini(f"Provide 3-5 comma-separated lowercase tags for this: {interpreted}", "tags")

        # Handle Image
        imgbb_url = upload_to_imgbb(tweet['image_url'])

        # Create Markdown
        date_str = datetime.now().strftime("%Y-%m-%d")
        slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')[:60]
        filename = f"{date_str}-{slug}.md"
        filepath = os.path.join(POSTS_DIR, filename)

        md_content = f"""---
title: "{title}"
description: "{description}"
date: {datetime.now().strftime("%Y-%m-%dT%H:%M:%S+03:00")}
tags: [{tags}]
image: "{imgbb_url}"
---

{article}
"""

        with open(filepath, "w", encoding="utf-8") as f:
            f.write(md_content)

        print(f"Saved: {filepath}")
        memory.append(tweet['id'])

        # Save memory
        with open(MEMORY_FILE, "w", encoding="utf-8") as f:
            json.dump(memory, f)

process_tweets()

EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ .github/memory_georgediano.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-published George Diano stories" && git push)
