name: Celestine Nzioka - General News Scraper
on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine.json
jobs:
  generate-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 fonts-liberation libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 libxrender1 libxtst6 lsb-release wget xdg-utils
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil playwright-stealth==1.0.6 Pillow
          playwright install chromium --with-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python - <<'PYEOF'
import os, json, datetime, requests, re, time, sys, hashlib, itertools, base64, random, io
from dateutil import parser as date_parser
from google import genai
from google.genai import types
from bs4 import BeautifulSoup
from playwright.sync_api import sync_playwright
from playwright_stealth import stealth_sync
from PIL import Image

current_utc = datetime.datetime.utcnow()
current_year = current_utc.strftime("%Y")
publish_timestamp = current_utc.strftime("%Y-%m-%dT%H:%M:%SZ")
today_str = current_utc.strftime("%Y-%m-%d")
full_date_str = current_utc.strftime("%A, %B %d, %Y")
MODELS_TO_TRY = ["gemini-3.0-flash-preview", "gemini-3.0-flash"]
MAX_AGE_HOURS = 12
SITE_URL = "https://www.kenyans.co.ke/news"
SITE_DOMAIN = "kenyans.co.ke"
SITE_BASE_URL = "https://zandani.co.ke"

BANNED_PHRASES = [
    "sasa basi", "melting the pot", "spill the tea", "tea is hot",
    "grab your popcorn", "buckle up", "breaking news", "dive in",
    "delve into", "moreover", "furthermore", "in conclusion",
    "it is worth noting", "a testament to", "navigating the landscape",
    "in todays digital age", "tapestry"
]

BANNED_URL_PATHS = [
    '/author/', '/tag/', '/page/', '/feed/', '/comment-', '/category/',
    '/terms', '/about', '/privacy', '/contact', '/advertise', '/policy', '/disclaimer'
]

def upload_to_imgbb(image_url):
    api_key = os.environ.get("IMGBB_API_KEY")
    if not api_key or not image_url:
        return image_url
    try:
        img_data = requests.get(image_url, timeout=15).content
        img = Image.open(io.BytesIO(img_data))
        if img.mode in ('RGBA', 'LA', 'P'):
            img = img.convert('RGB')
        webp_buffer = io.BytesIO()
        img.save(webp_buffer, format='WEBP', quality=82)
        webp_buffer.seek(0)
        base64_image = base64.b64encode(webp_buffer.read()).decode('utf-8')
        res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": base64_image}, timeout=20)
        if res.status_code == 200:
            new_url = res.json()['data']['url']
            print("Re-hosted as WebP: " + new_url)
            return new_url
        print("ImgBB failed: " + res.text)
        return image_url
    except Exception as e:
        print("ImgBB/WebP error: " + str(e))
        return image_url

def get_target_urls():
    urls_list = []
    seen = set()
    print("Scanning " + SITE_URL)
    try:
        with sync_playwright() as p:
            browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-blink-features=AutomationControlled", "--disable-infobars", "--window-size=1920,1080"])
            context = browser.new_context(
                user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36",
                viewport={"width": 1920, "height": 1080},
                locale="en-KE",
                timezone_id="Africa/Nairobi",
                extra_http_headers={
                    "Accept-Language": "en-KE,en;q=0.9",
                    "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
                    "Sec-Fetch-Site": "none",
                    "Sec-Fetch-Mode": "navigate"
                }
            )
            page = context.new_page()
            stealth_sync(page)
            page.goto(SITE_URL, timeout=60000, wait_until="domcontentloaded")
            time.sleep(5)
            for _ in range(3):
                page.evaluate("window.scrollBy(0, 1800)")
                time.sleep(random.uniform(2, 4))
            soup = BeautifulSoup(page.content(), 'html.parser')
            for a in soup.find_all('a', href=True):
                href = a.get('href', '').strip()
                if not href:
                    continue
                full_url = href if href.startswith('http') else 'https://www.' + SITE_DOMAIN + href
                if SITE_DOMAIN not in full_url:
                    continue
                path = full_url.split(SITE_DOMAIN)[-1].lower()
                slug = path.rstrip('/').split('/')[-1]
                if len(slug) > 15 and '-' in slug and not any(x in path for x in BANNED_URL_PATHS):
                    if full_url not in seen:
                        seen.add(full_url)
                        urls_list.append(full_url)
            browser.close()
    except Exception as e:
        print("Scan failed: " + str(e))
    print("Found " + str(len(urls_list)) + " candidates.")
    for u in urls_list[:8]:
        print(u)
    return urls_list[:30]

def scrape_article(url):
    print("Scraping: " + url)
    try:
        with sync_playwright() as p:
            browser = p.chromium.launch(headless=True, args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-blink-features=AutomationControlled"])
            context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36")
            page = context.new_page()
            stealth_sync(page)
            page.route("**/*", lambda route: route.abort() if route.request.resource_type in ["image","stylesheet","font","media"] else route.continue_())
            page.goto(url, timeout=60000, wait_until="domcontentloaded")
            time.sleep(random.uniform(1, 3))
            soup = BeautifulSoup(page.content(), "html.parser")
            browser.close()
            pub_time = None
            for script in soup.find_all('script', type='application/ld+json'):
                try:
                    data = json.loads(script.string or '{}')
                    if 'datePublished' in data:
                        pub_time = date_parser.parse(data['datePublished'])
                        break
                except Exception:
                    pass
            if not pub_time:
                meta = soup.find('meta', property='article:published_time') or soup.find('meta', {'name': 'date'})
                if meta and meta.get('content'):
                    pub_time = date_parser.parse(meta['content'])
            if not pub_time:
                pat = r'(\d+)\s*(min|mins|hr|hrs|hour|hours|day|days)\s*ago'
                for el in soup.find_all(string=re.compile(pat, re.I)):
                    try:
                        pub_time = date_parser.parse(el, fuzzy=True)
                        break
                    except Exception:
                        continue
            if not pub_time:
                m = re.search(r'/([0-9]{4})/([0-9]{2})/([0-9]{2})/', url)
                if m:
                    pub_time = datetime.datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), tzinfo=datetime.timezone.utc)
            if pub_time:
                if pub_time.tzinfo is None:
                    pub_time = pub_time.replace(tzinfo=datetime.timezone.utc)
                age = (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600
                print("Date: " + str(pub_time) + " (" + str(round(age, 1)) + "h old)")
                if age > MAX_AGE_HOURS:
                    print("Too old - skip")
                    return None, None, None
            else:
                print("No date - assume fresh")
            title = soup.title.string.strip() if soup.title else ""
            title = re.sub(r'\s*[-]\s*Kenyans\.co\.ke.*', '', title, flags=re.I).strip()
            article_text = ""
            for sel in ['article', '.article-body', '.post-content', '.entry-content', '.content', 'main']:
                cont = soup.select_one(sel)
                if cont:
                    article_text = "

".join(p.get_text(strip=True) for p in cont.find_all('p') if len(p.get_text(strip=True)) > 40)
                    if len(article_text) > 400:
                        break
            if len(article_text) < 400:
                article_text = "

".join(p.get_text(strip=True) for p in soup.find_all('p') if len(p.get_text(strip=True)) > 40)
            img_url = ""
            og = soup.find('meta', property='og:image')
            if og:
                img_url = og.get('content', '')
            if not img_url:
                tw = soup.find('meta', {'name': 'twitter:image'})
                if tw:
                    img_url = tw.get('content', '')
            print("Text length: " + str(len(article_text)))
            return article_text, img_url, title
    except Exception as e:
        print("Scrape error: " + str(e))
        return None, None, None

def get_internal_context():
    posts_dir = os.environ.get("POSTS_DIR", "content/posts")
    if not os.path.exists(posts_dir):
        return ""
    files = [f for f in os.listdir(posts_dir) if f.endswith(".md")]
    sample = random.sample(files, min(len(files), 3))
    links = []
    for fn in sample:
        try:
            with open(os.path.join(posts_dir, fn), "r", encoding="utf-8") as f:
                content = f.read()
            title_m = re.search(r'title:\s*"(.*?)"', content)
            slug_m = re.search(r'slug:\s*"(.*?)"', content)
            if title_m and slug_m:
                links.append("- [" + title_m.group(1) + "](" + SITE_BASE_URL + "/article/" + slug_m.group(1) + ")")
        except Exception:
            pass
    return "
".join(links) if links else ""

raw_keys = [os.environ.get(k) for k in ["GEMINI_WRITE_KEY", "GEMINI_API_KEY", "GEMINI_API_KEY1"] if os.environ.get(k)]
if not raw_keys:
    print("No Gemini keys")
    sys.exit(1)
key_cycle = itertools.cycle(raw_keys)
current_key = next(key_cycle)
client = genai.Client(api_key=current_key)

def gemini_generate(prompt, label="", use_search=False):
    global current_key, client
    for model in MODELS_TO_TRY:
        for _ in range(6):
            try:
                config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search else None
                resp = client.models.generate_content(model=model, contents=prompt, config=config)
                print("Gemini OK (" + model + "): " + label)
                return resp.text.strip()
            except Exception as e:
                err = str(e)
                if "429" in err or "quota" in err.lower() or "rate" in err.lower():
                    time.sleep(random.uniform(20, 35))
                    current_key = next(key_cycle)
                    client = genai.Client(api_key=current_key)
                    continue
                print("Gemini error (" + model + "): " + err)
                break
    return None

article_links = get_target_urls()
if not article_links:
    print("No candidates")
    sys.exit(0)

memory_path = os.environ.get('MEMORY_FILE')
memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []
full_raw_text, target_image, target_title, final_hash = None, None, None, None
for link in article_links:
    u_hash = hashlib.md5(link.encode()).hexdigest()
    if u_hash in memory:
        continue
    text, img, title = scrape_article(link)
    if text and len(text) > 400:
        full_raw_text = text
        target_image = img
        target_title = title or "Kenya News"
        final_hash = u_hash
        break
if not full_raw_text:
    print("No fresh valid article")
    sys.exit(0)

title_prompt = (
    "SCRAPED ARTICLE TITLE: " + target_title + "
"
    "ARTICLE SNIPPET:
" + full_raw_text[:1500] + "
"
    "Write a single news headline.
"
    "Rules: Plain reporting tone. No dates. No clickbait. No brackets.
"
    "Output ONLY JSON: {"final_title": "Your Title Here"}"
)
title_text = gemini_generate(title_prompt, "title")
final_title = target_title
if title_text:
    try:
        clean = re.sub(r"^```json?
?|```$", "", title_text, flags=re.I|re.DOTALL).strip()
        data = json.loads(clean)
        final_title = data.get('final_title', target_title)
    except Exception as e:
        print("Title parse error: " + str(e))

current_key = next(key_cycle)
client = genai.Client(api_key=current_key)
time.sleep(5)

internal_links = get_internal_context()
banned_str = ", ".join(BANNED_PHRASES)
slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:68]
canonical_url = SITE_BASE_URL + "/article/" + slug

article_prompt = (
    "Today is " + full_date_str + ". Current year: " + current_year + ". Writing in real time.
"
    "TITLE: " + final_title + "
"
    "SOURCE TEXT:
" + full_raw_text[:9500] + "
"
    "INTERNAL LINKS (use 1-2 naturally):
" + internal_links + "

"
    "TASK: Write a sharp news article as Celestine Nzioka for Za Ndani.
"
    "Professional tone. Facts first. No em-dashes. Single hyphens only.
"
    "CRITICAL: Article is NOW in " + current_year + ". No references to past years.
"
    "No title/author/date in body.
"
    "STRUCTURE: 1. 35-45 word lede (no heading). 2. ## H2 subheading. 3. ### subheadings.
"
    "BANNED PHRASES: " + banned_str + "
"
    "BRANDING: You are Za Ndani. NEVER mention Kenyans or kenyans.co.ke.
"
    "Factual, direct, local context."
)

article_text = gemini_generate(article_prompt, "article", use_search=True)
if not article_text:
    sys.exit(1)

article_text = re.sub(r"^```(?:markdown)?
?", "", article_text).rstrip("```").strip()
article_text = re.sub(r"^(Title|By|Date):.*?
", "", article_text, flags=re.I|re.M)
article_text = article_text.replace("—", "-").replace("–", "-")
article_text = re.sub(r'kenyans\.co\.ke', 'zandani.co.ke', article_text, flags=re.I)
article_text = re.sub(r'Kenyans\.co\.ke', 'Za Ndani', article_text)
article_text = re.sub(r'Kenyans(?=\s+(has|have|said|reported|confirmed|noted|stated|revealed))', 'Za Ndani', article_text)

current_key = next(key_cycle)
client = genai.Client(api_key=current_key)
time.sleep(3)

desc_prompt = (
    "Write one meta description (140-155 chars) for this article.
"
    "Title: " + final_title + "
"
    "Snippet: " + article_text[:600] + "
"
    "Rules: factual, starts with subject, includes key fact. 140-155 chars.
"
    "Output ONLY JSON: {"description": "text here"}"
)
desc_text = gemini_generate(desc_prompt, "description")
meta_description = ""
if desc_text:
    try:
        clean = re.sub(r"^```json?
?|```$", "", desc_text, flags=re.I|re.DOTALL).strip()
        data = json.loads(clean)
        meta_description = data.get('description', '')[:160].replace('"', "'")
    except Exception as e:
        print("Desc parse error: " + str(e))

time.sleep(3)

tags_prompt = (
    "Generate 4-5 SEO tags for this article.
"
    "Title: " + final_title + "
"
    "Snippet: " + article_text[:500] + "
"
    "Rules: lowercase, hyphens for spaces, no generic tags like news or kenya.
"
    "Output ONLY JSON: {"tags": ["tag-one", "tag-two", "tag-three", "tag-four"]}"
)
tags_text = gemini_generate(tags_prompt, "tags")
article_tags = []
if tags_text:
    try:
        clean = re.sub(r"^```json?
?|```$", "", tags_text, flags=re.I|re.DOTALL).strip()
        data = json.loads(clean)
        article_tags = [str(t).lower().replace(' ', '-') for t in data.get('tags', [])[:5]]
    except Exception as e:
        print("Tags parse error: " + str(e))

final_image = upload_to_imgbb(target_image) if target_image else ""
posts_dir = os.environ.get("POSTS_DIR", "content/posts")
os.makedirs(posts_dir, exist_ok=True)
tags_yaml = json.dumps(article_tags)

lines = [
    "---",
    "title: \"" + final_title.replace('"', "'") + "\"",
    "slug: \"" + slug + "\"",
    "description: \"" + meta_description + "\"",
    "author: \"Celestine Nzioka\"",
    "author_url: \"" + SITE_BASE_URL + "/author/celestine-nzioka\"",
    "image: \"" + final_image + "\"",
    "category: \"News\"",
    "tags: " + tags_yaml,
    "canonical: \"" + canonical_url + "\"",
    "date: \"" + publish_timestamp + "\"",
    "---",
    article_text,
    ""
]
final_file = "
".join(lines)
filepath = os.path.join(posts_dir, today_str + "-" + slug + ".md")
with open(filepath, "w", encoding="utf-8") as f:
    f.write(final_file)
memory.append(final_hash)
with open(memory_path, 'w') as f:
    json.dump(memory[-300:], f)
print("Saved: " + filepath)
PYEOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "Celestine Nzioka"
          git config --global user.email "bot@zandani.co.ke"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Celestine Nzioka <bot@zandani.co.ke>"
          commit_message: "content: Breaking news update by Celestine Nzioka"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'content/posts/*.md .github/memory_celestine.json'

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://zandani.co.ke/sitemap.xml" || true
          echo "Google sitemap pinged"
