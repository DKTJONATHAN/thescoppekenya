name: Celestine Nzioka - General News Scraper

on:
  schedule:
    # Runs 10 times daily to capture breaking news
    - cron: '0 0,2,5,7,10,12,15,17,20,22 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_celestine.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium
          npx playwright install-deps

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python - <<'PYEOF'
          import os, json, datetime, requests, re, hashlib, sys, base64, time, itertools, textwrap
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-2.0-flash", "gemini-1.5-flash"]

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          if not api_keys: sys.exit(1)
          
          key_cycle = itertools.cycle(api_keys)
          current_key = next(key_cycle)
          client = genai.Client(api_key=current_key)

          def upload_to_imgbb(image_url):
              api_key = os.environ.get("IMGBB_API_KEY")
              if not api_key or not image_url: return image_url
              try:
                  img_data = requests.get(image_url, timeout=15).content
                  res = requests.post("https://api.imgbb.com/1/upload", data={"key": api_key, "image": base64.b64encode(img_data).decode("utf-8")}, timeout=20)
                  return res.json()["data"]["url"] if res.status_code == 200 else image_url
              except: return image_url

          def gemini_generate(prompt, label="", use_search=False):
              global current_key, client
              for model_id in MODELS_TO_TRY:
                  try:
                      config = types.GenerateContentConfig(tools=[types.Tool(google_search=types.GoogleSearch())]) if use_search else None
                      resp = client.models.generate_content(model=model_id, contents=prompt, config=config)
                      return resp.text.strip()
                  except Exception:
                      current_key = next(key_cycle)
                      client = genai.Client(api_key=current_key)
                      continue
              return None

          def get_urls():
              urls = set()
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/122.0.0.0 Safari/537.36")
                      page.goto('https://www.kenyans.co.ke/news', timeout=60000, wait_until="networkidle")
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '').strip()
                          if '/news/' in href and re.search(r'/\d{5,}-', href):
                              urls.add('https://www.kenyans.co.ke' + href if href.startswith('/') else href)
                      browser.close()
              except: pass
              return sorted(list(urls), reverse=True)

          def scrape(url):
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto(url, timeout=45000, wait_until="domcontentloaded")
                      soup = BeautifulSoup(page.content(), "html.parser")
                      browser.close()
                      
                      # Freshness Check (24h limit for general news)
                      pub_time = None
                      date_tag = soup.find('meta', property='article:published_time')
                      if date_tag:
                          pub_time = date_parser.parse(date_tag['content']).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 24: return None, None, None

                      title = soup.find('title').get_text().replace(' - Kenyans.co.ke', '').strip()
                      paras = soup.select('.field-item p, .node-article p, article p')
                      text = "\n\n".join([p.get_text(strip=True) for p in paras if len(p.get_text(strip=True)) > 45])
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      return text, img, title
              except: return None, None, None

          links = get_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          for url in links:
              u_hash = hashlib.md5(url.encode()).hexdigest()
              if u_hash in memory: continue
              txt, img, t = scrape(url)
              if txt and len(txt) > 600:
                  # Title Generation
                  t_res = gemini_generate(f"JSON ONLY: {{\"final_title\": \"...\"}}. Rephrase for high CTR: {t}", "title")
                  try: final_title = json.loads(re.search(r'\{.*\}', t_res, re.S).group())['final_title']
                  except: final_title = t
                  
                  # Article Generation
                  prompt = f"Write a news report as Celestine Nzioka (Authoritative, Kenyan style). Use H2 for subheadings. Source: {txt[:8000]}. Current Date: {full_date_str}."
                  body = gemini_generate(prompt, "article", use_search=True)
                  
                  if body:
                      slug = re.sub(r'[^a-z0-9]+', '-', final_title.lower()).strip('-')[:70]
                      final_img = upload_to_imgbb(img)
                      with open(os.path.join(os.environ.get("POSTS_DIR"), f"{slug}.md"), "w") as f:
                          f.write(f"---\ntitle: \"{final_title}\"\nslug: \"{slug}\"\nauthor: \"Celestine Nzioka\"\nimage: \"{final_img}\"\ncategory: \"News\"\ndate: \"{datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')}\"\n---\n\n{body}")
                      memory.append(u_hash)
                      with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
                      break
          PYEOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: "Celestine Nzioka <bot@zandani.co.ke>"
          commit_message: "content: Breaking news update by Celestine Nzioka 📰"
          file_pattern: 'content/posts/*.md .github/memory_celestine.json'
