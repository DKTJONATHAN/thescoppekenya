name: Mutheu Ann - Entertainment Scraper

on:
  schedule:
    - cron: '35 7,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts
  MEMORY_FILE: .github/memory_mutheu.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright python-dateutil
          playwright install chromium

      - name: Generate article with Gemini
        env:
          GEMINI_WRITE_KEY: ${{ secrets.GEMINI_WRITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, time, sys, hashlib, random, textwrap, itertools, base64
          from dateutil import parser as date_parser
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          full_date_str = datetime.datetime.utcnow().strftime("%A, %B %d, %Y")
          MODELS_TO_TRY = ["gemini-2.0-flash", "gemini-2.0-flash-lite-preview"]

          def get_target_urls():
              urls = []
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto('https://ew.com/', timeout=60000)
                      content = page.content()
                      soup = BeautifulSoup(content, 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = a.get('href', '')
                          if 'ew.com' in href and len(href) > 30:
                              urls.append(href if href.startswith('http') else 'https://ew.com' + href)
                      browser.close()
              except: pass
              return list(set(urls))

          def scrape_article(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  try:
                      page.goto(url, timeout=45000)
                      soup = BeautifulSoup(page.content(), "html.parser")
                      pub_time = None
                      meta_pub = soup.find('meta', property='article:published_time')
                      if meta_pub:
                          pub_time = date_parser.parse(meta_pub.get('content')).replace(tzinfo=datetime.timezone.utc)
                          if (datetime.datetime.now(datetime.timezone.utc) - pub_time).total_seconds() / 3600 > 10:
                              return None, None, None
                      
                      title = soup.find('title').get_text().strip() if soup.find('title') else ""
                      body = "\n\n".join([p.get_text() for p in soup.find_all('p') if len(p.get_text()) > 50])
                      img = soup.find('meta', property='og:image')['content'] if soup.find('meta', property='og:image') else ""
                      return body, img, title
                  except: return None, None, None
                  finally: browser.close()

          article_links = get_target_urls()
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          full_raw_text, final_hash, target_title, target_image = None, None, None, None
          for link in article_links:
              u_hash = hashlib.md5(link.encode()).hexdigest()
              if u_hash in memory: continue
              text, img, title = scrape_article(link)
              if text and len(text) > 500:
                  full_raw_text, target_image, final_hash, target_title = text, img, u_hash, title
                  break
          
          if not full_raw_text: sys.exit(0)

          raw_keys = [os.environ.get("GEMINI_WRITE_KEY"), os.environ.get("GEMINI_API_KEY"), os.environ.get("GEMINI_API_KEY1")]
          api_keys = [k for k in raw_keys if k and k.strip()]
          client = genai.Client(api_key=api_keys[0])

          # === SMART TITLE CONTEST ===
          title_prompt = f"""
          SCRAPED ARTICLE: {target_title}
          CONTENT: {full_raw_text[:1500]}

          FORMULAS: 1. Number+Keyword+Benefit, 2. Keyword+Power Word+Year, 3. How/What+Keyword+Number, 4. Keyword+[Bracket Hook].

          INSTRUCTIONS:
          1. Extract 2-4 keywords from "{target_title}".
          2. Generate 3 high-CTR titles front-loading these keywords.
          3. Score them 1-10. Pick #1 as final_title.
          
          RESPOND ONLY JSON:
          {{"final_title": "Winning Title", "best_formula": "Formula #X", "reason": "Reason"}}
          """
          title_resp = client.models.generate_content(model=MODELS_TO_TRY[0], contents=title_prompt)
          title_data = json.loads(re.search(r'{.*}', title_resp.text, re.DOTALL).group())
          final_title = title_data.get('final_title', target_title)

          # === ARTICLE GENERATION ===
          article_prompt = f"""
          Current Date: {full_date_str}
          TITLE: {final_title}
          CONTEXT: {full_raw_text[:10000]}

          TASK: Write as Mutheu Ann for Za Ndani. Sharp Kenyan Entertainment Journalist.
          - Front-load keywords in H2/H3 headers.
          - 40-word snippet first.
          - NO Sheng, NO dashes, 10 hours old facts only.
          - BANNED: sasa basi, melting pot, spill the tea.
          """
          article_resp = client.models.generate_content(model=MODELS_TO_TRY[0], contents=article_prompt)
          
          # ... (rest of the ImgBB upload and saving logic remains identical to your working code)
          # [Save as .md logic here]
          EOF