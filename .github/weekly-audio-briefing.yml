name: Weekly AI Podcast Episode

on:
  schedule:
    - cron: '0 8 * * 5' # Every Friday at 8:00 AM UTC
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: content/posts 
  AUDIO_DIR: public/audio/podcasts 
  PODCAST_CONTENT_DIR: content/briefings

jobs:
  build-podcast-episode:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests google-generativeai

      - name: Generate Podcast Episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          POSTS_DIR: ${{ env.POSTS_DIR }}
          AUDIO_DIR: ${{ env.AUDIO_DIR }}
          PODCAST_CONTENT_DIR: ${{ env.PODCAST_CONTENT_DIR }}
        run: |
          python - <<'PYEOF'
          import os, json, re, time, datetime, sys, random
          import requests
          import google.generativeai as genai

          # --- Constants ---
          POSTS_DIR = os.environ.get("POSTS_DIR", "content/posts")
          AUDIO_DIR = os.environ.get("AUDIO_DIR", "public/audio/podcasts")
          PODCAST_CONTENT_DIR = os.environ.get("PODCAST_CONTENT_DIR", "content/briefings")
          MAX_STORIES = 5
          DAYS_AGO = 7

          def find_recent_articles():
              articles = []
              cutoff_date = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=DAYS_AGO)
              
              if not os.path.exists(POSTS_DIR):
                  print(f"Error: {POSTS_DIR} not found.")
                  return []
                  
              for filename in os.listdir(POSTS_DIR):
                  if filename.endswith('.md'):
                      filepath = os.path.join(POSTS_DIR, filename)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                          
                          fm = re.search(r'^---\s*\n([\s\S]*?)\n---', content)
                          if not fm: continue
                          
                          fm_text = fm.group(1)
                          title_m = re.search(r'^title:\s*["\']?(.*?)["\']?$', fm_text, re.M)
                          date_m = re.search(r'^date:\s*["\']?(.*?)["\']?$', fm_text, re.M)
                          excerpt_m = re.search(r'^excerpt:\s*["\']?(.*?)["\']?$', fm_text, re.M)

                          if date_m:
                              d_str = date_m.group(1).strip()
                              try:
                                  p_date = datetime.datetime.fromisoformat(d_str.replace('Z', '+00:00'))
                                  if p_date >= cutoff_date and title_m:
                                      articles.append({
                                          "title": title_m.group(1).strip(),
                                          "excerpt": excerpt_m.group(1).strip() if excerpt_m else ""
                                      })
                              except: continue
                      except Exception as e:
                          print(f"Skipping {filename}: {e}")
              return articles

          def generate_podcast_script(stories):
              story_block = "\n".join([f"- {s['title']}: {s['excerpt']}" for s in stories])
              prompt = (
                  f"You are the host of 'Za Ndani Weekly'. Write a sharp, engaging 4-minute solo podcast script "
                  f"summarizing these Kenyan stories:\n{story_block}\n\n"
                  "RULES: Use a gossipy, authoritative tone. Include cues like [UPBEAT INTRO]. "
                  "Output ONLY the script text."
              )
              try:
                  genai.configure(api_key=os.environ.get("GEMINI_API_KEY"))
                  model = genai.GenerativeModel('gemini-1.5-flash') 
                  response = model.generate_content(prompt)
                  return response.text.strip()
              except Exception as e:
                  print(f"Script error: {e}")
                  return None

          def generate_audio(script_text, output_path):
              api_key = os.environ.get("ELEVENLABS_API_KEY")
              VOICE_ID = "21m00Tcm4TlvDq8ikWAM" # Rachel
              url = f"https://api.elevenlabs.io/v1/text-to-speech/{VOICE_ID}"
              
              # Strip out the bracketed cues for the actual speech
              speech_content = re.sub(r'\[.*?\]', '', script_text)
              
              headers = {"xi-api-key": api_key, "Content-Type": "application/json"}
              data = {
                  "text": speech_content,
                  "model_id": "eleven_multilingual_v2",
                  "voice_settings": {"stability": 0.5, "similarity_boost": 0.8}
              }
              
              resp = requests.post(url, json=data, headers=headers)
              if resp.status_code == 200:
                  os.makedirs(os.path.dirname(output_path), exist_ok=True)
                  with open(output_path, 'wb') as f:
                      f.write(resp.content)
                  return True
              print(f"ElevenLabs Error: {resp.text}")
              return False

          def main():
              articles = find_recent_articles()
              if not articles:
                  print("No new content.")
                  return
              
              selected = random.sample(articles, min(len(articles), MAX_STORIES))
              script = generate_podcast_script(selected)
              if not script: return

              audio_file = f"za-ndani-podcast-{datetime.date.today()}.mp3"
              path = os.path.join(AUDIO_DIR, audio_file)
              
              if generate_audio(script, path):
                  # Create the markdown post
                  os.makedirs(PODCAST_CONTENT_DIR, exist_ok=True)
                  slug = f"podcast-{datetime.date.today()}"
                  with open(f"{PODCAST_CONTENT_DIR}/{slug}.md", "w") as f:
                      f.write(f"---\ntitle: \"Weekly Briefing\"\ndate: \"{datetime.datetime.now().isoformat()}\"\naudio_url: \"/audio/podcasts/{audio_file}\"\n---\n\n{script}")
                  print("Success!")

          if __name__ == "__main__":
              main()
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "Za Ndani Bot"
          git config user.email "bot@zandani.co.ke"
          git add .
          git diff --staged --quiet || (git commit -m "Add weekly podcast audio" && git push)
